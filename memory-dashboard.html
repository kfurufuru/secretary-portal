<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d1117;
  --bg2: #161b22;
  --bg3: #1c2128;
  --border: #30363d;
  --accent: #2dd4bf;
  --accent2: #0891b2;
  --text: #e6edf3;
  --text2: #8b949e;
  --text3: #6e7681;
  --user: #a78bfa;
  --user-bg: #1e1433;
  --feedback: #f59e0b;
  --feedback-bg: #1c1500;
  --project: #38bdf8;
  --project-bg: #001825;
  --reference: #34d399;
  --reference-bg: #001a0f;
  --radius: 10px;
  --transition: 0.2s ease;
  font-size: 15px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-break: strict;
  overflow-wrap: break-word;
}

/* Header */
.header {
  background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
  border-bottom: 1px solid var(--border);
  padding: 20px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.logo {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}
.header h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: 0.02em; }
.header-sub { font-size: 0.75rem; color: var(--text2); margin-top: 2px; }
.updated-badge {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 0.75rem;
  color: var(--text2);
}

/* Stats bar */
.stats-bar {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 1px;
  background: var(--border);
  border-bottom: 1px solid var(--border);
}
.stat {
  background: var(--bg2);
  padding: 16px 24px;
  text-align: center;
  cursor: pointer;
  transition: background var(--transition);
}
.stat:hover, .stat.active { background: var(--bg3); }
.stat.active .stat-count { color: var(--accent); }
.stat-count {
  font-size: 1.8rem;
  font-weight: 700;
  line-height: 1;
  margin-bottom: 4px;
  color: var(--text);
  transition: color var(--transition);
}
.stat-label { font-size: 0.75rem; color: var(--text2); }
.stat-dot {
  width: 8px; height: 8px; border-radius: 50%;
  display: inline-block; margin-right: 6px; vertical-align: middle;
}

/* Search */
.search-bar {
  padding: 16px 32px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
}
.search-input {
  flex: 1;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 16px;
  color: var(--text);
  font-size: 0.9rem;
  font-family: inherit;
  outline: none;
  transition: border-color var(--transition);
}
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--text3); }
.filter-btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 6px 14px;
  color: var(--text2);
  font-size: 0.8rem;
  cursor: pointer;
  font-family: inherit;
  transition: all var(--transition);
  white-space: nowrap;
}
.filter-btn:hover { border-color: var(--accent); color: var(--accent); }
.filter-btn.active { background: var(--accent); border-color: var(--accent); color: #0d1117; font-weight: 600; }
.filter-btn.archived-btn { border-color: #4b5563; color: #6b7280; }
.filter-btn.archived-btn:hover { border-color: #9ca3af; color: #9ca3af; }
.filter-btn.archived-btn.active { background: #374151; border-color: #6b7280; color: #d1d5db; }

/* Cards grid */
.main { padding: 24px 32px; }
.section-title {
  font-size: 0.75rem;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 12px;
  margin-bottom: 32px;
}
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  cursor: pointer;
  transition: all var(--transition);
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  border-radius: 3px 0 0 3px;
}
.card[data-type="user"]::before { background: var(--user); }
.card[data-type="feedback"]::before { background: var(--feedback); }
.card[data-type="project"]::before { background: var(--project); }
.card[data-type="reference"]::before { background: var(--reference); }
.card:hover { border-color: var(--text3); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
.card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
.card-name { font-size: 0.9rem; font-weight: 600; line-height: 1.4; flex: 1; }
.type-badge {
  font-size: 0.65rem;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 10px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  white-space: nowrap;
  flex-shrink: 0;
}
.badge-user { background: var(--user-bg); color: var(--user); border: 1px solid var(--user); }
.badge-feedback { background: var(--feedback-bg); color: var(--feedback); border: 1px solid var(--feedback); }
.badge-project { background: var(--project-bg); color: var(--project); border: 1px solid var(--project); }
.badge-reference { background: var(--reference-bg); color: var(--reference); border: 1px solid var(--reference); }
.card-desc { font-size: 0.8rem; color: var(--text2); line-height: 1.5; margin-bottom: 8px; }
.card-preview {
  font-size: 0.75rem;
  color: var(--text3);
  line-height: 1.5;
  background: var(--bg3);
  border-radius: 6px;
  padding: 8px;
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease, padding 0.3s ease, opacity 0.3s ease;
  opacity: 0;
  white-space: pre-wrap;
  font-family: 'Noto Sans JP', sans-serif;
}
.card.expanded .card-preview { max-height: 200px; opacity: 1; padding: 8px; }
.card-filename {
  font-size: 0.65rem;
  color: var(--text3);
  margin-top: 8px;
  font-family: 'Courier New', monospace;
}
.hidden { display: none !important; }
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text3);
  font-size: 0.9rem;
}
.empty-state .icon { font-size: 2rem; margin-bottom: 8px; }
.expiry-badge {
  font-size: 0.65rem;
  padding: 2px 8px;
  border-radius: 10px;
  margin-top: 6px;
  display: inline-block;
}
.expiry-ok { background: rgba(52,211,153,0.15); color: #34d399; border: 1px solid #34d399; }
.expiry-warn { background: rgba(245,158,11,0.15); color: #f59e0b; border: 1px solid #f59e0b; }
.expiry-expired { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid #ef4444; }

/* Archived cards */
.card.archived {
  opacity: 0.4;
  border-style: dashed;
  border-color: #374151;
}
.card.archived:hover { opacity: 0.7; }
.card.archived .card-name { text-decoration: line-through; color: var(--text3); }
.card.archived::before { background: #4b5563 !important; }
.archived-badge {
  font-size: 0.65rem;
  padding: 2px 8px;
  border-radius: 10px;
  margin-top: 6px;
  display: inline-block;
  background: rgba(75,85,99,0.25);
  color: #6b7280;
  border: 1px solid #4b5563;
}
.restore-btn {
  font-size: 0.7rem;
  padding: 4px 10px;
  background: transparent;
  border: 1px solid #374151;
  border-radius: 6px;
  color: #6b7280;
  cursor: pointer;
  font-family: inherit;
  margin-top: 8px;
  transition: all var(--transition);
  display: inline-block;
}
.restore-btn:hover { border-color: var(--accent); color: var(--accent); }
.toast {
  position: fixed;
  bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: #1c2128;
  border: 1px solid var(--accent);
  border-radius: 8px;
  padding: 10px 20px;
  font-size: 0.8rem;
  color: var(--accent);
  transition: transform 0.3s ease;
  z-index: 999;
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* Responsive */
@media (max-width: 768px) {
  .header { padding: 16px; flex-direction: column; gap: 8px; align-items: flex-start; }
  .stats-bar { grid-template-columns: repeat(3, 1fr); }
  .search-bar { padding: 12px 16px; flex-wrap: wrap; }
  .main { padding: 16px; }
  .cards-grid { grid-template-columns: 1fr; }
}
</style>
</head>

let currentType = 'all';
let searchText = '';
let showArchive = false;

function filterType(type) {
  currentType = type;
  document.querySelectorAll('.stat').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.filter-btn:not(.archived-btn)').forEach(b => b.classList.remove('active'));
  document.getElementById('stat-' + type).classList.add('active');
  document.getElementById('btn-' + type).classList.add('active');
  applyFilters();
}

function toggleArchive() {
  showArchive = !showArchive;
  const btn = document.getElementById('btn-archive');
  btn.classList.toggle('active', showArchive);
  applyFilters();
}

function applyFilters() {
  searchText = document.getElementById('searchInput').value.toLowerCase();
  renderCards();
}

function renderCards() {
  const main = document.getElementById('main');
  const types = currentType === 'all'
    ? ['user', 'feedback', 'project', 'reference']
    : [currentType];

  const typeLabels = {
    user: '👤 User — ユーザー情報',
    feedback: '💬 Feedback — 行動ルール・指示',
    project: '🏗 Project — 進行中プロジェクト',
    reference: '🔗 Reference — 参照先・ツール'
  };

  let html = '';
  let anyVisible = false;

  for (const type of types) {
    const filtered = MEMORIES.filter(m => {
      if (m.type !== type) return false;
      if (!searchText) return true;
      return m.name.toLowerCase().includes(searchText) ||
             m.description.toLowerCase().includes(searchText) ||
             m.preview.toLowerCase().includes(searchText) ||
             m.filename.toLowerCase().includes(searchText);
    });

    if (filtered.length === 0) continue;
    anyVisible = true;

    html += `<div class="section-title">${typeLabels[type]} (${filtered.length})</div>`;
    html += '<div class="cards-grid">';
    for (const m of filtered) {
      html += `
        <div class="card" data-type="${m.type}" onclick="toggleCard(this)">
          <div class="card-header">
            <div class="card-name">${m.name}</div>
            <span class="type-badge badge-${m.type}">${m.type}</span>
          </div>
          <div class="card-desc">${m.description}</div>
          <div class="card-preview">${escHtml(m.preview)}</div>
          ${m.expires ? getExpiryBadge(m.expires) : ''}
          <div class="card-filename">${m.filename}</div>
        </div>`;
    }
    html += '</div>';
  }

  if (showArchive) {
    const filteredArchived = ARCHIVED.filter(m => {
      if (currentType !== 'all' && m.type !== currentType) return false;
      if (!searchText) return true;
      return m.name.toLowerCase().includes(searchText) ||
             m.description.toLowerCase().includes(searchText) ||
             m.filename.toLowerCase().includes(searchText);
    });
    if (filteredArchived.length > 0) {
      anyVisible = true;
      html += `<div class="section-title">🗄 アーカイブ済み — 統合削除 (${filteredArchived.length})</div>`;
      html += '<div class="cards-grid">';
      for (const m of filteredArchived) {
        html += `
          <div class="card archived" data-type="${m.type}" onclick="toggleCard(this)">
            <div class="card-header">
              <div class="card-name">${m.name}</div>
              <span class="type-badge badge-${m.type}">${m.type}</span>
            </div>
            <div class="card-desc">${m.description}</div>
            <div class="card-preview">${escHtml(m.preview)}</div>
            <span class="archived-badge">→ ${m.mergedInto}</span>
            <button class="restore-btn" onclick="event.stopPropagation();restoreFile('${m.filename}')">↩ 復活させる</button>
            <div class="card-filename">${m.filename}</div>
          </div>`;
      }
      html += '</div>';
    }
  }

  if (!anyVisible) {
    html = `<div class="empty-state"><div class="icon">🔍</div>「${searchText || 'アーカイブ'}」に一致するメモリが見つかりません</div>`;
  }

  main.innerHTML = html;
}

function restoreFile(filename) {
  const path = `C:\\Users\\kfuru\\.claude\\projects\\C--Users-kfuru--secretary\\memory\\${filename}`;
  navigator.clipboard.writeText(filename).catch(() => {});
  showToast(`復活対象: ${filename} — メモリフォルダに再作成してください`);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

function getExpiryBadge(expires) {
  if (!expires) return '';
  const today = new Date();
  const expDate = new Date(expires);
  const diffDays = Math.floor((expDate - today) / 86400000);
  if (diffDays < 0) return `<span class="expiry-badge expiry-expired">期限切れ: ${expires}</span>`;
  if (diffDays <= 30) return `<span class="expiry-badge expiry-warn">期限: ${expires}（残${diffDays}日）</span>`;
  return `<span class="expiry-badge expiry-ok">有効: ${expires}まで</span>`;
}

function toggleCard(card) {
  card.classList.toggle('expanded');
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function updateStats() {
  const counts = { all: MEMORIES.length, user: 0, feedback: 0, project: 0, reference: 0 };
  MEMORIES.forEach(m => counts[m.type]++);
  Object.keys(counts).forEach(k => {
    document.getElementById('count-' + k).textContent = counts[k];
  });
}

updateStats();
renderCards();
