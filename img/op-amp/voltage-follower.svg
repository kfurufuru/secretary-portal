<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="11">

  <!-- Op-amp triangle body -->
  <polygon points="170,62 170,148 238,105" fill="#f8fafc" stroke="#1e293b" stroke-width="2"/>
  <!-- ± labels inside triangle -->
  <text x="178" y="90" fill="#1e293b" font-size="13" font-weight="bold">−</text>
  <text x="176" y="128" fill="#1e293b" font-size="13" font-weight="bold">+</text>

  <!-- ===== INPUT PATH (non-inverting +) ===== -->
  <!-- Vi source node -->
  <circle cx="18" cy="126" r="3.5" fill="#7c3aed"/>
  <text x="4" y="120" fill="#7c3aed" font-size="11" font-weight="bold">Vi</text>
  <!-- Wire: Vi → non-inverting input -->
  <line x1="18" y1="126" x2="170" y2="126" stroke="#1e293b" stroke-width="1.5"/>

  <!-- ===== FEEDBACK PATH (direct to inverting −) ===== -->
  <!-- Output wire horizontal right -->
  <line x1="238" y1="105" x2="265" y2="105" stroke="#1e293b" stroke-width="1.5"/>
  <!-- Branch point (feedback split) -->
  <circle cx="265" cy="105" r="2.5" fill="#1e293b"/>

  <!-- Feedback upper loop: (265,105) → (265,75) → (132,75) → (132,84) → (170,84) -->
  <!-- Vertical up to feedback rail -->
  <line x1="265" y1="105" x2="265" y2="75" stroke="#1e293b" stroke-width="1.5"/>
  <!-- Horizontal left to feedback rail -->
  <line x1="265" y1="75" x2="132" y2="75" stroke="#1e293b" stroke-width="1.5"/>
  <!-- Vertical down to inverting input level -->
  <line x1="132" y1="75" x2="132" y2="84" stroke="#1e293b" stroke-width="1.5"/>
  <!-- Horizontal right to inverting input -->
  <line x1="132" y1="84" x2="170" y2="84" stroke="#1e293b" stroke-width="1.5"/>

  <!-- ===== OUTPUT ===== -->
  <!-- Output wire right -->
  <line x1="265" y1="105" x2="296" y2="105" stroke="#1e293b" stroke-width="1.5"/>
  <!-- Output node -->
  <circle cx="278" cy="105" r="3.5" fill="#f59e0b"/>
  <!-- Vo label -->
  <text x="298" y="109" fill="#f59e0b" font-size="11" font-weight="bold">Vo</text>

  <!-- ===== FORMULA ===== -->
  <text x="160" y="190" fill="#64748b" font-size="10" text-anchor="middle">Av = 1（バッファ・インピーダンス変換）</text>

</svg>
