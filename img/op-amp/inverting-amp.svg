<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="11">

  <!-- Op-amp triangle body -->
  <polygon points="170,62 170,148 238,105" fill="#f8fafc" stroke="#1e293b" stroke-width="2"/>
  <!-- ± labels inside triangle -->
  <text x="178" y="90" fill="#1e293b" font-size="13" font-weight="bold">−</text>
  <text x="176" y="128" fill="#1e293b" font-size="13" font-weight="bold">+</text>

  <!-- ===== INPUT PATH (inverting −) ===== -->
  <!-- Vi source node -->
  <circle cx="18" cy="84" r="3.5" fill="#7c3aed"/>
  <text x="4" y="78" fill="#7c3aed" font-size="11" font-weight="bold">Vi</text>
  <!-- Wire: Vi → Ri -->
  <line x1="18" y1="84" x2="46" y2="84" stroke="#1e293b" stroke-width="1.5"/>
  <!-- Ri (IEC rectangle) -->
  <rect x="46" y="77" width="40" height="14" fill="white" stroke="#475569" stroke-width="1.8" rx="2"/>
  <text x="66" y="74" fill="#475569" font-size="10" text-anchor="middle">Ri</text>
  <!-- Wire: Ri → junction node -->
  <line x1="86" y1="84" x2="132" y2="84" stroke="#1e293b" stroke-width="1.5"/>
  <!-- Junction dot (Ri output / Rf bottom) -->
  <circle cx="132" cy="84" r="3.5" fill="#1e293b"/>
  <!-- Wire: junction → inverting input -->
  <line x1="132" y1="84" x2="170" y2="84" stroke="#1e293b" stroke-width="1.5"/>

  <!-- ===== FEEDBACK PATH (Rf) ===== -->
  <!-- Vertical: junction up to top rail -->
  <line x1="132" y1="84" x2="132" y2="40" stroke="#1e293b" stroke-width="1.5"/>
  <!-- Horizontal: left rail → Rf -->
  <line x1="132" y1="40" x2="165" y2="40" stroke="#1e293b" stroke-width="1.5"/>
  <!-- Rf (IEC rectangle) -->
  <rect x="165" y="33" width="40" height="14" fill="white" stroke="#475569" stroke-width="1.8" rx="2"/>
  <text x="185" y="30" fill="#475569" font-size="10" text-anchor="middle">Rf</text>
  <!-- Horizontal: Rf → right rail -->
  <line x1="205" y1="40" x2="253" y2="40" stroke="#1e293b" stroke-width="1.5"/>
  <!-- Vertical: right rail → output node -->
  <line x1="253" y1="40" x2="253" y2="105" stroke="#1e293b" stroke-width="1.5"/>
  <!-- Connect right rail to op-amp output tip -->
  <line x1="238" y1="105" x2="253" y2="105" stroke="#1e293b" stroke-width="1.5"/>

  <!-- ===== NON-INVERTING INPUT (+) → GND ===== -->
  <line x1="110" y1="126" x2="170" y2="126" stroke="#1e293b" stroke-width="1.5"/>
  <line x1="110" y1="126" x2="110" y2="163" stroke="#1e293b" stroke-width="1.5"/>
  <!-- Ground symbol (3-line IEEE style) -->
  <line x1="95"  y1="163" x2="125" y2="163" stroke="#1e293b" stroke-width="2"/>
  <line x1="100" y1="169" x2="120" y2="169" stroke="#1e293b" stroke-width="1.5"/>
  <line x1="105" y1="175" x2="115" y2="175" stroke="#1e293b" stroke-width="1"/>

  <!-- ===== OUTPUT ===== -->
  <!-- Output wire -->
  <line x1="253" y1="105" x2="296" y2="105" stroke="#1e293b" stroke-width="1.5"/>
  <!-- Output node -->
  <circle cx="278" cy="105" r="3.5" fill="#f59e0b"/>
  <!-- Vo label -->
  <text x="298" y="109" fill="#f59e0b" font-size="11" font-weight="bold">Vo</text>

  <!-- ===== FORMULA ===== -->
  <text x="160" y="194" fill="#64748b" font-size="10" text-anchor="middle">Av = −Rf / Ri　（反転増幅）</text>

</svg>
