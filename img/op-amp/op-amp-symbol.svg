<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="11">

  <!-- Op-amp triangle body -->
  <polygon points="130,55 130,155 215,105" fill="#f8fafc" stroke="#1e293b" stroke-width="2"/>

  <!-- ± labels inside triangle -->
  <text x="138" y="88" fill="#1e293b" font-size="13" font-weight="bold">−</text>
  <text x="136" y="130" fill="#1e293b" font-size="13" font-weight="bold">+</text>

  <!-- Gain label inside triangle -->
  <text x="174" y="111" fill="#334155" font-size="18" font-weight="bold" text-anchor="middle">A</text>

  <!-- ===== INPUT: V− (inverting) ===== -->
  <circle cx="18" cy="85" r="3" fill="#7c3aed"/>
  <text x="4" y="79" fill="#7c3aed" font-size="11" font-weight="bold">V−</text>
  <line x1="18" y1="85" x2="130" y2="85" stroke="#1e293b" stroke-width="1.5"/>

  <!-- ===== INPUT: V+ (non-inverting) ===== -->
  <circle cx="18" cy="125" r="3" fill="#475569"/>
  <text x="4" y="119" fill="#475569" font-size="11" font-weight="bold">V+</text>
  <line x1="18" y1="125" x2="130" y2="125" stroke="#1e293b" stroke-width="1.5"/>

  <!-- ===== OUTPUT ===== -->
  <line x1="215" y1="105" x2="295" y2="105" stroke="#1e293b" stroke-width="1.5"/>
  <circle cx="278" cy="105" r="3.5" fill="#f59e0b"/>
  <text x="297" y="109" fill="#f59e0b" font-size="11" font-weight="bold">Vo</text>

  <!-- ===== FORMULA (bottom) ===== -->
  <text x="160" y="176" fill="#64748b" font-size="11" text-anchor="middle">Vo = A × (V+ − V−)</text>
  <text x="160" y="191" fill="#94a3b8" font-size="10" text-anchor="middle">閉ループ時: V+ ≈ V−（仮想短絡）</text>

</svg>
