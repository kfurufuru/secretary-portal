<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="11">

  <!-- Op-amp triangle body -->
  <polygon points="170,62 170,148 238,105" fill="#f8fafc" stroke="#1e293b" stroke-width="2"/>
  <!-- ± labels inside triangle: upper(y≈84)=inverting(−), lower(y≈126)=non-inverting(+) -->
  <text x="178" y="90" fill="#1e293b" font-size="13" font-weight="bold">−</text>
  <text x="176" y="128" fill="#1e293b" font-size="13" font-weight="bold">+</text>

  <!-- ===== INPUT PATH (non-inverting +) ===== -->
  <!-- Vi source node -->
  <circle cx="18" cy="126" r="3.5" fill="#7c3aed"/>
  <text x="4" y="120" fill="#7c3aed" font-size="11" font-weight="bold">Vi</text>
  <!-- Wire: Vi → (+) non-inverting input -->
  <line x1="18" y1="126" x2="170" y2="126" stroke="#1e293b" stroke-width="1.5"/>

  <!-- ===== FEEDBACK PATH (Rf) ===== -->
  <!-- Junction dot (feedback node at inverting input level) -->
  <circle cx="132" cy="84" r="3.5" fill="#1e293b"/>
  <!-- Wire: junction → inverting input (−) -->
  <line x1="132" y1="84" x2="170" y2="84" stroke="#1e293b" stroke-width="1.5"/>
  <!-- Vertical: junction up to top rail -->
  <line x1="132" y1="84" x2="132" y2="40" stroke="#1e293b" stroke-width="1.5"/>
  <!-- Horizontal: left rail → Rf -->
  <line x1="132" y1="40" x2="162" y2="40" stroke="#1e293b" stroke-width="1.5"/>
  <!-- Rf (IEC rectangle) -->
  <rect x="162" y="33" width="40" height="14" fill="white" stroke="#475569" stroke-width="1.8" rx="2"/>
  <text x="182" y="22" fill="#475569" font-size="10" text-anchor="middle">Rf</text>
  <!-- Horizontal: Rf → right rail -->
  <line x1="202" y1="40" x2="253" y2="40" stroke="#1e293b" stroke-width="1.5"/>
  <!-- Vertical: right rail → output node -->
  <line x1="253" y1="40" x2="253" y2="105" stroke="#1e293b" stroke-width="1.5"/>
  <!-- Connect right rail to op-amp output tip -->
  <line x1="238" y1="105" x2="253" y2="105" stroke="#1e293b" stroke-width="1.5"/>

  <!-- ===== R1 (feedback divider to GND) ===== -->
  <!-- Wire: junction → top of R1 -->
  <line x1="132" y1="84" x2="132" y2="108" stroke="#1e293b" stroke-width="1.5"/>
  <!-- R1 (IEC rectangle) -->
  <rect x="118" y="108" width="28" height="14" fill="white" stroke="#475569" stroke-width="1.8" rx="2"/>
  <text x="132" y="97" fill="#475569" font-size="10" text-anchor="middle">R1</text>
  <!-- Wire: R1 bottom → GND -->
  <line x1="132" y1="122" x2="132" y2="157" stroke="#1e293b" stroke-width="1.5"/>
  <!-- Ground symbol (3-line IEEE style) -->
  <line x1="117" y1="157" x2="147" y2="157" stroke="#1e293b" stroke-width="2"/>
  <line x1="122" y1="163" x2="142" y2="163" stroke="#1e293b" stroke-width="1.5"/>
  <line x1="127" y1="169" x2="137" y2="169" stroke="#1e293b" stroke-width="1"/>

  <!-- ===== OUTPUT ===== -->
  <!-- Output wire -->
  <line x1="253" y1="105" x2="295" y2="105" stroke="#1e293b" stroke-width="1.5"/>
  <!-- Output node -->
  <circle cx="278" cy="105" r="3.5" fill="#f59e0b"/>
  <!-- Vo label -->
  <text x="297" y="109" fill="#f59e0b" font-size="11" font-weight="bold">Vo</text>

  <!-- ===== FORMULA ===== -->
  <text x="160" y="190" fill="#64748b" font-size="10" text-anchor="middle">Av = 1 + Rf / R1　（非反転増幅）</text>

</svg>
