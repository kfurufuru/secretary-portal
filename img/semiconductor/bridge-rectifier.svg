<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="11">

  <!-- D1: 左(AC)→上(DC+) -->
  <line x1="50" y1="100" x2="160" y2="30" stroke="#1e293b" stroke-width="1.5"/>
  <polygon points="102,68 105,72 99,72" fill="#1e293b"/>
  <line x1="105" y1="68" x2="105" y2="76" stroke="#1e293b" stroke-width="1.5"/>
  <!-- D1ラベル：線から離した位置（左上外側） -->
  <text x="68" y="58" font-size="9" fill="#64748b" text-anchor="middle">D1</text>

  <!-- D2: 上(DC+)→右(AC) -->
  <line x1="160" y1="30" x2="270" y2="100" stroke="#1e293b" stroke-width="1.5"/>
  <polygon points="213,72 215,68 219,72" fill="#1e293b"/>
  <line x1="215" y1="68" x2="215" y2="76" stroke="#1e293b" stroke-width="1.5"/>
  <!-- D2ラベル：右上外側 -->
  <text x="252" y="58" font-size="9" fill="#64748b" text-anchor="middle">D2</text>

  <!-- D3: 右(AC)→下(DC-) -->
  <line x1="270" y1="100" x2="160" y2="170" stroke="#1e293b" stroke-width="1.5"/>
  <polygon points="218,132 215,128 219,128" fill="#1e293b"/>
  <line x1="215" y1="132" x2="215" y2="124" stroke="#1e293b" stroke-width="1.5"/>
  <!-- D3ラベル：右下外側 -->
  <text x="252" y="148" font-size="9" fill="#64748b" text-anchor="middle">D3</text>

  <!-- D4: 下(DC-)→左(AC) -->
  <line x1="160" y1="170" x2="50" y2="100" stroke="#1e293b" stroke-width="1.5"/>
  <polygon points="105,132 99,128 105,128" fill="#1e293b"/>
  <line x1="99" y1="132" x2="99" y2="124" stroke="#1e293b" stroke-width="1.5"/>
  <!-- D4ラベル：左下外側 -->
  <text x="68" y="148" font-size="9" fill="#64748b" text-anchor="middle">D4</text>

  <!-- AC入力（左） -->
  <circle cx="50" cy="100" r="3.5" fill="#7c3aed"/>
  <text x="26" y="97" font-size="11" font-weight="bold" fill="#7c3aed" text-anchor="middle">AC</text>
  <text x="26" y="110" font-size="10" fill="#7c3aed" text-anchor="middle">~</text>

  <!-- AC入力（右） -->
  <circle cx="270" cy="100" r="3.5" fill="#7c3aed"/>
  <text x="294" y="97" font-size="11" font-weight="bold" fill="#7c3aed" text-anchor="middle">AC</text>
  <text x="294" y="110" font-size="10" fill="#7c3aed" text-anchor="middle">~</text>

  <!-- DC+ 出力（上） -->
  <circle cx="160" cy="30" r="3.5" fill="#f59e0b"/>
  <text x="160" y="20" font-size="11" font-weight="bold" fill="#f59e0b" text-anchor="middle">DC+</text>

  <!-- DC− 出力（下）：数式と重ならないよう y=183 に配置 -->
  <circle cx="160" cy="170" r="3.5" fill="#475569"/>
  <text x="160" y="183" font-size="11" font-weight="bold" fill="#475569" text-anchor="middle">DC−</text>

  <!-- 下部テキスト（DC−から十分な間隔） -->
  <text x="160" y="196" text-anchor="middle" font-size="8" fill="#64748b">全波整流: Vavg = 2Vm/π ≈ 0.9×Vrms</text>

</svg>
