<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">

  <!-- P型領域 -->
  <rect x="20" y="55" width="110" height="100" fill="#ddd6fe" stroke="#7c3aed" stroke-width="1.5"/>

  <!-- 空乏層 -->
  <rect x="130" y="55" width="60" height="100" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- N型領域 -->
  <rect x="190" y="55" width="110" height="100" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>

  <!-- 上部ラベル行（端子名 + 空乏層は別行で独立） -->
  <text x="20" y="30" font-size="10" font-weight="bold" fill="#7c3aed">A（アノード）</text>
  <text x="160" y="30" text-anchor="middle" font-size="9" fill="#94a3b8">空乏層</text>
  <text x="300" y="30" text-anchor="end" font-size="10" font-weight="bold" fill="#16a34a">K（カソード）</text>

  <!-- P型ラベル（ボックス内） -->
  <text x="75" y="98" text-anchor="middle" font-size="16" font-weight="bold" fill="#7c3aed">P型</text>
  <text x="75" y="115" text-anchor="middle" font-size="9" fill="#7c3aed">（正孔が多数）</text>

  <!-- N型ラベル（ボックス内） -->
  <text x="245" y="98" text-anchor="middle" font-size="16" font-weight="bold" fill="#16a34a">N型</text>
  <text x="245" y="115" text-anchor="middle" font-size="9" fill="#16a34a">（電子が多数）</text>

  <!-- 内蔵電位の矢印（空乏層内・上部） -->
  <text x="160" y="74" text-anchor="middle" font-size="8" fill="#ef4444">内蔵電位 VD</text>
  <line x1="140" y1="82" x2="178" y2="82" stroke="#ef4444" stroke-width="1.5"/>
  <polygon points="174,78 180,82 174,86" fill="#ef4444"/>

  <!-- 空乏層内：キャリアなし（下部） -->
  <text x="160" y="118" text-anchor="middle" font-size="8" fill="#94a3b8">（キャリアなし）</text>

  <!-- 下部説明テキスト -->
  <text x="160" y="170" text-anchor="middle" font-size="9" fill="#64748b">順バイアス(VF≧0.6V): 空乏層縮小 → 電流が流れる</text>
  <text x="160" y="184" text-anchor="middle" font-size="9" fill="#94a3b8">逆バイアス: 空乏層拡大 → 電流ほぼゼロ（逆飽和電流 IS のみ）</text>

</svg>
