/* ── Midnight Mint palette override ── */
:root {
  --bg: #0d1117; --bg-card: #161b22; --bg-hover: #1f2937;
  --accent: #2dd4bf; --accent-dim: rgba(45,212,191,0.12);
  --text: #e6edf3; --text-muted: #8b949e; --text-dim: #6e7681;
  --border: rgba(45,212,191,0.18); --border-hover: rgba(45,212,191,0.45);
  --nav-bg: rgba(13,17,23,0.85);
  --cat-tool: #2dd4bf; --cat-knowledge: #a78bfa; --cat-hardware: #f59e0b;
}
html { scroll-behavior: smooth; }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text);
  line-break: strict; overflow-wrap: break-word; word-break: normal;
  min-height: 100vh;
}
:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; border-radius: 4px; }

/* ── Top nav ── */
.top-nav {
  position: sticky; top: 0; z-index: 100;
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  background: var(--nav-bg);
  border-bottom: 1px solid rgba(255,255,255,0.05);
  padding: 0 var(--sp-6); height: 48px;
  display: flex; align-items: center; justify-content: space-between;
}
.nav-back { display: flex; align-items: center; gap: var(--sp-2); text-decoration: none; color: var(--text-muted); font-size: var(--fs-sm); font-weight: 600; transition: color .2s; }
.nav-back:hover { color: var(--accent); }
.nav-title { font-size: var(--fs-sm); color: var(--text-dim); font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
.nav-spacer { width: 120px; }

/* ── Hero ── */
.hero { max-width: 860px; margin: 0 auto; padding: var(--sp-12) var(--sp-6) var(--sp-8); text-align: left; }
.hero-eyebrow { display: flex; align-items: center; gap: var(--sp-3); margin-bottom: var(--sp-6); }
.eyebrow-line { flex: 1; height: 1px; background: var(--border); }
.eyebrow-text { font-size: 0.72rem; color: var(--accent); font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; white-space: nowrap; }
.hero h1 { font-size: 2.4rem; font-weight: 700; line-height: 1.3; letter-spacing: 0.02em; margin-bottom: var(--sp-4); }
.hero h1 .accent { color: var(--accent); }
.hero-desc { color: var(--text-muted); font-size: 1rem; line-height: 1.8; max-width: 600px; margin-bottom: var(--sp-8); }
.hero-stats { display: flex; gap: var(--sp-8); flex-wrap: wrap; align-items: flex-end; }
.stat { display: flex; flex-direction: column; }
.stat-num { font-size: 2rem; font-weight: 700; color: var(--accent); line-height: 1; }
.stat-label { font-size: var(--fs-sm); color: var(--text-dim); margin-top: 4px; }

/* ── Filter bar ── */
.filter-section { max-width: 860px; margin: 0 auto; padding: 0 var(--sp-6) var(--sp-6); }
.filter-bar { display: flex; flex-wrap: wrap; gap: var(--sp-2); }
.filter-btn {
  font-family: var(--font-base); font-size: 0.78rem; font-weight: 600;
  padding: 6px 14px; border-radius: 99px; cursor: pointer;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.04); color: var(--text-muted);
  transition: .2s; white-space: nowrap;
  display: inline-flex; align-items: center; gap: 6px;
}
.filter-btn:hover { border-color: rgba(45,212,191,0.4); color: var(--accent); background: var(--accent-dim); }
.filter-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
.filter-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: .7; }

/* ── Grid ── */
.grid-section { max-width: 860px; margin: 0 auto; padding: 0 var(--sp-6) var(--sp-12); position: relative; }
.item-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: var(--sp-4); }

/* ── Card ── */
.item-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  overflow: hidden;
  transition: border-color .2s, transform .2s, box-shadow .2s, opacity .4s;
  opacity: 0; transform: translateY(12px);
}
.item-card.visible { opacity: 1; transform: translateY(0); }
.item-card.hidden { display: none; }
.item-card:hover { border-color: var(--border-hover); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.35); }
.card-header { padding: var(--sp-4) var(--sp-6); cursor: pointer; user-select: none; }
.card-meta { display: flex; align-items: center; gap: var(--sp-3); margin-bottom: var(--sp-3); }
.card-icon-wrap {
  width: 36px; height: 36px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.card-icon-wrap.cat-tool { background: rgba(45,212,191,0.14); color: var(--cat-tool); }
.card-icon-wrap.cat-knowledge { background: rgba(167,139,250,0.14); color: var(--cat-knowledge); }
.card-icon-wrap.cat-hardware { background: rgba(245,158,11,0.14); color: var(--cat-hardware); }
.cat-chip {
  font-size: 0.68rem; font-weight: 700; letter-spacing: 0.06em;
  padding: 2px 8px; border-radius: 99px; text-transform: uppercase;
}
.cat-chip.cat-tool { background: rgba(45,212,191,0.1); color: var(--cat-tool); border: 1px solid rgba(45,212,191,0.3); }
.cat-chip.cat-knowledge { background: rgba(167,139,250,0.1); color: var(--cat-knowledge); border: 1px solid rgba(167,139,250,0.3); }
.cat-chip.cat-hardware { background: rgba(245,158,11,0.1); color: var(--cat-hardware); border: 1px solid rgba(245,158,11,0.3); }
.card-title { font-size: 1.05rem; font-weight: 700; line-height: 1.3; margin-bottom: var(--sp-2); color: var(--text); }
.card-can { font-size: 0.85rem; color: var(--text-muted); line-height: 1.6; margin-bottom: var(--sp-3); }
.expand-btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: transparent; border: none; color: var(--accent);
  font-family: inherit; font-size: 0.78rem; font-weight: 600;
  cursor: pointer; padding: 0; transition: transform .2s;
}
.expand-btn span:first-child { display: inline-block; transition: transform .25s; }
.item-card.expanded .expand-btn span:first-child { transform: rotate(180deg); }

/* ── Card body (accordion) ── */
.card-body {
  max-height: 0; overflow: hidden; transition: max-height .3s ease;
  border-top: 1px solid transparent;
}
.item-card.expanded .card-body { max-height: 800px; border-top-color: rgba(255,255,255,0.06); }
.card-body-inner { padding: var(--sp-4) var(--sp-6) var(--sp-6); display: flex; flex-direction: column; gap: var(--sp-4); }
.detail-label { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.1em; color: var(--text-dim); text-transform: uppercase; margin-bottom: 6px; }
.detail-text { font-size: 0.88rem; color: var(--text); line-height: 1.7; }
.libs-row { display: flex; flex-wrap: wrap; gap: 6px; }
.c-tag {

  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
  color: var(--text-muted); font-family: 'SF Mono', Consolas, monospace;
}
.snippet-wrap { display: flex; flex-direction: column; }
.snippet-pre {
  background: rgba(0,0,0,0.35);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 6px;
  padding: var(--sp-3) var(--sp-4);
  font-size: 0.78rem; line-height: 1.6;
  color: #a5f3fc; overflow-x: auto;
  font-family: 'SF Mono', Consolas, 'Courier New', monospace;
}

/* ── Footer ── */
.footer { border-top: 1px solid rgba(255,255,255,0.04); padding: var(--sp-8) var(--sp-6); text-align: center; color: var(--text-dim); font-size: var(--fs-sm); }
.footer-links { display: flex; align-items: center; justify-content: center; gap: var(--sp-6); flex-wrap: wrap; margin-bottom: var(--sp-3); }
.footer-link { display: inline-flex; align-items: center; gap: 6px; color: var(--text-dim); text-decoration: none; font-size: 0.8rem; transition: color .2s; }
.footer-link:hover { color: var(--accent); }
.footer-copy { font-size: 0.72rem; }

/* ── Responsive ── */
@media (max-width: 768px) {
  .hero h1 { font-size: 1.9rem; }
  .hero-stats { gap: var(--sp-4); }

@media (max-width: 480px) {

  .card-header, .card-body-inner { padding-left: var(--sp-4); padding-right: var(--sp-4); }

.dashboard-section {

/* ── Level Tags ── */

  display: inline-block;

.level-review {

/* ── L1 Candidates List ── */
.l1-candidate-item {

.l2-article-card {

/* ── Responsive Dashboard ── */

  .dashboard-section {
    padding: 1rem;
    margin-top: 2rem;
  }

  .l2-articles-grid {
    grid-template-columns: 1fr;
  }
}
</style>

// ── Utility ──
function escapeHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

// ── Render cards ──
function renderCards() {
  const grid = document.getElementById("item-grid");
  grid.innerHTML = "";

  ITEMS.forEach((item, idx) => {
    const cat = CATEGORIES[item.category] || CATEGORIES.tool;
    const libsHtml = (item.libs || [])
      .map(l => `<span class="c-tag">${escapeHtml(l)}</span>`)
      .join("");

    const card = document.createElement("div");
    card.className = "item-card";
    card.dataset.category = item.category;
    card.dataset.id = item.id;

    card.innerHTML = `
      <div class="card-header" role="button" aria-expanded="false">
        <div class="card-meta">
          <div class="card-icon-wrap cat-${escapeHtml(item.category)}">
            <i data-lucide="${escapeHtml(item.icon)}" width="18" height="18"></i>
          </div>
          <span class="cat-chip cat-${escapeHtml(item.category)}">${escapeHtml(cat.label)}</span>
        </div>
        <h3 class="card-title">${escapeHtml(item.title)}</h3>
        <p class="card-can">${escapeHtml(item.can)}</p>
        <button class="expand-btn" aria-expanded="false" aria-controls="body-${escapeHtml(item.id)}">
          <span>▼</span>
          <span class="expand-arrow">詳細</span>
        </button>
      </div>
      <div class="card-body" id="body-${escapeHtml(item.id)}">
        <div class="card-body-inner">
          <div>
            <div class="detail-label">刺さる場面</div>
            <p class="detail-text">${escapeHtml(item.scene)}</p>
          </div>
          ${libsHtml ? `<div>
            <div class="detail-label">ライブラリ</div>
            <div class="libs-row">${libsHtml}</div>
          </div>` : ""}
          <div class="snippet-wrap">
            <div class="detail-label">最小コード</div>
            <pre class="snippet-pre"><code>${escapeHtml(item.snippet)}</code></pre>
          </div>
        </div>
      </div>
    `;

    // accordion toggle
    const header = card.querySelector(".card-header");
    const btn = card.querySelector(".expand-btn");
    function toggleCard() {
      const isExpanded = card.classList.toggle("expanded");
      btn.setAttribute("aria-expanded", isExpanded);
      header.setAttribute("aria-expanded", isExpanded);
    }
    header.addEventListener("click", toggleCard);

    // keyboard
    header.addEventListener("keydown", e => {
      if (e.key === "Enter" || e.key === " ") { e.preventDefault(); toggleCard(); }
      if (e.key === "Escape" && card.classList.contains("expanded")) { toggleCard(); }
    });
    header.tabIndex = 0;

    grid.appendChild(card);

    // entrance animation (stagger via CSS delay — robust to rAF throttling)
    card.style.transitionDelay = `${idx * 60}ms`;
    card.classList.add("visible");
  });

  // stats
  document.getElementById("stat-total").textContent = ITEMS.length;

  // draw arrows (Phase 1b: SVG flow visualization)
  // wait for entrance animations + layout to settle
  setTimeout(drawArrows, ITEMS.length * 60 + 100);
  window.addEventListener("resize", drawArrows);
}

// ── SVG Arrow Flow Visualization ────────────────────────────────────────────
function drawArrows() {
  try {
    const svg = document.getElementById("flow-svg");
    if (!svg) return;

    // clear previous
    svg.innerHTML = "";

    // get all cards
    const cards = document.querySelectorAll(".item-card");
    if (cards.length === 0) return;

    // iterate over connections and draw arrows
    FLOW_CONNECTIONS.forEach(conn => {
      const fromCard = document.querySelector(`[data-id="${conn.from}"]`);
      const toCard = document.querySelector(`[data-id="${conn.to}"]`);

      if (!fromCard || !toCard) return;

      // get positions (absolute coords)
      const fromRect = fromCard.getBoundingClientRect();
      const toRect = toCard.getBoundingClientRect();
      const svgRect = svg.parentElement.getBoundingClientRect();

      // relative to grid-section
      const x1 = fromRect.left - svgRect.left + fromRect.width / 2;
      const y1 = fromRect.top - svgRect.top + fromRect.height;
      const x2 = toRect.left - svgRect.left + toRect.width / 2;
      const y2 = toRect.top - svgRect.top;

      // color by pattern
      const color = PATTERN_COLORS[conn.pattern] || "#999";

      // draw line
      const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
      line.setAttribute("x1", x1);
      line.setAttribute("y1", y1);
      line.setAttribute("x2", x2);
      line.setAttribute("y2", y2);
      line.setAttribute("stroke", color);
      line.setAttribute("stroke-width", "2");
      line.setAttribute("stroke-linecap", "round");
      svg.appendChild(line);

      // draw arrowhead (triangle)
      const dx = x2 - x1;
      const dy = y2 - y1;
      const angle = Math.atan2(dy, dx);
      const arrowSize = 8;

      // arrowhead points
      const ax1 = x2 - arrowSize * Math.cos(angle - Math.PI / 6);
      const ay1 = y2 - arrowSize * Math.sin(angle - Math.PI / 6);
      const ax2 = x2 - arrowSize * Math.cos(angle + Math.PI / 6);
      const ay2 = y2 - arrowSize * Math.sin(angle + Math.PI / 6);

      const arrowhead = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
      arrowhead.setAttribute("points", `${x2},${y2} ${ax1},${ay1} ${ax2},${ay2}`);
      arrowhead.setAttribute("fill", color);
      svg.appendChild(arrowhead);
    });

    // set visible if connections exist
    if (FLOW_CONNECTIONS.length > 0) {
      svg.style.display = "block";
    }
  } catch (e) {
    console.error("drawArrows error:", e);
  }
}

// ── Filter ──
function initFilter() {
  const bar = document.getElementById("filter-bar");
  bar.addEventListener("click", e => {
    const btn = e.target.closest(".filter-btn");
    if (!btn) return;
    bar.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    const filter = btn.dataset.filter;
    document.querySelectorAll(".item-card").forEach(card => {
      if (filter === "all" || card.dataset.category === filter) {
        card.classList.remove("hidden");
      } else {
        card.classList.add("hidden");
      }
    });
  });
}

  renderCards();
  initFilter();
  document.getElementById("stat-updated").textContent = new Date().toISOString().slice(0, 10);
  // Lucide icons
  if (typeof lucide !== "undefined") {
    lucide.createIcons();
  } else {
    // fallback: wait for script load
    document.querySelector('script[src*="lucide"]').addEventListener("load", () => lucide.createIcons());
  }
});

});

// ── Dashboard: Load data from dashboard-data.json ──
async function loadDashboardData() {
  try {
    const response = await fetch("./dashboard-data.json");
    if (!response.ok) {
      console.warn("dashboard-data.json not found, skipping dashboard");
      return null;
    }
    return await response.json();
  } catch (e) {
    console.warn("Failed to load dashboard data:", e);
    return null;
  }
}

// ── Dashboard: Render L1 candidates ──
function renderL1Section(data) {
  const container = document.getElementById("l1-list");
  if (!data || !data.l1_candidates || data.l1_candidates.length === 0) {
    container.innerHTML = "<p style='color: var(--text-muted);'>昇格候補なし</p>";
    return;
  }

  const html = data.l1_candidates
    .map(item => `
      <div class="l1-candidate-item">
        <strong>${item.date ? item.date : "未記入"}</strong> — ${item.path}
        <div class="meta">
          <span class="level-tag level-draft">未昇格</span>
          ${item.type ? `<span style="font-size: var(--fs-sm); color: var(--text-muted);">型: ${item.type}</span>` : ""}
          ${item.topic ? `<span style="font-size: var(--fs-sm); color: var(--text-muted);">テーマ: ${item.topic}</span>` : ""}
        </div>
      </div>
    `)
    .join("");

  container.innerHTML = html;
}

// ── Dashboard: Render L2 sections (grouped by level) ──
function renderL2Sections(data) {
  const container = document.getElementById("l2-content");

  const levels = [
    { key: "l2_draft", label: "Draft（草案）", tagClass: "level-draft" },
    { key: "l2_review", label: "Review（レビュー中）", tagClass: "level-review" },
    { key: "l2_published", label: "Published（公開）", tagClass: "level-published" }
  ];

  let allEmpty = true;
  const html = levels
    .map(level => {
      const items = data[level.key] || [];
      if (items.length === 0) return "";
      allEmpty = false;

      const itemsHtml = items
        .map(item => `
          <div class="l2-article-card">
            <div class="title">${item.title}</div>
            <div style="font-size: var(--fs-sm); color: var(--text-muted); margin-bottom: 0.5rem;">
              ${item.category || "未分類"}
            </div>
            <span class="level-tag ${level.tagClass}">${level.label}</span>
            <div class="score">理解度: ${item.understanding_score || 0}/5</div>
            ${item.tags && item.tags.length > 0 ? `
              <div style="font-size: var(--fs-sm); color: var(--text-muted); margin-top: 0.5rem;">
                ${item.tags.map(tag => `<span style="margin-right: 0.5rem;">#${tag}</span>`).join("")}
              </div>
            ` : ""}
          </div>
        `)
        .join("");

      return `
        <div class="l2-level-group">
          <h4>${level.label} (${items.length}件)</h4>
          <div class="l2-articles-grid">
            ${itemsHtml}
          </div>
        </div>
      `;
    })
    .join("");

  if (allEmpty) {
    container.innerHTML = "<p style='color: var(--text-muted);'>昇格済み知見なし</p>";
  } else {
    container.innerHTML = html;
  }
}

// ── Dashboard: Init and show ──
async function initDashboard() {
  const data = await loadDashboardData();
  if (!data) return;

  const dashboardEl = document.getElementById("dashboard");
  if (dashboardEl) {
    dashboardEl.style.display = "block";
  }

  renderL1Section(data);
  renderL2Sections(data);
  renderL3Section(data);

  // Log metadata
  if (data.metadata) {
    console.log("Dashboard loaded:", data.metadata);
  }
}

// ── Init Dashboard on DOM ready ──
document.addEventListener("DOMContentLoaded", () => {
  initDashboard();
});
