* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Inter','Noto Sans JP',sans-serif;
       display: flex; flex-direction: column; height: 100vh; overflow: hidden; line-break: strict; overflow-wrap: break-word; }

/* ── Header ── */
header { padding: 8px 16px; background: var(--surface); border-bottom: 1px solid var(--border);

header h1 { font-size: 0.95rem; font-weight: 700; color: var(--accent); white-space: nowrap; }
.stats { display: flex; gap: 8px; font-size: 0.75rem; color: var(--sub); flex-wrap: wrap; }
.stats span { background: var(--bg); border: 1px solid var(--border); padding: 2px 7px; border-radius: 4px; }
.gen-time { font-size: 0.68rem; color: var(--sub); margin-left: auto; white-space: nowrap; }

/* ── Controls ── */
.controls { padding: 8px 16px; background: var(--surface); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 10px; flex-shrink: 0; flex-wrap: wrap; }
.search-wrap { position: relative; }
.search-wrap input { background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text); font-size: 0.8rem; padding: 4px 10px 4px 28px; width: 180px; outline: none; }
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap::before { content: '🔍'; position: absolute; left: 7px; top: 50%; transform: translateY(-50%);
  font-size: 0.7rem; pointer-events: none; }
.filter-group { display: flex; gap: 4px; flex-wrap: wrap; }
.filter-btn { background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
  color: var(--sub); font-size: 0.72rem; padding: 3px 8px; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
.filter-btn.active { color: var(--text); }
.filter-btn[data-cat="all"].active { border-color: var(--accent); color: var(--accent); }
.filter-btn[data-cat="AI活用"].active { border-color: var(--c-ai); color: var(--c-ai); }
.filter-btn[data-cat="Claude Code"].active { border-color: var(--c-cc); color: var(--c-cc); }
.filter-btn[data-cat="設備技術"].active { border-color: var(--c-equip); color: var(--c-equip); }
.filter-btn[data-cat="業務改善"].active { border-color: var(--c-improve); color: var(--c-improve); }
.filter-btn[data-cat="ビジネススキル"].active { border-color: var(--c-biz); color: var(--c-biz); }
.filter-btn[data-status="published"].active { border-color: #10b981; color: #10b981; }
.filter-btn[data-status="review"].active { border-color: #60a5fa; color: #60a5fa; }
.filter-btn[data-status="draft"].active { border-color: #c084fc; color: #c084fc; }
.filter-btn[data-toggle="isolated"].active { border-color: #fb923c; color: #fb923c; }
.sep { color: var(--border); font-size: 0.8rem; }

/* ── Main layout ── */
.main { display: flex; flex: 1; overflow: hidden; }
#graph { flex: 1; min-width: 0; }

/* ── Detail Panel ── */
#detail-panel { width: var(--panel-w); background: var(--surface); border-left: 1px solid var(--border);
  overflow-y: auto; padding: 16px; font-size: 0.82rem; display: none; flex-shrink: 0; }
#detail-panel.open { display: block; }
.dp-close { float: right; background: none; border: none; color: var(--sub); font-size: 1rem;
  cursor: pointer; line-height: 1; padding: 2px 4px; }
.dp-close:hover { color: var(--text); }
.dp-title { font-size: 0.95rem; font-weight: 700; color: var(--text); margin-bottom: 12px;
  line-height: 1.4; padding-right: 24px; }
.dp-row { display: flex; justify-content: space-between; align-items: flex-start;

.dp-label { color: var(--sub); font-size: 0.75rem; white-space: nowrap; flex-shrink: 0; }
.dp-val { color: var(--text); font-size: 0.78rem; text-align: right; }
.badge { display: inline-block; padding: 1px 7px; border-radius: 3px; font-size: 0.7rem; font-weight: 600; }
.badge-pub { background: #064e3b; color: #6ee7b7; }
.badge-rev { background: #1e3a5f; color: #93c5fd; }
.badge-draft { background: #2d1f3d; color: #c4b5fd; }
.stars { color: #f59e0b; font-size: 0.85rem; letter-spacing: 1px; }
.dp-section { margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border); }
.dp-section-title { color: var(--sub); font-size: 0.72rem; text-transform: uppercase;
  letter-spacing: 0.06em; margin-bottom: 8px; }
.dp-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.dp-tag { background: var(--bg); border: 1px solid var(--border); border-radius: 3px;
  color: var(--sub); font-size: 0.68rem; padding: 1px 6px; }
.dp-related { display: flex; flex-direction: column; gap: 4px; }
.dp-related-link { color: var(--accent); font-size: 0.76rem; cursor: pointer; text-decoration: none;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.dp-related-link:hover { text-decoration: underline; }
.dp-open-btn { display: inline-block; margin-top: 12px; background: var(--accent); color: #0f172a;
  font-size: 0.75rem; font-weight: 700; padding: 5px 12px; border-radius: 5px; text-decoration: none;

.dp-open-btn:hover { opacity: 0.85; }
.dp-hub-info { color: var(--sub); font-size: 0.78rem; line-height: 1.6; }
.no-select { color: var(--sub); font-size: 0.8rem; text-align: center; margin-top: 40px; line-height: 1.8; }

.legend { padding: 6px 16px; background: var(--surface); border-bottom: 1px solid var(--border);
  display: flex; gap: 12px; font-size: 0.72rem; color: var(--sub); flex-wrap: wrap; flex-shrink: 0; align-items: center; }
.leg { display: flex; align-items: center; gap: 4px; }
.leg-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.leg-sep { color: var(--border); }
</style>

  allEdges.push({
    id: `__center__→${h.id}`,
    from: '__center__', to: h.id,
    color: { color: '#475569', opacity: 0.4 },
    width: 1.5, dashes: true,
    smooth: { type: 'dynamic' },
    _isHub: true
  });
});

// Knowledge nodes
RAW_NODES.forEach(n => {
  const c = CAT_COLOR[n.category] || '#475569';
  const short = n.title.length > 18 ? n.title.slice(0, 16) + '…' : n.title;
  allNodes.push({
    id: n.id,
    label: short,
    shape: makeShape(n.level),
    size: makeSize(n.score),
    font: { size: 12, color: '#e2e8f0' },
    color: { background: c, border: c, highlight: { background: '#334155', border: '#38bdf8' } },
    _category: n.category,
    _level: n.level,
    _score: n.score,
    _tags: n.tags,
    _summary: n.summary,
    _related: n.related,
    _fullTitle: n.title,
    _isHub: false,
    title: n.title
  });
  // Edge: hub → knowledge node
  const hubId = CAT_TO_HUB[n.category];
  if (hubId) {
    allEdges.push({
      id: `${hubId}→${n.id}`,
      from: hubId, to: n.id,
      color: { color: CAT_COLOR[n.category], opacity: 0.25 },
      width: 1, dashes: false,
      smooth: { type: 'dynamic' },
      _isHub: true
    });
  }
});

// Knowledge edges
RAW_EDGES.forEach((e, i) => {
  allEdges.push({
    id: `ke_${i}`,
    from: e.from, to: e.to,
    label: e.rel,
    font: { size: 9, color: '#94a3b8', align: 'middle' },
    color: { color: '#94a3b8', opacity: 0.55 },
    width: 1.8,
    smooth: { type: 'curvedCW', roundness: 0.15 },
    _rel: e.rel,
    _isHub: false
  });
});

// ─── VIS NETWORK ─────────────────────────────────────────────────────────────

const visNodes = new vis.DataSet(allNodes);
const visEdges = new vis.DataSet(allEdges);

const container = document.getElementById('graph');
const options = {
  physics: {
    solver: 'forceAtlas2Based',
    forceAtlas2Based: { gravitationalConstant: -160, springLength: 200, springConstant: 0.03, damping: 0.45, centralGravity: 0.01 },
    stabilization: { iterations: 400 },
  },
  interaction: { hover: true, tooltipDelay: 200, navigationButtons: true, zoomView: true, multiselect: false },
  nodes: { borderWidth: 1.5, scaling: { min: 10, max: 36 } },
  edges: { smooth: { type: 'dynamic' }, arrows: { to: { enabled: true, scaleFactor: 0.4 } } },
};

const network = new vis.Network(container, { nodes: visNodes, edges: visEdges }, options);

network.on('stabilizationIterationsDone', () => { network.fit({ animation: { duration: 600, easingFunction: 'easeInOutQuad' } }); });
window.addEventListener('resize', () => { network.fit(); });

// ─── DETAIL PANEL ────────────────────────────────────────────────────────────

const panel = document.getElementById('detail-panel');
const dpContent = document.getElementById('dp-content');

function scoreStars(s) {
  if (!s) return '<span style="color:var(--sub)">—</span>';
  return '<span class="stars">' + '★'.repeat(s) + '</span><span style="color:var(--border)">' + '★'.repeat(5-s) + '</span>';
}
function levelBadge(lv) {
  if (lv === 'published') return '<span class="badge badge-pub">★ published</span>';
  if (lv === 'review') return '<span class="badge badge-rev">◆ review</span>';
  if (lv === 'draft') return '<span class="badge badge-draft">● draft</span>';
  return '';
}

function openPanel(nodeId) {
  const n = visNodes.get(nodeId);
  if (!n) return;
  panel.classList.add('open');

  if (n._isHub) {
    dpContent.innerHTML = `
      <button class="dp-close" id="dp-close">✕</button>
      <div class="dp-title">${n.label.replace('\n', ' ')}</div>
      <p class="dp-hub-info">カテゴリハブノードです。<br>このカテゴリに属するノードを選択すると詳細が表示されます。</p>`;
    document.getElementById('dp-close').addEventListener('click', closePanel);
    return;
  }

  const relatedLinks = (n._related || []).map(rid => {
    const rn = visNodes.get(rid);
    const label = rn ? rn._fullTitle || rid : rid;
    return `<a class="dp-related-link" data-id="${rid}" href="#">${label}</a>`;
  }).join('');

  const tagHtml = (n._tags || []).map(t => `<span class="dp-tag">${t}</span>`).join('');
  const fileBase = n.id.replace('.md', '');

  dpContent.innerHTML = `
    <button class="dp-close" id="dp-close">✕</button>
    <div class="dp-title">${n._fullTitle || n.label}</div>
    <div class="dp-row"><span class="dp-label">カテゴリ</span><span class="dp-val">${n._category || '—'}</span></div>
    <div class="dp-row"><span class="dp-label">ステータス</span><span class="dp-val">${levelBadge(n._level)}</span></div>
    <div class="dp-row"><span class="dp-label">理解度</span><span class="dp-val">${scoreStars(n._score)}</span></div>
    ${n._summary ? `<div class="dp-section"><div class="dp-section-title">概要</div><p style="color:var(--sub);font-size:0.78rem;line-height:1.7">${n._summary}</p></div>` : ''}
    ${tagHtml ? `<div class="dp-section"><div class="dp-section-title">タグ</div><div class="dp-tags">${tagHtml}</div></div>` : ''}
    ${relatedLinks ? `<div class="dp-section"><div class="dp-section-title">関連ノード</div><div class="dp-related">${relatedLinks}</div></div>` : ''}
    <a class="dp-open-btn" href="http://localhost:8092/knowledge/${fileBase}" target="_blank">📄 ナレッジを開く</a>`;

  document.getElementById('dp-close').addEventListener('click', closePanel);
  document.querySelectorAll('.dp-related-link').forEach(el => {
    el.addEventListener('click', (e) => { e.preventDefault(); network.selectNodes([el.dataset.id]); openPanel(el.dataset.id); });
  });
}

function closePanel() {
  panel.classList.remove('open');
  network.unselectAll();
}

document.getElementById('dp-close').addEventListener('click', closePanel);

network.on('click', (params) => {
  if (params.nodes.length > 0) {
    const nodeId = params.nodes[0];
    openPanel(nodeId);
    // Highlight connected edges
    const connEdges = network.getConnectedEdges(nodeId);
    visEdges.get().forEach(e => {
      visEdges.update({ id: e.id, color: connEdges.includes(e.id)
        ? { color: '#38bdf8', opacity: 0.9 }
        : { color: e._isHub ? (CAT_COLOR[visNodes.get(e.from)?._category] || '#475569') : '#94a3b8', opacity: 0.2 } });
    });
  } else {
    closePanel();
    resetEdgeColors();
  }
});

function resetEdgeColors() {
  visEdges.get().forEach(e => {
    const fromNode = visNodes.get(e.from);
    visEdges.update({ id: e.id, color: e._isHub
      ? { color: fromNode ? (CAT_COLOR[fromNode._category] || '#475569') : '#475569', opacity: e.from === '__center__' ? 0.4 : 0.25 }
      : { color: '#94a3b8', opacity: 0.55 } });
  });
}

// ─── SEARCH & FILTERS ────────────────────────────────────────────────────────

let activeCats = new Set(['all']);
let activeStatus = new Set(['published', 'review', 'draft']);
let showIsolatedOnly = false;

document.getElementById('search').addEventListener('input', applyFilters);

document.querySelectorAll('#cat-filters .filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const cat = btn.dataset.cat;
    if (cat === 'all') {
      activeCats = new Set(['all']);
      document.querySelectorAll('#cat-filters .filter-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === 'all'));
    } else {
      activeCats.delete('all');
      document.querySelector('[data-cat="all"]').classList.remove('active');
      btn.classList.toggle('active');
      if (btn.classList.contains('active')) activeCats.add(cat);
      else activeCats.delete(cat);
      if (activeCats.size === 0) {
        activeCats.add('all');
        document.querySelector('[data-cat="all"]').classList.add('active');
      }
    }
    applyFilters();
  });
});

document.querySelectorAll('#status-filters .filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const st = btn.dataset.status;
    btn.classList.toggle('active');
    if (btn.classList.contains('active')) activeStatus.add(st);
    else activeStatus.delete(st);
    applyFilters();
  });
});

document.getElementById('btn-isolated').addEventListener('click', function() {
  showIsolatedOnly = !showIsolatedOnly;
  this.classList.toggle('active', showIsolatedOnly);
  applyFilters();
});

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase();
  const showAll = activeCats.has('all');

  // Find isolated knowledge nodes (no knowledge-level edges)
  const knowledgeEdgePairs = new Set(
    RAW_EDGES.flatMap(e => [e.from, e.to])
  );

  allNodes.forEach(n => {
    if (n._isHub) {
      visNodes.update({ id: n.id, hidden: false });
      return;
    }
    let visible = true;
    if (!showAll && !activeCats.has(n._category)) visible = false;
    if (n._level && !activeStatus.has(n._level)) visible = false;
    if (q && !n._fullTitle?.toLowerCase().includes(q) && !n._category?.toLowerCase().includes(q)) visible = false;
    if (showIsolatedOnly && knowledgeEdgePairs.has(n.id)) visible = false;
    visNodes.update({ id: n.id, hidden: !visible });
  });

  // Hide hub→node edges for hidden nodes; hide hub nodes with no visible children
  const visibleNodeIds = new Set(allNodes.filter(n => !visNodes.get(n.id).hidden).map(n => n.id));
  allEdges.forEach(e => {
    if (e._isHub) {
      const hidden = !visibleNodeIds.has(e.from) || !visibleNodeIds.has(e.to);
      visEdges.update({ id: e.id, hidden });
    }
  });

  // Hide hub nodes that have no visible children
  HUB_NODES.filter(h => !h.isCenter).forEach(h => {
    const hasChild = allNodes.some(n => !n._isHub && visibleNodeIds.has(n.id) && n._category === h.category);
    visNodes.update({ id: h.id, hidden: !hasChild });
  });
}
</script>
