<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow">
<title>電験3種 法規Wiki（新）</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@500;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    /* ウォーム系トーン */
    --bg:        oklch(0.985 0.008 75);    /* オフホワイト */
    --bg-2:      oklch(0.965 0.012 70);    /* 淡いベージュ */
    --bg-3:      oklch(0.945 0.018 70);    /* もう一段濃いベージュ */
    --card:      oklch(0.995 0.004 75);
    --line:      oklch(0.90 0.012 70);
    --line-2:    oklch(0.84 0.015 65);
    --ink:       oklch(0.22 0.012 60);     /* 主文字 */
    --ink-2:     oklch(0.42 0.012 60);     /* 副文字 */
    --ink-3:     oklch(0.58 0.012 60);     /* 補助 */
    --accent:    oklch(0.62 0.13 45);      /* テラコッタ */
    --accent-2:  oklch(0.55 0.08 70);      /* ベージュブラウン */
    --accent-soft: oklch(0.93 0.04 55);
    --rank-s-bg: oklch(0.62 0.13 45);
    --rank-s-fg: oklch(0.99 0.005 75);
    --rank-a-bg: oklch(0.86 0.08 60);
    --rank-a-fg: oklch(0.32 0.06 50);
    --rank-b-bg: oklch(0.93 0.03 75);
    --rank-b-fg: oklch(0.42 0.02 60);
    --warn:      oklch(0.65 0.15 35);
    --good:      oklch(0.55 0.09 145);
    --shadow-sm: 0 1px 0 oklch(0.90 0.012 70 / 0.6);
    --shadow:    0 1px 2px oklch(0.30 0.02 60 / 0.04), 0 4px 14px oklch(0.30 0.02 60 / 0.05);
    --radius:    10px;
    --radius-lg: 14px;
    --serif: 'Noto Serif JP', 'Hiragino Mincho ProN', serif;
    --sans:  'Noto Sans JP', 'Hiragino Sans', system-ui, sans-serif;
    --mono:  'JetBrains Mono', ui-monospace, monospace;
  }
  [data-theme="dark"] {
    --bg:        oklch(0.20 0.010 60);
    --bg-2:      oklch(0.24 0.012 60);
    --bg-3:      oklch(0.28 0.014 60);
    --card:      oklch(0.23 0.010 60);
    --line:      oklch(0.33 0.012 60);
    --line-2:    oklch(0.40 0.015 60);
    --ink:       oklch(0.92 0.008 70);
    --ink-2:     oklch(0.74 0.010 65);
    --ink-3:     oklch(0.58 0.010 65);
    --accent-soft: oklch(0.30 0.05 50);
    --rank-a-bg: oklch(0.34 0.06 55);
    --rank-a-fg: oklch(0.88 0.06 60);
    --rank-b-bg: oklch(0.28 0.03 65);
    --rank-b-fg: oklch(0.74 0.02 60);
    --shadow-sm: 0 1px 0 oklch(0.08 0 0 / 0.4);
    --shadow:    0 1px 2px oklch(0.08 0 0 / 0.3), 0 4px 14px oklch(0.08 0 0 / 0.20);
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-feature-settings: "palt";
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; }

  /* ── レイアウト ── */
  .app {
    display: grid;
    grid-template-columns: 256px 1fr;
    min-height: 100vh;
  }
  @media (max-width: 900px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { display: none; }
  }

  /* ── サイドバー ── */
  .sidebar {
    border-right: 1px solid var(--line);
    background: var(--bg-2);
    padding: 22px 14px 28px;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 4px 8px 18px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 14px;
  }
  .brand-mark {
    width: 30px; height: 30px;
    border-radius: 8px;
    background: var(--accent);
    color: var(--rank-s-fg);
    display: grid; place-items: center;
    font-family: var(--serif);
    font-weight: 900;
    font-size: 16px;
    box-shadow: inset 0 0 0 2px oklch(0.99 0.005 75 / 0.18);
  }
  .brand-name {
    font-family: var(--serif);
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.02em;
  }
  .brand-sub {
    font-size: 11px;
    color: var(--ink-3);
    margin-top: -2px;
    letter-spacing: 0.06em;
  }
  .nav-group {
    margin: 14px 0 6px;
  }
  .nav-group-title {
    font-size: 11px;
    color: var(--ink-3);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    padding: 0 8px;
    margin-bottom: 6px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    border-radius: 8px;
    font-size: 13.5px;
    color: var(--ink-2);
    line-height: 1.3;
    cursor: pointer;
    user-select: none;
  }
  .nav-item:hover { background: var(--bg-3); color: var(--ink); }
  .nav-item.active {
    background: var(--accent-soft);
    color: var(--ink);
    font-weight: 500;
  }
  .nav-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-3);
    width: 18px;
    flex: none;
  }
  .nav-item.active .nav-num { color: var(--accent); }
  .nav-children {
    margin: 2px 0 6px 18px;
    padding-left: 10px;
    border-left: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  .nav-child {
    padding: 4px 8px;
    font-size: 12.5px;
    color: var(--ink-2);
    border-radius: 6px;
    cursor: pointer;
  }
  .nav-child:hover { background: var(--bg-3); color: var(--ink); }
  .nav-foot {
    margin-top: 18px;
    padding: 12px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
  }
  .streak-row {
    display: flex; align-items: baseline; gap: 6px;
  }
  .streak-num {
    font-family: var(--serif);
    font-weight: 900;
    font-size: 26px;
    color: var(--accent);
    line-height: 1;
  }
  .streak-unit {
    font-size: 12px;
    color: var(--ink-2);
  }
  .streak-label {
    font-size: 11px;
    color: var(--ink-3);
    margin-bottom: 6px;
    letter-spacing: 0.06em;
  }
  .streak-dots {
    display: flex; gap: 3px; margin-top: 8px;
  }
  .streak-dot {
    width: 10px; height: 10px; border-radius: 3px;
    background: var(--bg-3);
  }
  .streak-dot.on { background: var(--accent); }
  .streak-dot.today { background: var(--accent); outline: 2px solid var(--accent-soft); outline-offset: 1px; }

  /* ── メイン ── */
  .main {
    min-width: 0;
  }
  .topbar {
    position: sticky; top: 0; z-index: 10;
    background: oklch(0.985 0.008 75 / 0.85);
    backdrop-filter: saturate(1.2) blur(10px);
    border-bottom: 1px solid var(--line);
    padding: 10px 28px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .crumbs {
    font-size: 12.5px;
    color: var(--ink-3);
    display: flex; gap: 6px; align-items: center;
  }
  .crumbs .sep { color: var(--line-2); }
  .search {
    flex: 1;
    max-width: 520px;
    margin-left: auto;
    position: relative;
  }
  .search input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 8px 12px 8px 34px;
    font-size: 13px;
    color: var(--ink);
    font-family: inherit;
    outline: none;
  }
  .search input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .search .icn { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--ink-3); font-size: 13px; }
  .search .kbd {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    font-family: var(--mono); font-size: 10.5px; color: var(--ink-3);
    border: 1px solid var(--line); border-radius: 4px; padding: 1px 5px;
    background: var(--bg);
  }
  .search-results {
    position: absolute; top: calc(100% + 6px); left: 0; right: 0;
    background: var(--card); border: 1px solid var(--line);
    border-radius: 10px; box-shadow: var(--shadow);
    z-index: 200; overflow: hidden; display: none;
  }
  .search-results.open { display: block; }
  .sr-item {
    display: flex; flex-direction: column; gap: 2px;
    padding: 9px 14px; cursor: pointer;
    border-bottom: 1px solid var(--line); transition: background 0.1s;
  }
  .sr-item:last-child { border-bottom: none; }
  .sr-item:hover, .sr-item.focused { background: var(--accent-soft); }
  .sr-label { font-size: 13px; color: var(--ink); font-weight: 500; }
  .sr-sub   { font-size: 11px; color: var(--ink-3); }
  .sr-empty { padding: 12px 14px; font-size: 13px; color: var(--ink-3); text-align: center; }
  .top-actions { display: flex; gap: 8px; align-items: center; }
  .icon-btn {
    width: 32px; height: 32px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: var(--card);
    display: grid; place-items: center;
    color: var(--ink-2);
    font-size: 14px;
  }
  .icon-btn:hover { border-color: var(--line-2); color: var(--ink); }

  .content {
    padding: 28px 28px 80px;
    max-width: 1180px;
    margin: 0 auto;
  }

  /* ── ヒーロー ── */
  .hero {
    background:
      radial-gradient(80% 120% at 90% -10%, oklch(0.93 0.06 55) 0%, transparent 60%),
      radial-gradient(60% 100% at 0% 110%, oklch(0.95 0.03 80) 0%, transparent 55%),
      var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    padding: 28px 32px;
    box-shadow: var(--shadow);
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 28px;
  }
  @media (max-width: 880px) {
    .hero { grid-template-columns: 1fr; padding: 22px; }
  }
  .hero-eyebrow {
    font-family: var(--mono);
    font-size: 11.5px;
    letter-spacing: 0.18em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .hero h1 {
    font-family: var(--serif);
    font-weight: 900;
    font-size: 38px;
    line-height: 1.25;
    letter-spacing: 0.01em;
    margin: 0 0 10px;
    color: var(--ink);
    text-wrap: pretty;
  }
  .hero h1 em {
    font-style: normal;
    background: linear-gradient(180deg, transparent 65%, var(--accent-soft) 65%);
    padding: 0 2px;
  }
  .hero-sub {
    font-size: 15px;
    color: var(--ink-2);
    margin: 0 0 22px;
    max-width: 560px;
    text-wrap: pretty;
  }
  .cta-row {
    display: flex; flex-wrap: wrap; gap: 10px;
  }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 16px;
    border-radius: 9px;
    font-size: 13.5px;
    font-weight: 500;
    border: 1px solid transparent;
    transition: transform 0.05s ease, background 0.15s;
  }
  .btn:active { transform: translateY(1px); }
  .btn.primary {
    background: var(--accent);
    color: var(--rank-s-fg);
  }
  .btn.primary:hover { background: oklch(0.58 0.14 45); }
  .btn.secondary {
    background: var(--card);
    color: var(--ink);
    border-color: var(--line-2);
  }
  .btn.secondary:hover { background: var(--bg-2); }
  .btn .arrow { transition: transform 0.15s; }
  .btn:hover .arrow { transform: translateX(2px); }

  .hero-side {
    background: oklch(0.99 0.005 75 / 0.5);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 16px 18px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .resume-label {
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--ink-3);
    text-transform: uppercase;
  }
  .resume-title {
    font-family: var(--serif);
    font-weight: 700;
    font-size: 16px;
    color: var(--ink);
    margin-top: 4px;
  }
  .resume-meta {
    font-size: 12px;
    color: var(--ink-3);
    display: flex; gap: 8px; align-items: center;
    margin-top: 4px;
  }
  .progress {
    height: 6px;
    background: var(--bg-3);
    border-radius: 999px;
    overflow: hidden;
    margin-top: 10px;
  }
  .progress > span {
    display: block; height: 100%;
    background: var(--accent);
    border-radius: 999px;
  }
  .progress-text {
    display: flex; justify-content: space-between;
    font-size: 11.5px;
    color: var(--ink-3);
    margin-top: 6px;
    font-family: var(--mono);
  }
  .resume-btn {
    margin-top: 4px;
    width: 100%;
    justify-content: center;
  }

  /* ── セクション ── */
  .section {
    margin-top: 44px;
  }
  .section-head {
    display: flex; align-items: flex-end; justify-content: space-between;
    margin-bottom: 16px;
    gap: 16px;
  }
  .section-title {
    font-family: var(--serif);
    font-weight: 700;
    font-size: 22px;
    margin: 0;
    color: var(--ink);
    letter-spacing: 0.01em;
  }
  .section-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.18em;
    margin-bottom: 4px;
  }
  .section-sub {
    font-size: 13px;
    color: var(--ink-2);
    margin: 4px 0 0;
  }
  .section-link {
    font-size: 12.5px;
    color: var(--ink-2);
    border-bottom: 1px solid var(--line-2);
    padding-bottom: 1px;
  }
  .section-link:hover { color: var(--accent); border-color: var(--accent); }

  /* ── ロードマップ ── */
  .roadmap {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    position: relative;
  }
  @media (max-width: 1000px) {
    .roadmap { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 560px) {
    .roadmap { grid-template-columns: 1fr; }
  }
  .step {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px 16px 18px;
    position: relative;
    box-shadow: var(--shadow-sm);
  }
  .step.done { background: oklch(0.97 0.02 70); }
  .step.current { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft), var(--shadow-sm); }
  .step-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px;
  }
  .step-no {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-3);
    letter-spacing: 0.12em;
  }
  .step.current .step-no { color: var(--accent); }
  .step-status {
    font-size: 10.5px;
    padding: 2px 7px;
    border-radius: 999px;
    font-weight: 500;
    letter-spacing: 0.06em;
  }
  .status-done { background: oklch(0.92 0.05 145); color: oklch(0.32 0.07 145); }
  .status-now  { background: var(--accent); color: var(--rank-s-fg); }
  .status-next { background: var(--bg-3); color: var(--ink-3); }
  .step-title {
    font-family: var(--serif);
    font-weight: 700;
    font-size: 15px;
    margin: 4px 0 6px;
    color: var(--ink);
    line-height: 1.35;
  }
  .step-desc {
    font-size: 12.5px;
    color: var(--ink-2);
    line-height: 1.55;
    margin: 0 0 10px;
  }
  .step-progress {
    height: 4px;
    background: var(--bg-3);
    border-radius: 999px;
    overflow: hidden;
  }
  .step-progress > span {
    display: block; height: 100%;
    background: var(--accent);
  }
  .step-meta {
    margin-top: 6px;
    display: flex; justify-content: space-between;
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--ink-3);
  }

  /* ── 頻出テーマカード ── */
  .topics {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }
  @media (max-width: 1000px) { .topics { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 560px)  { .topics { grid-template-columns: 1fr; } }
  .topic {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: border-color 0.15s, transform 0.05s;
    cursor: pointer;
  }
  .topic:hover { border-color: var(--accent); transform: translateY(-1px); }
  .topic-head {
    display: flex; align-items: center; justify-content: space-between;
  }
  .topic-name {
    font-family: var(--serif);
    font-weight: 700;
    font-size: 16px;
    color: var(--ink);
  }
  .rank {
    font-family: var(--mono);
    font-weight: 700;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 6px;
    letter-spacing: 0.04em;
  }
  .rank-S { background: var(--rank-s-bg); color: var(--rank-s-fg); }
  .rank-A { background: var(--rank-a-bg); color: var(--rank-a-fg); }
  .rank-B { background: var(--rank-b-bg); color: var(--rank-b-fg); }
  .topic-meta {
    font-size: 11.5px;
    color: var(--ink-3);
    font-family: var(--mono);
    display: flex; gap: 10px;
  }
  .topic-tags {
    display: flex; flex-wrap: wrap; gap: 4px;
  }
  .tag {
    font-size: 11px;
    color: var(--ink-2);
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 2px 7px;
    font-family: var(--mono);
  }
  .tag.warn { color: oklch(0.45 0.12 35); background: oklch(0.96 0.04 50); border-color: oklch(0.88 0.06 45); }
  .tag.hot  { color: var(--accent); background: var(--accent-soft); border-color: oklch(0.86 0.06 50); }

  /* ── 表暗記 ── */
  .tables {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
  }
  @media (max-width: 760px) { .tables { grid-template-columns: 1fr; } }
  .table-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px 0 0;
    overflow: hidden;
  }
  .table-card-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px 10px;
  }
  .table-card-title {
    font-family: var(--serif);
    font-weight: 700;
    font-size: 15px;
  }
  .table-card-sub {
    font-size: 11.5px;
    color: var(--ink-3);
    margin-top: 2px;
  }
  .table-scroll {
    overflow-x: auto;
    border-top: 1px solid var(--line);
  }
  .mini-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12.5px;
    min-width: 380px;
  }
  .mini-table th, .mini-table td {
    padding: 8px 12px;
    text-align: left;
    border-bottom: 1px solid var(--line);
    white-space: nowrap;
  }
  .mini-table th {
    background: var(--bg-2);
    font-weight: 500;
    color: var(--ink-2);
    font-size: 11.5px;
    letter-spacing: 0.04em;
  }
  .mini-table td.num {
    font-family: var(--mono);
    color: var(--ink);
    font-weight: 500;
  }
  .table-card-foot {
    padding: 10px 16px;
    display: flex; justify-content: space-between;
    border-top: 1px solid var(--line);
    background: var(--bg-2);
    font-size: 12px;
    color: var(--ink-2);
  }
  .table-card-foot a { color: var(--accent); }

  /* ── 過去問検索 ── */
  .past {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    padding: 18px;
  }
  .past-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
  }
  @media (max-width: 900px) { .past-grid { grid-template-columns: repeat(2, 1fr); } }
  .filter {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .filter-label {
    font-size: 11px;
    color: var(--ink-3);
    letter-spacing: 0.1em;
    text-transform: uppercase;

    background-repeat: no-repeat;
    padding-right: 26px;

  .past-tags {

  .chip {

    margin-top: 16px;

  .choice.wrong   { border-color: var(--warn); background: oklch(0.96 0.04 35); }

function GoalQuestion({ question, choices, year, note }) {
  return (
    <div className="goal-question">
      <div className="goal-label">🎯 ゴール問題 — このページを読み終えたらこの問題に戻ろう</div>
      {year && <div style={{ fontSize: '11px', color: 'var(--ink-3)', marginBottom: '6px' }}>{year}</div>}
      <p className="goal-q">{question}</p>
      {choices && choices.length > 0 && (
        <details className="goal-choices">
          <summary>選択肢を表示</summary>
          <ol style={{ paddingLeft: '20px', marginTop: '8px', fontSize: '13px', lineHeight: '1.7' }}>
            {choices.map((c, i) => (
              <li key={i}>{c}</li>
            ))}
          </ol>
        </details>
      )}
      {note && <div style={{ fontSize: '12px', color: 'var(--ink-3)', marginTop: '8px' }}>{note}</div>}
    </div>
  );
}

function ConclusionBox({ children }) {
  return (
    <div className="conclusion-box">
      <div className="conclusion-label">まず覚える結論</div>
      <div style={{ fontSize: '14px', lineHeight: '1.8' }}>{children}</div>
    </div>
  );
}

function MetaStrip({ ch, category, importance, freq, examType, targets, tags, lastChecked }) {
  const importanceBg = importance === 'S' ? 'var(--rank-s-bg)' :
                       importance === 'A' ? 'var(--rank-a-bg)' :
                       importance === 'B' ? 'var(--rank-b-bg)' : 'var(--bg-2)';
  const rows = [
    ch && ['チャプター', ch],
    category && ['カテゴリ', category],
    importance && ['重要度', <span style={{ background: importanceBg, padding: '1px 8px', borderRadius: '4px', fontWeight: '700' }}>{importance}</span>],
    freq && ['出題頻度', freq],
    examType && ['問題形式', examType],
    targets && ['対象', Array.isArray(targets) ? targets.join(' / ') : targets],
    tags && ['タグ', Array.isArray(tags) ? tags.join(', ') : tags],
    lastChecked && ['最終確認', lastChecked],
  ].filter(Boolean);

  return (
    <table className="meta-strip-table">
      <tbody>
        {rows.map(([label, value], i) => (
          <tr key={i}>
            <td>{label}</td>
            <td>{value}</td>
          </tr>
        ))}
      </tbody>
    </table>
  );
}

function ExamFocus({ items }) {
  return (
    <div className="exam-focus">
      <div style={{ fontWeight: '700', fontSize: '13px', marginBottom: '10px', color: 'var(--ink-2)' }}>試験で問われること</div>
      <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '13px' }}>
        <tbody>
          {items.map((item, i) => (
            <tr key={i}>
              <td style={{ padding: '6px 10px', width: '120px', color: 'var(--ink-3)', borderTop: i > 0 ? '1px solid var(--line)' : 'none' }}>
                {item.label}
              </td>
              <td style={{ padding: '6px 10px', borderTop: i > 0 ? '1px solid var(--line)' : 'none' }}>
                {item.value}
              </td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

        <div style={{ padding: '6px 18px 10px', fontSize: '11px', color: 'var(--ink-3)' }}>出典: {source}</div>

function PlainExplain({ children }) {

function MemTable({ headers, rows, note }) {

      <table className="mini-table" style={{ width: '100%', borderCollapse: 'collapse', fontSize: '13px', tableLayout: 'auto' }}>

                <th key={i} style={{ padding: '8px 12px', background: 'var(--bg-2)', borderBottom: '2px solid var(--line)', textAlign: 'left', fontSize: '12px', color: 'var(--ink-2)', wordBreak: 'break-word' }}>

          {rows.map((row, ri) => (

                <td key={ci} style={{ padding: '8px 12px', borderBottom: '1px solid var(--line)', verticalAlign: 'top', wordBreak: 'break-word', overflowWrap: 'break-word' }}>
                  {cell}

function SolveFlow({ type, steps }) {

function TrapTable({ traps }) {
  return (
    <div style={{ marginBottom: '24px' }}>
      <div style={{ fontWeight: '700', fontSize: '12px', color: 'var(--warn)', marginBottom: '8px' }}>⚠ よくあるひっかけ</div>
      <table className="trap-table">
        <thead>
          <tr>

function ExamQuestion({ year, qNum, question, choices, note }) {
  return (
    <div style={{
      border: '1px solid var(--line)',

      padding: '16px 20px',

        <ol style={{ paddingLeft: '20px', margin: 0, fontSize: '13px', lineHeight: '1.7' }}>

            <li key={i} data-correct={c.correct ? 'true' : undefined}>

}

function ExamAnswer({ correct, explanations }) {
  return (
    <div style={{ marginBottom: '24px' }}>
      <div style={{
        display: 'inline-block',
        background: 'var(--good)',
        color: '#fff',
        fontWeight: '700',

        padding: '4px 12px',

      {explanations && explanations.length > 0 && (
        <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '13px' }}>
          <tbody>

              <tr key={i} style={{ borderTop: i > 0 ? '1px solid var(--line)' : 'none' }}>
                <td style={{ padding: '8px 10px', width: '40px', fontWeight: '700', textAlign: 'center' }}>{ex.choice}</td>
                <td style={{
                  padding: '8px 10px',
                  width: '30px',
                  color: ex.mark === '○' ? 'var(--good)' : 'var(--warn)',
                  fontWeight: '700',
                  fontSize: '15px',

                  {ex.mark}
                </td>
                <td style={{ padding: '8px 10px', lineHeight: '1.7' }}>{ex.reason}</td>
              </tr>
            ))}
          </tbody>
        </table>

function QuickReview({ items }) {
  const limited = items.slice(0, 5);
  return (
    <div className="quick-review" style={{ marginBottom: '24px' }}>
      <div style={{ fontWeight: '700', fontSize: '13px', marginBottom: '10px', color: 'var(--ink-2)' }}>1分復習</div>

        <details key={i} className="quick-review">
          <summary>Q{i + 1}: {item.q}　（クリックで答えを確認）</summary>
          <div className="quick-review-answer">A: {item.a}</div>
        </details>
      ))}

function CrossRef({ patterns }) {
  return (
    <div className="cross-ref">
      <div style={{ fontWeight: '700', fontSize: '12px', color: 'var(--ink-2)', marginBottom: '10px', letterSpacing: '0.05em' }}>
        掛け算出題パターン
      </div>
      {patterns.map((p, i) => (
        <div key={i} className="cross-ref-item">
          <span style={{ color: 'var(--accent)' }}>{p.a}</span>
          <span style={{ margin: '0 6px', color: 'var(--ink-3)' }}>×</span>
          <span style={{ color: 'var(--accent)' }}>{p.b}</span>

function RelatedPages({ items, onNav }) {
  return (
    <div style={{ marginBottom: '24px' }}>

              gap: '10px',

          >
            <span style={{ color: 'var(--accent)', fontWeight: '600' }}>→</span>

            {item.relation && <span style={{ fontSize: '11px', color: 'var(--ink-3)' }}>{item.relation}</span>}
          </div>

      </div>

  return (
    <div className="next-action">

        <div
          className="next-action-card"
          onClick={() => onNav && onNav(nextPageId)}
        >

          <div style={{ fontSize: '13px', fontWeight: '600', marginBottom: '4px' }}>次のページへ進む</div>

        <div style={{ fontSize: '12px', color: 'var(--ink-3)' }}>関連ページセクションへ</div>
      </div>
    </div>
  );
}

function Sidebar({ data, page, onNav }) {
  const [sidebarMode, setSidebarMode] = React.useState(() => {
    try { return localStorage.getItem('hoki_sidebar_mode') || 'theme'; }
    catch (e) { return 'theme'; }
  });
  React.useEffect(() => {
    try { localStorage.setItem('hoki_sidebar_mode', sidebarMode); } catch (e) {}
  }, [sidebarMode]);

  const [yearWindow, setYearWindow] = React.useState(() => {
    try {
      const v = localStorage.getItem('hoki_sidebar_window');
      return (v === '5y' || v === '10y' || v === '15y') ? v : '10y';
    } catch (e) { return '10y'; }
  });
  React.useEffect(() => {
    try { localStorage.setItem('hoki_sidebar_window', yearWindow); } catch (e) {}
  }, [yearWindow]);

  const [openChapters, setOpenChapters] = React.useState(() => {
    if (!data || !data.chapters) return {};
    const initial = {};
    data.chapters.forEach((ch, idx) => {
      if (ch.pages && ch.pages.some(p => p.id === page)) {
        initial[idx] = true;
      }
    });
    return initial;
  });

  const toggleChapter = (idx) => {
    setOpenChapters(prev => ({ ...prev, [idx]: !prev[idx] }));
  };

  const getLastSeenBadge = (pageId) => {
    const val = localStorage.getItem(`hoki_lastSeen_${pageId}`);
    if (!val) return null;
    const diff = Date.now() - parseInt(val, 10);
    const days = diff / (1000 * 60 * 60 * 24);
    if (days >= 3) return <span className="nav-badge-review" title="3日以上未閲覧">🔄</span>;
    return null;
  };

  // 内部ページIDが実在するか（WIKI_DATA から導出）
  const validPageIds = React.useMemo(() => {
    const set = new Set();
    if (data && data.chapters) {
      data.chapters.forEach(ch => (ch.pages || []).forEach(p => set.add(p.id)));
    }
    return set;
  }, [data]);

  const ranking = (typeof window !== 'undefined' && window.HOKI_RANKING) || null;
  const themes = ranking && ranking.windows ? (ranking.windows[yearWindow] || []) : [];

  if (!data || !data.chapters) {
    return (
      <aside className="sidebar" style={{ padding: '16px', fontSize: '13px', color: 'var(--ink-3)' }}>
        データ未ロード
      </aside>
    );
  }

  const tabs = [{ id: 'theme', label: '分野で探す' }, { id: 'chapter', label: '教科書順' }];

  return (
    <aside className="sidebar" style={{ height: '100vh', overflowY: 'auto', borderRight: '1px solid var(--line)', padding: '12px 0' }}>
      {data.title && (
        <div style={{ padding: '10px 16px 12px', fontWeight: '700', fontSize: '14px' }}>
          {data.title}
        </div>
      )}
      {/* タブ切替 */}
      <div style={{ display: 'flex', padding: '0 12px', marginBottom: 8, gap: 4, borderBottom: '1px solid var(--line)' }}>
        {tabs.map(tab => (
          <button
            key={tab.id}
            onClick={() => setSidebarMode(tab.id)}
            style={{
              padding: '7px 10px',
              fontSize: 12,
              background: 'transparent',
              border: 'none',
              cursor: 'pointer',
              color: sidebarMode === tab.id ? 'var(--accent)' : 'var(--ink-3)',
              fontWeight: 700,
              borderBottom: sidebarMode === tab.id ? '2px solid var(--accent)' : '2px solid transparent',
              marginBottom: -1,
            }}
          >
            {tab.label}
          </button>
        ))}
      </div>

      {sidebarMode === 'theme' ? (
        <div style={{ padding: '4px 0 8px' }}>
          <div style={{ padding: '4px 16px 6px', fontSize: 10, color: 'var(--ink-3)', letterSpacing: '0.05em' }}>
            出題頻度（{yearWindow === '5y' ? '過去5年' : yearWindow === '15y' ? '過去15年' : '過去10年'}・S/A/B/C順）
          </div>
          <div style={{ display: 'flex', gap: 4, padding: '0 12px 8px' }}>
            {['5y', '10y', '15y'].map(y => (
              <button
                key={y}
                onClick={() => setYearWindow(y)}
                style={{
                  flex: 1,
                  padding: '4px 0',
                  fontSize: 11,
                  cursor: 'pointer',
                  border: yearWindow === y ? '1px solid var(--accent)' : '1px solid var(--line)',
                  background: yearWindow === y ? 'var(--accent-soft)' : 'transparent',
                  color: yearWindow === y ? 'var(--accent)' : 'var(--ink-2)',
                  fontWeight: yearWindow === y ? 700 : 500,
                  borderRadius: 4,
                }}
              >
                {y === '5y' ? '5年' : y === '10y' ? '10年' : '15年'}
              </button>
            ))}
          </div>
          {/* TOP行 */}
          <div
            onClick={() => onNav && onNav('top')}
            style={{
              display: 'flex', alignItems: 'center', gap: 6,
              padding: '7px 16px', fontSize: 12, cursor: 'pointer',
              background: page === 'top' ? 'var(--accent-soft)' : 'transparent',
              borderLeft: page === 'top' ? '3px solid var(--accent)' : '3px solid transparent',
              color: page === 'top' ? 'var(--accent)' : 'var(--ink-2)',
            }}
          >
            <span style={{ flex: 1 }}>🏠 すべてのテーマ（TOP）</span>
          </div>
          {themes.length === 0 && (
            <div style={{ padding: '8px 16px', fontSize: 11, color: 'var(--ink-3)' }}>ランキングデータ未ロード</div>
          )}
          {themes.map((t, i) => {
            const isInternal = t.pageId && validPageIds.has(t.pageId);
            const isActive = isInternal && t.pageId === page;
            const isClickable = isInternal || !!t.mkdocs;
            const handleClick = () => {
              if (isInternal) onNav && onNav(t.pageId);
              else if (t.mkdocs) window.open(MKDOCS_BASE + 'themes/' + t.mkdocs + '/', '_blank', 'noopener');
            };
            return (
              <div
                key={t.slug || i}
                onClick={isClickable ? handleClick : undefined}
                style={{
                  display: 'flex', alignItems: 'center', gap: 6,
                  padding: '6px 16px', fontSize: 12,
                  cursor: isClickable ? 'pointer' : 'default',
                  opacity: isClickable ? 1 : 0.5,
                  background: isActive ? 'var(--accent-soft)' : 'transparent',
                  borderLeft: isActive ? '3px solid var(--accent)' : '3px solid transparent',
                  color: isActive ? 'var(--accent)' : 'var(--ink-2)',
                }}
                onMouseEnter={e => { if (isClickable && !isActive) e.currentTarget.style.background = 'var(--bg-2)'; }}
                onMouseLeave={e => { if (!isActive) e.currentTarget.style.background = 'transparent'; }}
              >
                <span style={{
                  background: RANK_COLORS[t.rank] || 'var(--ink-3)',
                  color: '#fff', fontSize: 9, fontWeight: 700,
                  padding: '1px 5px', borderRadius: 3, minWidth: 14, textAlign: 'center',
                }}>{t.rank}</span>
                {!isInternal && t.mkdocs && (
                  <span style={{ fontSize: 9, color: 'var(--ink-3)' }} title="外部Wiki（denken-wiki/themes）へ">↗</span>
                )}
                <span style={{ flex: 1, lineHeight: 1.4 }}>{t.label}</span>
                <span style={{ fontSize: 10, color: 'var(--ink-3)', fontVariantNumeric: 'tabular-nums' }}>{t.count}</span>
              </div>
            );
          })}
        </div>
      ) : (
        data.chapters.map((ch, idx) => (
          <div key={idx}>
            <div
              onClick={() => toggleChapter(idx)}
              style={{
                display: 'flex',
                alignItems: 'center',
                gap: '6px',
                padding: '8px 16px',
                cursor: 'pointer',
                fontSize: '12px',
                fontWeight: '700',
                color: 'var(--ink-2)',
                background: openChapters[idx] ? 'var(--bg-2)' : 'transparent',
                userSelect: 'none',
              }}
            >
              <span style={{ color: 'var(--ink-3)', fontSize: '10px' }}>{openChapters[idx] ? '▼' : '▶'}</span>
              {ch.ch && <span style={{ fontSize: '10px', color: 'var(--ink-3)' }}>{ch.ch}</span>}
              <span style={{ flex: 1 }}>{ch.title}</span>
            </div>
            {openChapters[idx] && ch.pages && ch.pages.map((p, pi) => {
              const isActive = p.id === page;
              return (
                <div
                  key={pi}
                  onClick={() => onNav && onNav(p.id)}
                  style={{
                    display: 'flex',
                    alignItems: 'center',
                    gap: '6px',
                    padding: '7px 16px 7px 28px',
                    cursor: 'pointer',
                    fontSize: '12px',
                    background: isActive ? 'var(--accent-soft)' : 'transparent',
                    borderLeft: isActive ? '3px solid var(--accent)' : '3px solid transparent',
                    color: isActive ? 'var(--accent)' : 'var(--ink-2)',
                    transition: 'background 0.1s',
                  }}
                  onMouseEnter={e => { if (!isActive) e.currentTarget.style.background = 'var(--bg-2)'; }}
                  onMouseLeave={e => { if (!isActive) e.currentTarget.style.background = 'transparent'; }}
                >
                  <span style={{ flex: 1, lineHeight: '1.4' }}>{p.title}</span>
                  {p.priority === 'required' && (
                    <span className="priority-label">★必須</span>
                  )}
                  {p.freq === 'max' && <span className="freq-max">毎回</span>}
                  {p.freq === 'high' && <span className="freq-high">頻出</span>}
                  {p.twin && (
                    <span
                      title={`対となるページ: ${p.twin}`}
                      onClick={e => { e.stopPropagation(); onNav && onNav(p.twin); }}
                      style={{ cursor: 'pointer', color: 'var(--accent)', fontSize: '11px' }}
                    >
                      ↔
                    </span>
                  )}
                  {getLastSeenBadge(p.id)}
                </div>
              );
            })}
          </div>
        ))
      )}
      <div style={{ marginTop: '16px', padding: '12px 16px', borderTop: '1px solid var(--line)', display: 'flex', flexDirection: 'column', gap: '6px' }}>
        <a href="https://kfurufuru.github.io/denken-wiki/" target="_blank" rel="noopener noreferrer" style={{ color: 'var(--ink-3)', textDecoration: 'none', fontSize: '12px' }}>→ 法規Wiki（新・条文解説版）</a>
        <a href="https://kfurufuru.github.io/secretary-portal/" style={{ color: 'var(--ink-3)', textDecoration: 'none', fontSize: '12px' }}>← ポータルに戻る</a>
      </div>
    </aside>
  );
}

function TOC({ page }) {
  const [headings, setHeadings] = React.useState([]);

  React.useEffect(() => {
    // React が DOM を更新してからクエリするため次フレームに遅延
    const timer = setTimeout(() => {
      const h2s = document.querySelectorAll('.content h2[id]');
      setHeadings(Array.from(h2s).map(h => ({ id: h.id, text: h.textContent.trim() })));
    }, 50);
    return () => clearTimeout(timer);
  }, [page]);

  if (headings.length === 0) return null;

  return (
    <div className="toc">
      <div className="toc-title">目次</div>
      {headings.map((h, i) => (
        <a
          key={i}
          className="toc-link"
          href={`#${h.id}`}
          onClick={e => {
            e.preventDefault();
            document.getElementById(h.id)?.scrollIntoView({ behavior: 'smooth' });
          }}
        >
          {h.text}
        </a>
      ))}
    </div>
  );
}

function TopBar({ page, onNav }) {
  const data = window.WIKI_DATA;
  let pageTitle = page;
  if (data && data.chapters) {
    data.chapters.forEach(ch => {
      (ch.pages || []).forEach(p => {
        if (p.id === page) pageTitle = p.title;
      });
    });
  }

  return (
    <div className="topbar" style={{
      display: 'flex',
      alignItems: 'center',
      gap: '10px',
      padding: '10px 20px',
      borderBottom: '1px solid var(--line)',
      fontSize: '13px',
      background: 'var(--bg)',
      position: 'sticky',
      top: 0,
      zIndex: 10,
    }}>
      <span
        onClick={() => onNav && onNav('top')}
        style={{ cursor: 'pointer', color: 'var(--accent)' }}
      >
        ホーム
      </span>
      {page !== 'top' && (
        <>
          <span style={{ color: 'var(--ink-3)' }}>/</span>
          <span className="page-title" style={{ color: 'var(--ink-2)' }}>{pageTitle}</span>
        </>
      )}
      <div style={{ flex: 1 }} />
      <input
        type="text"
        placeholder="検索（準備中）"
        disabled
        style={{
          padding: '5px 12px',
          borderRadius: 'var(--radius)',
          border: '1px solid var(--line)',
          fontSize: '12px',
          background: 'var(--bg-2)',
          color: 'var(--ink-3)',
          width: '160px',
        }}
      />
    </div>
  );
}

// ============================================================
// 3. Appコンポーネント（メインアプリ）
// ============================================================

function App() {
  const [page, setPage] = React.useState(() => location.hash.slice(1) || 'top');

  React.useEffect(() => {
    const handler = () => {
      const id = location.hash.slice(1) || 'top';
      setPage(id);
      localStorage.setItem(`hoki_lastSeen_${id}`, Date.now().toString());
    };
    window.addEventListener('hashchange', handler);
    // 初回lastSeen記録
    localStorage.setItem(`hoki_lastSeen_${page}`, Date.now().toString());
    return () => window.removeEventListener('hashchange', handler);
  }, []);

  const navigate = (id) => {
    location.hash = id;
  };

  return (
    <div className="app" style={{ display: 'grid', minHeight: '100vh' }}>
      <Sidebar data={window.WIKI_DATA} page={page} onNav={navigate} />
      <main className="main" style={{ minWidth: 0 }}>
        <TopBar page={page} onNav={navigate} />
        <div className="content" style={{ padding: '24px 32px', maxWidth: '860px' }}>
          {window.renderPage ? window.renderPage(page, navigate) : (
            <div style={{ color: 'var(--ink-3)', fontSize: '14px' }}>
              renderPage が未定義です（hoki-pages.jsx を読み込んでください）
            </div>
          )}
        </div>
      </main>
      <TOC page={page} />
    </div>
  );
}

// 試験日（電験3種 上期 2026・既定値）
// localStorage 'hoki_exam_date' (YYYY-MM-DD) で上書き可能
const HOKI_EXAM_DATE_DEFAULT = '2026-08-30';

function ExamCountdownBanner() {
  const [examDateStr, setExamDateStr] = React.useState(() => {
    try {
      const v = localStorage.getItem('hoki_exam_date');
      return (v && /^\d{4}-\d{2}-\d{2}$/.test(v)) ? v : HOKI_EXAM_DATE_DEFAULT;
    } catch (e) { return HOKI_EXAM_DATE_DEFAULT; }
  });
  const isCustom = examDateStr !== HOKI_EXAM_DATE_DEFAULT;
  const handleEdit = () => {
    const cur = examDateStr;
    const next = window.prompt('試験日を YYYY-MM-DD 形式で入力（空白でリセット）', cur);
    if (next === null) return;
    const trimmed = next.trim();
    if (trimmed === '') {
      try { localStorage.removeItem('hoki_exam_date'); } catch (e) {}
      setExamDateStr(HOKI_EXAM_DATE_DEFAULT);
      return;
    }
    if (!/^\d{4}-\d{2}-\d{2}$/.test(trimmed)) {
      alert('形式が違います。例: 2026-08-30');
      return;
    }
    try { localStorage.setItem('hoki_exam_date', trimmed); } catch (e) {}
    setExamDateStr(trimmed);
  };
  const examDate = new Date(examDateStr + 'T00:00:00+09:00');
  const today = new Date();
  const daysLeft = Math.ceil((examDate - today) / (1000 * 60 * 60 * 24));
  if (daysLeft <= 0) {
    return (
      <div style={{ marginBottom: 24, padding: '10px 14px', background: 'var(--bg-elev)', border: '1px solid var(--border)', borderRadius: 'var(--radius)', fontSize: 13, display: 'flex', alignItems: 'center', gap: 8 }}>
        <span>📅 電験3種法規 試験日（{examDateStr}）終了</span>
        <button onClick={handleEdit} style={{ marginLeft: 'auto', background: 'none', border: '1px solid var(--border)', borderRadius: 4, padding: '2px 8px', fontSize: 11, color: 'var(--ink-3)', cursor: 'pointer' }}>⚙ 試験日変更</button>
      </div>
    );
  }
  const color = daysLeft <= 14 ? '#d95454' : daysLeft <= 30 ? '#e68b17' : daysLeft <= 60 ? '#e6a817' : 'var(--accent)';
  const phase = daysLeft <= 7 ? '最終週（弱点だけ・新規禁止）'
    : daysLeft <= 14 ? '直前期B（表暗記・過去問総ざらい）'
    : daysLeft <= 30 ? '直前期A（弱点補強＋通し演習）'
    : daysLeft <= 60 ? '仕上げ期（B問題反復＋頻出論点）'
    : daysLeft <= 90 ? '実力養成期（B問題集中＋表暗記）'
    : '基礎固め期（章立て学習＋用語整理）';
  return (
    <div style={{ marginBottom: 24, padding: '12px 16px', background: 'var(--bg-elev)', border: '1px solid var(--border)', borderLeft: `4px solid ${color}`, borderRadius: 'var(--radius)' }}>
      <div style={{ display: 'flex', alignItems: 'baseline', gap: 8, marginBottom: 4, flexWrap: 'wrap' }}>
        <span style={{ fontSize: 11, color: 'var(--ink-3)', fontWeight: 600, letterSpacing: '0.05em' }}>📅 試験まで</span>
        <span style={{ fontSize: 28, fontWeight: 800, color, fontVariantNumeric: 'tabular-nums', lineHeight: 1 }}>{daysLeft}</span>
        <span style={{ fontSize: 13, color: 'var(--ink-2)' }}>日</span>
        <span style={{ fontSize: 11, color: 'var(--ink-3)', marginLeft: 'auto' }}>
          {examDateStr}{isCustom ? '' : '（既定）'}
        </span>
        <button
          onClick={handleEdit}
          title="試験日を変更"
          style={{ background: 'none', border: '1px solid var(--border)', borderRadius: 4, padding: '2px 8px', fontSize: 11, color: 'var(--ink-3)', cursor: 'pointer' }}
        >
          ⚙ 変更
        </button>
      </div>
      <div style={{ fontSize: 12, color: 'var(--ink-3)' }}>{phase}</div>
    </div>
  );
}

        // 未閲覧 (lastSeen 無し) で priority='required' or freq='max' のページから上位3件

                  </div>
                </div>
              ))}
            </div>
          </section>
        );
      })()}

          [<strong>C₁ / C₂</strong>, <span>Line-to-ground capacitance<br/>対地静電容量</span>, "C₁=配電線路一相、C₂=需要設備一相"],
        ]}
        note="ZCTは「気付く」、GRは「判断する」、CBは「行動する」。3つで1つの保護システム"
      />

      <h2 id="setsuchi-compare">5. 中性点の接地方式 3種類の比較</h2>
      <PlainExplain>
        <p style={{margin: '0 0 8px'}}><strong>本ページが扱うのは「中性点非接地方式」</strong>。他の方式と何が違うのか、地絡電流・対地電圧・遮断要否の3軸で比較する。</p>
      </PlainExplain>
      <MemTable
        headers={["方式", "中性点の状態", "1線地絡時の地絡電流", "健全相の対地電圧", "保護・遮断", "主な適用先"]}
        rows={[
          [<strong>直接接地方式</strong>, "中性点を直接大地に接続", <span><strong>大電流</strong>（短絡電流レベル）</span>, "ほぼ変化なし（V/√3維持）", "瞬時遮断必須", "187kV以上の超高圧系統"],
          [<strong>抵抗接地方式</strong>, "中性点を抵抗を介して接地", "中程度（数十〜数百A）", "若干上昇", "限時遮断", "66/77kV特別高圧系統"],
          [<strong style={{color: 'var(--warn)'}}>非接地方式</strong>, "中性点を接地しない（浮かせる）", <span><strong>小電流</strong>（数A〜数百mA）<br/>※C経由で必ず流れる</span>, <strong>√3倍に上昇（=線間電圧V）</strong>, "GR・DGRで検出→CB遮断", <strong>6.6kV高圧配電系統</strong>],
        ]}
        note="高圧6.6kV配電は非接地方式。地絡電流が小さいため健全相の対地電圧が大きく上昇する点が試験頻出"
      />
      <PlainExplain>
        <p style={{margin: 0, fontSize: 13}}>💡 <strong>非接地方式の3大特徴</strong>：① 地絡電流が小さい（C経由のみ）／② 健全相対地電圧が√3倍に上昇／③ それでも保護装置（ZCT+GR+CB）は必須</p>
      </PlainExplain>

      <h3 style={{marginTop: 20, marginBottom: 12, fontSize: 15, color: 'var(--ink-2)'}}>📜 接地方式の歴史的変遷（過去→現在→未来）</h3>

      <h2 id="explain1">6. 深掘り解説①: なぜ「線間電圧V」を「対地電圧V/√3」に変換するのか</h2>
      <PlainExplain>
        <p style={{margin: '0 0 10px'}}><strong>問いの本質</strong>：問題文の電源は「線間電圧V」で与えられるのに、計算では「対地電圧」を使う。なぜ？</p>
        <ul style={{margin: 0, paddingLeft: 20}}>
          <li><strong>対地静電容量Cは「相導体↔大地」の容量</strong>。線間電圧は2つの相導体間の電圧で、Cには直接かからない。Cにかかるのは <strong>対地電圧（相導体の対地電位）</strong></li>
          <li>Y結線中性点接地なら、各相の対地電圧 = 相電圧 = <strong>V/√3</strong></li>
          <li><strong>中性点非接地でも平常時は対称性によりV/√3</strong>（中性点が浮いているだけで対称性は維持）</li>
          <li>だから式の基本量は「V」ではなく「V/√3 × ωC」。最終的に √3 が公式に現れるのはこの変換が原因</li>
        </ul>
        <p style={{margin: '10px 0 0', fontSize: 13, color: 'var(--ink-3)'}}>💡 「中性点非接地 = 対地電圧不明」ではない。平常時は対称性により V/√3、地絡時に対称性が壊れて変化する</p>

      <MemTable
        headers={["相", "平常時の対地電圧", "1線地絡時（a相地絡）の対地電圧"]}
        rows={[

      <PlainExplain>
        <p style={{margin: '0 0 8px'}}><strong>計算フロー</strong></p>
        <ol style={{margin: 0, paddingLeft: 20, fontSize: 13, lineHeight: 1.8}}>
          <li>健全相b: I_b = ωCb × V（V=線間電圧）</li>
          <li>健全相c: I_c = ωCc × V</li>
          <li>b相とc相の電圧は60°位相差 → ベクトル和 |I_b+I_c| = √3 × ωC × V</li>
          <li>1相あたり対地容量 C = C₁+C₂（系統合計）として代入</li>
          <li>∴ I_g = √3 · ω · (C₁+C₂) · V = <strong>2√3 πfV(C₁+C₂)</strong></li>
        </ol>
        <p style={{margin: '10px 0 0', fontSize: 13, color: 'var(--ink-3)'}}>💡 覚え方：「1線地絡 = 健全2相が√3倍電圧で充電 → ベクトル和が√3倍 → 結局 √3×√3=3倍の電流が地絡点に集まる」と思うと、3相Cと√3の出処がスッキリ</p>
        <p style={{margin: '10px 0 0', fontSize: 13, fontWeight: 600, color: 'var(--ink-2)'}}>🎯 支配因子: 系統合計対地静電容量 (C₁+C₂) と 線間電圧V／成立条件: 完全地絡（Rg=0）かつ系統対称性</p>
      </PlainExplain>

      <PlainExplain>
        <p style={{margin: '0 0 8px'}}><strong>選択遮断（DGR）の原理</strong></p>

          <li><strong>自設備内地絡</strong>: C₁分（系統の他需要家）が ZCT を流れる、向きは「外向き」</li>

// ─────────────────────────────────────────────
function RandomModePage({ onNav }) {
  const [timeLeft, setTimeLeft] = React.useState(65 * 60);
  const [running, setRunning]   = React.useState(false);
  const [phase, setPhase]       = React.useState('ready'); // ready | running | finished

  React.useEffect(() => {
    if (!running || timeLeft <= 0) return;
    const t = setInterval(() => {
      setTimeLeft(s => {
        if (s <= 1) {
          clearInterval(t);
          setRunning(false);
          setPhase('finished');
          return 0;
        }
        return s - 1;
      });
    }, 1000);
    return () => clearInterval(t);
  }, [running, timeLeft]);

  const mm = String(Math.floor(timeLeft / 60)).padStart(2, '0');
  const ss = String(timeLeft % 60).padStart(2, '0');

  const SAMPLE_QUESTIONS = [
    { no: 1, q: "A種接地工事の接地抵抗値として正しいものはどれか",          category: "接地",     rank: "S" },
    { no: 2, q: "低圧電路の絶縁耐力試験における試験電圧の倍率は？",          category: "絶縁",     rank: "S" },
    { no: 3, q: "高圧架空電線が道路を横断する場合の最低地表高さは？",        category: "離隔距離", rank: "A" },
    { no: 4, q: "直流750Vの電路の電圧区分はどれか？",                        category: "電圧区分", rank: "A" },
    { no: 5, q: "電気工事士の免状を交付するのは誰か？",                      category: "法令",     rank: "B" },
    { no: 6, q: "主任技術者の選任が必要な自家用電気工作物の最大電力は？",    category: "主任技術者",rank: "S" },
    { no: 7, q: "B種接地工事の接地抵抗値の計算式はどれか？",                 category: "接地",     rank: "S" },
    { no: 8, q: "保安規程の届出先はどこか？",                                category: "保安規程", rank: "A" },
    { no: 9, q: "電気事故報告の速報の報告期限は事故発生から何時間以内か？",  category: "事故報告", rank: "A" },
    { no:10, q: "特別高圧架空電線と建造物上部との離隔距離は最低何mか？",     category: "離隔距離", rank: "A" },
  ];

  const handleStart = () => {
    setPhase('running');
    setRunning(true);
  };

  const handleStop = () => {
    setRunning(false);
    setPhase('finished');
  };

  const handleReset = () => {
    setTimeLeft(65 * 60);
    setRunning(false);
    setPhase('ready');
  };

  const timerColor = timeLeft < 600 ? '#d95454' : timeLeft < 1800 ? '#e6a817' : 'var(--accent)';

  return (
    <div>
      <div style={{ marginBottom: 24 }}>
        <div style={{ fontSize: 12, color: 'var(--ink-3)', fontWeight: 600, letterSpacing: '0.08em', marginBottom: 4 }}>EXAM MODE</div>
        <h1 style={{ margin: '0 0 8px', fontSize: 22, fontWeight: 700 }}>ランダム10問演習</h1>
        <p style={{ margin: 0, fontSize: 14, color: 'var(--ink-2)' }}>試験本番と同じ65分のタイマーで模擬演習。</p>
      </div>

      {/* 3ステップフロー */}
      <div style={{ background: 'var(--bg-elev)', border: '1px solid var(--border)', borderRadius: 'var(--radius)', padding: '16px 20px', marginBottom: 20 }}>
        <div style={{ fontWeight: 600, marginBottom: 12, fontSize: 14 }}>推奨フロー</div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
          {[
            { step: '1', label: 'テーマ別で1テーマ固める', desc: 'まず接地・絶縁などを1テーマ単位で理解してから演習へ。' },
            { step: '2', label: 'このモードで10問ランダム演習', desc: '65分タイマーをスタートして本番と同じ時間感覚で解く。' },
            { step: '3', label: '苦手テーマに戻る', desc: '間違えた問題のカテゴリを確認して該当ページに戻って復習。' },
          ].map(f => (
            <div key={f.step} style={{ display: 'flex', gap: 12 }}>
              <div style={{
                width: 28, height: 28, borderRadius: '50%', background: 'var(--accent)',
                color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontWeight: 700, fontSize: 13, flexShrink: 0,
              }}>{f.step}</div>
              <div>
                <div style={{ fontWeight: 600, fontSize: 13 }}>{f.label}</div>
                <div style={{ fontSize: 12, color: 'var(--ink-3)', marginTop: 2 }}>{f.desc}</div>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* タイマー */}
      <div style={{
        background: 'var(--bg-elev)',
        border: `2px solid ${phase === 'finished' ? '#d95454' : running ? timerColor : 'var(--border)'}`,
        borderRadius: 'var(--radius)',
        padding: '24px',
        textAlign: 'center',
        marginBottom: 20,
      }}>
        <div style={{ fontSize: 11, color: 'var(--ink-3)', fontWeight: 600, letterSpacing: '0.08em', marginBottom: 8 }}>
          {phase === 'ready' ? '試験時間' : phase === 'running' ? '残り時間' : '終了'}
        </div>
        <div style={{ fontSize: 56, fontWeight: 800, color: timerColor, fontVariantNumeric: 'tabular-nums', lineHeight: 1, marginBottom: 16 }}>
          {mm}:{ss}
        </div>
        <div style={{ display: 'flex', gap: 10, justifyContent: 'center' }}>
          {phase === 'ready' && (
            <button className="btn primary" onClick={handleStart} style={{ fontSize: 16, padding: '12px 32px' }}>
              演習スタート →
            </button>
          )}
          {phase === 'running' && (
            <>
              <button className="btn secondary" onClick={handleStop}>終了する</button>
            </>
          )}
          {phase === 'finished' && (
            <>
              <div style={{ fontWeight: 600, color: '#d95454', marginRight: 8 }}>演習終了！採点してください</div>
              <button className="btn secondary" onClick={handleReset}>もう一度</button>
            </>
          )}
        </div>
      </div>

      {/* 10問カード */}
      <div style={{ marginBottom: 12, fontWeight: 600, fontSize: 15 }}>本日の10問</div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
        {SAMPLE_QUESTIONS.map((q) => (
          <div
            key={q.no}
            style={{
              background: 'var(--bg-elev)',
              border: '1px solid var(--border)',
              borderRadius: 'var(--radius)',
              padding: '12px 16px',
              display: 'flex',
              gap: 14,
              alignItems: 'flex-start',
            }}
          >
            <div style={{ fontWeight: 700, color: 'var(--ink-3)', minWidth: 24, fontSize: 14 }}>Q{q.no}</div>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 14, lineHeight: 1.6, marginBottom: 6 }}>{q.q}</div>
              <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                <span className="tag">{q.category}</span>
                <span className={`rank rank-${q.rank}`}>{q.rank}</span>
              </div>
            </div>
          </div>
        ))}
      </div>

      <div style={{ marginTop: 24 }}>
        <button
          style={{ background: 'none', border: 'none', color: 'var(--accent)', cursor: 'pointer', fontSize: 13, padding: 0 }}
          onClick={() => onNav('top')}
        >
          ← トップに戻る
        </button>
      </div>
    </div>
  );
}

</script>
</body>
</html>
