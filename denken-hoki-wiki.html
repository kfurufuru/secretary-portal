<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>電験3種 法規Wiki（新）</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@500;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    /* ウォーム系トーン */
    --bg:        oklch(0.985 0.008 75);    /* オフホワイト */
    --bg-2:      oklch(0.965 0.012 70);    /* 淡いベージュ */
    --bg-3:      oklch(0.945 0.018 70);    /* もう一段濃いベージュ */
    --card:      oklch(0.995 0.004 75);
    --line:      oklch(0.90 0.012 70);
    --line-2:    oklch(0.84 0.015 65);
    --ink:       oklch(0.22 0.012 60);     /* 主文字 */
    --ink-2:     oklch(0.42 0.012 60);     /* 副文字 */
    --ink-3:     oklch(0.58 0.012 60);     /* 補助 */
    --accent:    oklch(0.62 0.13 45);      /* テラコッタ */
    --accent-2:  oklch(0.55 0.08 70);      /* ベージュブラウン */
    --accent-soft: oklch(0.93 0.04 55);
    --rank-s-bg: oklch(0.62 0.13 45);
    --rank-s-fg: oklch(0.99 0.005 75);
    --rank-a-bg: oklch(0.86 0.08 60);
    --rank-a-fg: oklch(0.32 0.06 50);
    --rank-b-bg: oklch(0.93 0.03 75);
    --rank-b-fg: oklch(0.42 0.02 60);
    --warn:      oklch(0.65 0.15 35);
    --good:      oklch(0.55 0.09 145);
    --shadow-sm: 0 1px 0 oklch(0.90 0.012 70 / 0.6);
    --shadow:    0 1px 2px oklch(0.30 0.02 60 / 0.04), 0 4px 14px oklch(0.30 0.02 60 / 0.05);
    --radius:    10px;
    --radius-lg: 14px;
    --serif: 'Noto Serif JP', 'Hiragino Mincho ProN', serif;
    --sans:  'Noto Sans JP', 'Hiragino Sans', system-ui, sans-serif;
    --mono:  'JetBrains Mono', ui-monospace, monospace;

    /* =================================================================
       design-tokens.css 互換エイリアス（2026-05-03 追加・ショガー監修）
       既存OKLCH設計（--bg / --ink / --accent / --card / --line）を壊さず、
       MkDocs側 design-tokens.css と同じ変数名で参照できるブリッジ層
       ================================================================= */
    --color-bg:            var(--bg);
    --color-surface:       var(--card);
    --color-elevated:      var(--bg-2);
    --color-border:        var(--line);
    --color-border-strong: var(--line-2);
    --color-text:          var(--ink);
    --color-text-muted:    var(--ink-3);
    --color-text-on-primary: oklch(0.99 0.005 75);
    --color-link:          var(--accent);
    --color-primary:       var(--accent);
    --color-accent:        var(--accent);
    --color-muted:         var(--ink-3);
    --primary-500:         var(--accent);
    --accent-500:          var(--accent);
    --color-success:       var(--good);
    --color-warning:       var(--warn);
    --color-danger:        var(--warn);
    --color-info:          var(--accent);
    --color-highlight:     var(--accent-soft);
    /* spacing 8段階（4の倍数） */
    --space-1:  0.25rem; --space-2: 0.5rem;  --space-3: 0.75rem;
    --space-4:  1rem;    --space-6: 1.5rem;  --space-8: 2rem;
    --space-12: 3rem;    --space-16: 4rem;
    /* radius — 既存と互換維持 */
    --radius-sm:   4px;
    --radius-md:   8px;
    /* --radius / --radius-lg は既存定義を維持 */
    --radius-full: 999px;
    /* shadow — 既存 --shadow-sm を維持し、--shadow-md を追加 */
    --shadow-md: var(--shadow);
    /* font 8段階 */
    --font-jp:    var(--sans);
    --text-xs:    0.75rem;  --text-sm:  0.875rem; --text-base: 1rem;
    --text-lg:    1.125rem; --text-xl:  1.25rem;  --text-2xl:  1.5rem;
    --text-3xl:   1.875rem; --text-4xl: 2.25rem;
    /* line-height / letter-spacing（原研哉） */
    --lh-jp-tight: 1.6; --lh-jp: 1.8; --lh-jp-loose: 1.9; --lh-en: 1.5;
    --ls-jp: 0.04em; --ls-jp-loose: 0.06em;
    /* weight */
    --weight-normal: 400; --weight-medium: 500; --weight-semibold: 600; --weight-bold: 700;
    /* transition */
    --ease-out-fast: 120ms cubic-bezier(0.2, 0, 0, 1);
    --ease-out-base: 200ms cubic-bezier(0.2, 0, 0, 1);
    /* border */
    --border-thin: 1px; --border-thick: 2px; --border-accent: 4px;
  }
  [data-theme="dark"] {
    --bg:        oklch(0.20 0.010 60);
    --bg-2:      oklch(0.24 0.012 60);
    --bg-3:      oklch(0.28 0.014 60);
    --card:      oklch(0.23 0.010 60);
    --line:      oklch(0.33 0.012 60);
    --line-2:    oklch(0.40 0.015 60);
    --ink:       oklch(0.92 0.008 70);
    --ink-2:     oklch(0.74 0.010 65);
    --ink-3:     oklch(0.58 0.010 65);
    --accent-soft: oklch(0.30 0.05 50);
    --rank-a-bg: oklch(0.34 0.06 55);
    --rank-a-fg: oklch(0.88 0.06 60);
    --rank-b-bg: oklch(0.28 0.03 65);
    --rank-b-fg: oklch(0.74 0.02 60);
    --shadow-sm: 0 1px 0 oklch(0.08 0 0 / 0.4);
    --shadow:    0 1px 2px oklch(0.08 0 0 / 0.3), 0 4px 14px oklch(0.08 0 0 / 0.20);
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-feature-settings: "palt";
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; }

  /* ── レイアウト ── */
  .app {
    display: grid;
    grid-template-columns: 256px 1fr;
    min-height: 100vh;
  }
  @media (max-width: 900px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { display: none; }
  }

  /* ── サイドバー ── */
  .sidebar {
    border-right: 1px solid var(--line);
    background: var(--bg-2);
    padding: 22px 14px 28px;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 4px 8px 18px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 14px;
  }
  .brand-mark {
    width: 30px; height: 30px;
    border-radius: 8px;
    background: var(--accent);
    color: var(--rank-s-fg);
    display: grid; place-items: center;
    font-family: var(--serif);
    font-weight: 900;
    font-size: 16px;
    box-shadow: inset 0 0 0 2px oklch(0.99 0.005 75 / 0.18);
  }
  .brand-name {
    font-family: var(--serif);
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.02em;
  }
  .brand-sub {
    font-size: 11px;
    color: var(--ink-3);
    margin-top: -2px;
    letter-spacing: 0.06em;
  }
  .nav-group {
    margin: 14px 0 6px;
  }
  .nav-group-title {
    font-size: 11px;
    color: var(--ink-3);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    padding: 0 8px;
    margin-bottom: 6px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    border-radius: 8px;
    font-size: 13.5px;
    color: var(--ink-2);
    line-height: 1.3;
    cursor: pointer;
    user-select: none;
  }
  .nav-item:hover { background: var(--bg-3); color: var(--ink); }
  .nav-item.active {
    background: var(--accent-soft);
    color: var(--ink);
    font-weight: 500;
  }
  .nav-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-3);
    width: 18px;
    flex: none;
  }
  .nav-item.active .nav-num { color: var(--accent); }
  .nav-children {
    margin: 2px 0 6px 18px;
    padding-left: 10px;
    border-left: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  .nav-child {
    padding: 4px 8px;
    font-size: 12.5px;
    color: var(--ink-2);
    border-radius: 6px;
    cursor: pointer;
  }
  .nav-child:hover { background: var(--bg-3); color: var(--ink); }
  .nav-foot {
    margin-top: 18px;
    padding: 12px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
  }
  .streak-row {
    display: flex; align-items: baseline; gap: 6px;
  }
  .streak-num {
    font-family: var(--serif);
    font-weight: 900;
    font-size: 26px;
    color: var(--accent);
    line-height: 1;
  }
  .streak-unit {
    font-size: 12px;
    color: var(--ink-2);
  }
  .streak-label {
    font-size: 11px;
    color: var(--ink-3);
    margin-bottom: 6px;
    letter-spacing: 0.06em;
  }
  .streak-dots {
    display: flex; gap: 3px; margin-top: 8px;
  }
  .streak-dot {
    width: 10px; height: 10px; border-radius: 3px;
    background: var(--bg-3);
  }
  .streak-dot.on { background: var(--accent); }
  .streak-dot.today { background: var(--accent); outline: 2px solid var(--accent-soft); outline-offset: 1px; }

  /* ── メイン ── */
  .main {
    min-width: 0;
  }
  .topbar {
    position: sticky; top: 0; z-index: 10;
    background: oklch(0.985 0.008 75 / 0.85);
    backdrop-filter: saturate(1.2) blur(10px);
    border-bottom: 1px solid var(--line);
    padding: 10px 28px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .crumbs {
    font-size: 12.5px;
    color: var(--ink-3);
    display: flex; gap: 6px; align-items: center;
  }
  .crumbs .sep { color: var(--line-2); }
  .search {
    flex: 1;
    max-width: 520px;
    margin-left: auto;
    position: relative;
  }
  .search input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 8px 12px 8px 34px;
    font-size: 13px;
    color: var(--ink);
    font-family: inherit;
    outline: none;
  }
  .search input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .search .icn { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--ink-3); font-size: 13px; }
  .search .kbd {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    font-family: var(--mono); font-size: 10.5px; color: var(--ink-3);
    border: 1px solid var(--line); border-radius: 4px; padding: 1px 5px;
    background: var(--bg);
  }
  .search-results {
    position: absolute; top: calc(100% + 6px); left: 0; right: 0;
    background: var(--card); border: 1px solid var(--line);
    border-radius: 10px; box-shadow: var(--shadow);
    z-index: 200; overflow: hidden; display: none;
  }
  .search-results.open { display: block; }
  .sr-item {
    display: flex; flex-direction: column; gap: 2px;
    padding: 9px 14px; cursor: pointer;
    border-bottom: 1px solid var(--line); transition: background 0.1s;
  }
  .sr-item:last-child { border-bottom: none; }
  .sr-item:hover, .sr-item.focused { background: var(--accent-soft); }
  .sr-label { font-size: 13px; color: var(--ink); font-weight: 500; }
  .sr-sub   { font-size: 11px; color: var(--ink-3); }
  .sr-def   { font-size: 12px; color: var(--ink-2); line-height: 1.5; margin-top: 2px; }
  .sr-reading { font-size: 11px; color: var(--ink-3); font-weight: 400; margin-left: 2px; }
  .sr-tag-term, .sr-tag-page {
    display: inline-block; font-size: 9.5px; font-weight: 700;
    border-radius: 3px; padding: 1px 5px; margin-right: 6px;
    vertical-align: 1px; letter-spacing: 0.04em;
  }
  .sr-tag-term { background: var(--accent-soft); color: var(--accent); }
  .sr-tag-page { background: var(--bg-2); color: var(--ink-3); border: 1px solid var(--line); }
  .sr-empty { padding: 12px 14px; font-size: 13px; color: var(--ink-3); text-align: center; }
  .search-results { max-height: 60vh; overflow-y: auto; }
  .sr-meta { font-size: 11px; color: var(--ink-3); margin-top: 6px; line-height: 1.6; }
  .sr-meta-confused { color: #c0392b; }
  .sr-meta-related { color: var(--ink-3); }
  .sr-chip {
    display: inline-block;
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 1px 7px;
    margin: 0 3px 2px 0;
    font-size: 11px;
    color: var(--ink-2);
    cursor: pointer;
    transition: background 0.1s, border-color 0.1s;
  }
  .sr-chip:hover { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
  .sr-chip-confused { border-color: #f5c0b8; background: #fdf0ec; color: #c0392b; }
  .sr-chip-confused:hover { background: #fbd9d0; border-color: #c0392b; }
  .sr-quiz {
    margin-top: 4px;
    font-size: 12px;
    color: var(--ink-3);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .sr-quiz-reveal {
    background: var(--accent-soft);
    border: 1px solid var(--accent);
    color: var(--accent);
    border-radius: 6px;
    padding: 2px 10px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
  }
  .sr-quiz-reveal:hover { background: var(--accent); color: #fff; }
  .study-toggle {
    position: absolute;
    right: 60px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 12px;
    border: 1px solid var(--line);
    background: var(--bg);
    color: var(--ink-3);
    cursor: pointer;
    user-select: none;
    transition: all 0.15s;
  }
  .study-toggle:hover { border-color: var(--ink-3); }
  .study-toggle.on {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--accent);
    font-weight: 600;
  }
  .study-toggle.lv2 {
    background: #fdf0ec;
    border-color: #c0392b;
    color: #c0392b;
    font-weight: 600;
  }
  .sr-quiz-panel { padding: 14px 16px; }
  .quiz-header {
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.05em;
    margin-bottom: 8px;
  }
  .quiz-prompt {
    font-size: 12px;
    color: var(--ink-3);
    margin-bottom: 6px;
  }
  .quiz-def {
    font-size: 13px;
    color: var(--ink);
    line-height: 1.55;
    background: var(--bg-2);
    border-left: 3px solid var(--accent);
    padding: 10px 12px;
    border-radius: 0 6px 6px 0;
    margin-bottom: 12px;
  }
  .quiz-choices { display: flex; flex-wrap: wrap; gap: 6px; }
  .quiz-choice {
    flex: 1 1 calc(50% - 4px);
    min-width: 140px;
    padding: 8px 12px;
    font-size: 13px;
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink);
    border-radius: 8px;
    cursor: pointer;
    text-align: left;
    font-family: inherit;
    transition: all 0.12s;
  }
  .quiz-choice:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-soft); }
  .quiz-choice:disabled { cursor: default; opacity: 0.7; }
  .quiz-choice.correct { background: #e8f5e9; border-color: #2e7d32; color: #1b5e20; opacity: 1; }
  .quiz-choice.wrong { background: #fdf0ec; border-color: #c0392b; color: #c0392b; opacity: 1; }
  .quiz-feedback {
    margin-top: 12px;
    padding: 10px 12px;
    border-radius: 6px;
    font-size: 13px;
  }
  .quiz-feedback.correct { background: #e8f5e9; color: #1b5e20; }
  .quiz-feedback.wrong { background: #fdf0ec; color: #c0392b; }
  .quiz-feedback-def {
    margin-top: 6px;
    font-size: 12px;
    color: var(--ink-2);
    line-height: 1.5;
    background: var(--card);
    padding: 8px 10px;
    border-radius: 4px;
  }
  .quiz-actions { margin-top: 10px; display: flex; gap: 8px; }
  .quiz-next, .quiz-exit {
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink);
    cursor: pointer;
    font-family: inherit;
  }
  .quiz-next { background: var(--accent); color: #fff; border-color: var(--accent); }
  .quiz-next:hover { filter: brightness(1.1); }
  .quiz-exit:hover { background: var(--bg-2); }
  .quiz-meta {
    margin-top: 10px;
    font-size: 11px;
    color: var(--ink-3);
    text-align: center;
  }
  .quiz-summary-stats {
    background: var(--bg-2);
    border-radius: 8px;
    padding: 10px 14px;
    margin: 8px 0 14px;
  }
  .quiz-stat-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 4px 0;
    font-size: 13px;
  }
  .quiz-stat-label { color: var(--ink-3); }
  .quiz-stat-value { font-weight: 600; color: var(--ink); }
  .quiz-weak {
    border: 1px solid #f5c0b8;
    background: #fdf0ec;
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 10px;
  }
  .quiz-weak-title {
    font-size: 12px;
    font-weight: 700;
    color: #c0392b;
    margin-bottom: 8px;
  }
  .quiz-weak-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 5px 8px;
    margin: 0 -8px;
    font-size: 12px;
    color: var(--ink-2);
    border-radius: 4px;
    transition: background 0.1s;
  }
  .quiz-weak-row:hover { background: rgba(192, 57, 43, 0.08); }
  .quiz-weak-rank { font-weight: 700; color: #c0392b; min-width: 24px; }
  .quiz-weak-name { flex: 1; }
  .quiz-weak-rate { color: #c0392b; font-weight: 600; }
  .quiz-weak-hint {
    margin-top: 8px;
    font-size: 11px;
    color: var(--ink-3);
    font-style: italic;
  }
  .quiz-weak-empty {
    background: var(--bg-2);
    border-radius: 6px;
    padding: 10px;
    margin-bottom: 10px;
    font-size: 12px;
    color: var(--ink-3);
    text-align: center;
  }
  .top-actions { display: flex; gap: 8px; align-items: center; }
  .icon-btn {
    width: 32px; height: 32px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: var(--card);
    display: grid; place-items: center;
    color: var(--ink-2);
    font-size: 14px;
  }
  .icon-btn:hover { border-color: var(--line-2); color: var(--ink); }

  .content {
    padding: 28px 28px 80px;
    max-width: 1180px;
    margin: 0 auto;
  }

  /* ── ヒーロー ── */
  .hero {
    background:
      radial-gradient(80% 120% at 90% -10%, oklch(0.93 0.06 55) 0%, transparent 60%),
      radial-gradient(60% 100% at 0% 110%, oklch(0.95 0.03 80) 0%, transparent 55%),
      var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    padding: 28px 32px;
    box-shadow: var(--shadow);
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 28px;
  }
  @media (max-width: 880px) {
    .hero { grid-template-columns: 1fr; padding: 22px; }
  }
  .hero-eyebrow {
    font-family: var(--mono);
    font-size: 11.5px;
    letter-spacing: 0.18em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .hero h1 {
    font-family: var(--serif);
    font-weight: 900;
    font-size: 38px;
    line-height: 1.25;
    letter-spacing: 0.01em;
    margin: 0 0 10px;
    color: var(--ink);
    text-wrap: pretty;
  }
  .hero h1 em {
    font-style: normal;
    background: linear-gradient(180deg, transparent 65%, var(--accent-soft) 65%);
    padding: 0 2px;
  }
  .hero-sub {
    font-size: 15px;
    color: var(--ink-2);
    margin: 0 0 22px;
    max-width: 560px;
    text-wrap: pretty;
  }
  .cta-row {
    display: flex; flex-wrap: wrap; gap: 10px;
  }

// QuickReview: 1分復習 + PDCA記録
// localStorage: hoki_quickreview_stats = { [pageId+":"+q]: { ng, ok, lastNgAt } }
// ✕押下時は denken-hoki-machigai-notes にも自動push
function loadQRStats() {
  try { return JSON.parse(localStorage.getItem('hoki_quickreview_stats') || '{}'); }
  catch { return {}; }
}
function saveQRStats(s) {
  try { localStorage.setItem('hoki_quickreview_stats', JSON.stringify(s)); } catch {}
}
function pushMachigaiNote(pageId, q, a) {
  const KEY = 'denken-hoki-machigai-notes';
  let notes = [];
  try { notes = JSON.parse(localStorage.getItem(KEY) || '[]'); } catch {}
  // 重複チェック（同じpageId+q）
  if (notes.some(n => n.source === `1分復習・${pageId}` && n.wrong === q)) return;
  const newNote = {
    id: Date.now(),
    date: new Date().toISOString().slice(0, 10),
    topic: pageId,
    wrong: q,
    correct: a,
    source: `1分復習・${pageId}`,
  };
  notes.unshift(newNote);
  try { localStorage.setItem(KEY, JSON.stringify(notes)); } catch {}
}

function QuickReview({ items }) {
  const limited = items.slice(0, 5);
  const pageId = (location.hash.slice(1) || 'top');
  const [stats, setStats] = React.useState(loadQRStats);
  const [opened, setOpened] = React.useState({});
  const STALE_DAYS = 7;
  const now = Date.now();

  const recordResult = (q, a, isCorrect) => {
    const key = `${pageId}:${q}`;
    const cur = stats[key] || { ng: 0, ok: 0, lastNgAt: null };
    const next = {
      ...stats,
      [key]: {
        ng: cur.ng + (isCorrect ? 0 : 1),
        ok: cur.ok + (isCorrect ? 1 : 0),
        lastNgAt: isCorrect ? cur.lastNgAt : now,
      },
    };
    setStats(next);
    saveQRStats(next);
    if (!isCorrect) pushMachigaiNote(pageId, q, a);
  };

  const ngTotal = limited.reduce((sum, it) => {
    const s = stats[`${pageId}:${it.q}`];
    return sum + (s?.ng || 0);
  }, 0);
  const stale = limited.filter(it => {
    const s = stats[`${pageId}:${it.q}`];
    return s?.lastNgAt && (now - s.lastNgAt) > STALE_DAYS * 86400 * 1000;
  }).length;

  return (
    <div className="quick-review" style={{ marginBottom: '24px' }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '10px' }}>
        <div style={{ fontWeight: '700', fontSize: '13px', color: 'var(--ink-2)' }}>1分復習</div>
        {ngTotal > 0 && (
          <div style={{ fontSize: '11px', color: 'var(--ink-3)' }}>
            ✕累計 <strong style={{ color: '#d95454' }}>{ngTotal}</strong>
            {stale > 0 && <span style={{ marginLeft: '8px', color: '#ef6c00' }}>📅 再挑戦{stale}件</span>}
          </div>
        )}
      </div>
      {limited.map((item, i) => {
        const key = `${pageId}:${item.q}`;
        const s = stats[key];
        const isStale = s?.lastNgAt && (now - s.lastNgAt) > STALE_DAYS * 86400 * 1000;
        return (
          <details
            key={i}
            className="quick-review"
            open={!!opened[i]}
            onToggle={(e) => setOpened({ ...opened, [i]: e.currentTarget.open })}
          >
            <summary>
              Q{i + 1}: {item.q}　（クリックで答えを確認）
              {s?.ng > 0 && (
                <span className="qr-badge" style={{
                  marginLeft: '8px', fontSize: '10px', padding: '1px 6px', borderRadius: '8px',
                  background: isStale ? '#fff3e0' : '#fde8e8',
                  color: isStale ? '#ef6c00' : '#c0392b', fontWeight: 700,
                }}>
                  ✕{s.ng}{isStale ? ' 📅' : ''}
                </span>
              )}
            </summary>
            <div className="quick-review-answer">
              <div style={{ marginBottom: '10px' }}>A: {item.a}</div>
              <div style={{ display: 'flex', gap: '8px', alignItems: 'center', fontSize: '12px' }}>
                <button
                  className="qr-btn qr-btn-ok"
                  onClick={() => recordResult(item.q, item.a, true)}
                >○ 覚えた</button>
                <button
                  className="qr-btn qr-btn-ng"
                  onClick={() => recordResult(item.q, item.a, false)}
                >✕ 間違えた</button>
                {s && (
                  <span style={{ color: 'var(--ink-3)', fontSize: '11px' }}>
                    ○{s.ok} / ✕{s.ng}
                    {s.lastNgAt && ` ・ 最終誤答 ${new Date(s.lastNgAt).toISOString().slice(0,10)}`}
                  </span>
                )}
              </div>
              {s?.ng > 0 && (
                <div style={{ marginTop: '8px', fontSize: '11px', color: 'var(--ink-3)' }}>
                  ✕記録は <a href="#chokuzen-machigai" style={{ color: 'var(--accent)' }}>間違いノート</a> に自動追加されます
                </div>
              )}
            </div>
          </details>
        );
      })}
    </div>
  );
}

function Sidebar({ data, page, onNav }) {
  // 未実装ページの表示トグル（デフォルトOFF＝実装済みのみ表示）
  // localStorage で永続化。古舘さんが計画ページを見たいときだけONにする
  const [showStubs, setShowStubs] = React.useState(() => {
    return localStorage.getItem('hoki_sidebar_showStubs') === '1';
  });
  React.useEffect(() => {
    localStorage.setItem('hoki_sidebar_showStubs', showStubs ? '1' : '0');
  }, [showStubs]);

  // フィルタ後のチャプター（未実装が全部の章は除外）
  const filteredChapters = React.useMemo(() => {
    if (!data || !data.chapters) return [];
    if (showStubs) return data.chapters;
    return data.chapters
      .map(ch => ({ ...ch, pages: (ch.pages || []).filter(p => window.isPageReady(p.id)) }))
      .filter(ch => ch.pages.length > 0);
  }, [data, showStubs]);

  const [openChapters, setOpenChapters] = React.useState(() => {
    if (!filteredChapters) return {};
    const initial = {};
    filteredChapters.forEach((ch, idx) => {
      if (ch.pages && ch.pages.some(p => p.id === page)) {
        initial[idx] = true;
      }
    });
    return initial;
  });

  const toggleChapter = (idx) => {
    setOpenChapters(prev => ({ ...prev, [idx]: !prev[idx] }));
  };

  const getLastSeenBadge = (pageId) => {
    const val = localStorage.getItem(`hoki_lastSeen_${pageId}`);
    if (!val) return null;
    const diff = Date.now() - parseInt(val, 10);
    const days = diff / (1000 * 60 * 60 * 24);
    if (days >= 3) return <span className="nav-badge-review" title="3日以上未閲覧">🔄</span>;
    return null;
  };

  if (!data || !data.chapters) {
    return (
      <aside className="sidebar" style={{ padding: '16px', fontSize: '13px', color: 'var(--ink-3)' }}>
        データ未ロード
      </aside>
    );
  }

  // 件数集計（バッジ表示用）
  const totalPages = data.chapters.reduce((s, ch) => s + (ch.pages || []).length, 0);
  const readyPages = data.chapters.reduce((s, ch) => s + (ch.pages || []).filter(p => window.isPageReady(p.id)).length, 0);

  return (
    <aside className="sidebar" style={{ height: '100vh', overflowY: 'auto', borderRight: '1px solid var(--line)', padding: '12px 0' }}>
      {data.title && (
        <div style={{ padding: '10px 16px 16px', fontWeight: '700', fontSize: '14px', borderBottom: '1px solid var(--line)', marginBottom: '8px' }}>
          {data.title}
        </div>
      )}
      {/* スタブ表示トグル */}
      <div style={{ padding: '6px 16px 10px', borderBottom: '1px solid var(--line)', marginBottom: '8px', fontSize: '11px', color: 'var(--ink-3)' }}>
        <label style={{ display: 'flex', alignItems: 'center', gap: '6px', cursor: 'pointer', userSelect: 'none' }}>
          <input
            type="checkbox"
            checked={showStubs}
            onChange={e => setShowStubs(e.target.checked)}
            style={{ margin: 0 }}
          />
          <span>未実装ページも表示（{readyPages}/{totalPages}）</span>
        </label>
      </div>
      {filteredChapters.map((ch, idx) => (
        <div key={idx}>
          <div
            onClick={() => toggleChapter(idx)}
            style={{
              display: 'flex',
              alignItems: 'center',
              gap: '6px',
              padding: '8px 16px',
              cursor: 'pointer',
              fontSize: '12px',
              fontWeight: '700',
              color: 'var(--ink-2)',
              background: openChapters[idx] ? 'var(--bg-2)' : 'transparent',
              userSelect: 'none',
            }}
          >
            <span style={{ color: 'var(--ink-3)', fontSize: '10px' }}>{openChapters[idx] ? '▼' : '▶'}</span>
            {ch.num && ch.num !== '00' && <span style={{ fontSize: '10px', color: 'var(--ink-3)' }}>{ch.num}</span>}
            <span style={{ flex: 1 }}>{ch.title}</span>
          </div>
          {openChapters[idx] && ch.pages && ch.pages.map((p, pi) => {
            const isActive = p.id === page;
            return (
              <div
                key={pi}
                onClick={() => onNav && onNav(p.id)}
                style={{
                  display: 'flex',
                  alignItems: 'center',
                  gap: '6px',
                  padding: '7px 16px 7px 28px',
                  cursor: 'pointer',
                  fontSize: '12px',
                  background: isActive ? 'var(--accent-soft)' : 'transparent',
                  borderLeft: isActive ? '3px solid var(--accent)' : '3px solid transparent',
                  color: isActive ? 'var(--accent)' : 'var(--ink-2)',
                  transition: 'background 0.1s',
                }}
                onMouseEnter={e => { if (!isActive) e.currentTarget.style.background = 'var(--bg-2)'; }}
                onMouseLeave={e => { if (!isActive) e.currentTarget.style.background = 'transparent'; }}
              >
                <span style={{ flex: 1, lineHeight: '1.4', opacity: window.isPageReady(p.id) ? 1 : 0.55 }}>
                  {!window.isPageReady(p.id) && <span title="Hubでは作成中" style={{ marginRight: 4, fontSize: 10 }}>🚧</span>}
                  {p.title}
                </span>
                {p.priority === 'required' && (
                  <span className="priority-label">★必須</span>
                )}
                {!window.isPageReady(p.id) && p.ext && (
                  <a
                    href={(window.MKDOCS_BASE || 'https://kfurufuru.github.io/denken-wiki/') + p.ext}
                    target="_blank"
                    rel="noopener noreferrer"
                    onClick={e => e.stopPropagation()}
                    title="本サイト（mkdocs）で読む"
                    style={{ fontSize: 10, color: 'var(--accent)', textDecoration: 'none', padding: '0 4px' }}
                  >↗</a>
                )}
                {p.freq === 'max' && <span className="freq-max">毎回</span>}
                {p.freq === 'high' && <span className="freq-high">頻出</span>}
                {p.twin && (
                  <span
                    title={`対となるページ: ${p.twin}`}
                    onClick={e => { e.stopPropagation(); onNav && onNav(p.twin); }}
                    style={{ cursor: 'pointer', color: 'var(--accent)', fontSize: '11px' }}
                  >
                    ↔
                  </span>
                )}
                {getLastSeenBadge(p.id)}
              </div>
            );
          })}
        </div>
      ))}
    </aside>
  );
}

      ))}
    </div>
  );
}

// 学習モード Lv.2: 混同ペアブラインドテスト
// ============================================================

// 純関数：localStorageから統計読込
function loadQuizStats() {
  try {
    const raw = localStorage.getItem('hoki_quiz_stats');
    return raw ? JSON.parse(raw) : {};
  } catch (e) { return {}; }
}
function saveQuizStats(stats) {
  try { localStorage.setItem('hoki_quiz_stats', JSON.stringify(stats)); } catch (e) {}
}
function recordQuizResult(stats, groupId, isCorrect, responseMs) {
  const next = { ...stats };
  const g = next[groupId] || { ok: 0, ng: 0, totalMs: 0 };
  next[groupId] = {
    ok: g.ok + (isCorrect ? 1 : 0),
    ng: g.ng + (isCorrect ? 0 : 1),
    totalMs: g.totalMs + (responseMs || 0),
  };
  saveQuizStats(next);
  return next;
}
// 弱点グループ（正答率<70%、最低3問挑戦済み）を返す。降順
function weakGroups(stats) {
  return Object.entries(stats)
    .filter(([k, v]) => (v.ok + v.ng) >= 3)
    .map(([k, v]) => ({
      group: k,
      total: v.ok + v.ng,
      rate: v.ok / (v.ok + v.ng),
    }))
    .filter(x => x.rate < 0.7)
    .sort((a, b) => a.rate - b.rate);
}

// 純関数：用語データから1問のクイズを生成（弱点重み付け対応）
// returns: { def, answer, choices, group } or null（混同グループ不足時）
function buildQuiz(glossary, stats) {
  const groups = {};
  glossary.forEach(g => {
    if (g.group) {
      if (!groups[g.group]) groups[g.group] = [];
      groups[g.group].push(g);
    }
  });
  const groupKeys = Object.keys(groups).filter(k => groups[k].length >= 2);
  if (groupKeys.length === 0) return null;
  // 重み付き抽選: 弱点グループ（正答率<70%・3問以上挑戦）は重み3倍
  const weights = groupKeys.map(k => {
    if (!stats || !stats[k]) return 1;
    const v = stats[k];
    const total = v.ok + v.ng;
    if (total < 3) return 1;
    const rate = v.ok / total;
    return rate < 0.7 ? 3 : 1;
  });
  const totalWeight = weights.reduce((a, b) => a + b, 0);
  let r = Math.random() * totalWeight;
  let gKey = groupKeys[0];
  for (let i = 0; i < groupKeys.length; i++) {
    r -= weights[i];
    if (r <= 0) { gKey = groupKeys[i]; break; }
  }
  const groupTerms = groups[gKey];
  const answer = groupTerms[Math.floor(Math.random() * groupTerms.length)];
  // 選択肢: 同グループ全語 + 他グループから1〜2語ダミー
  const otherGroups = groupKeys.filter(k => k !== gKey);
  const dummies = [];
  const dummyCount = Math.min(otherGroups.length, groupTerms.length <= 2 ? 2 : 1);
  const shuffledOthers = [...otherGroups].sort(() => Math.random() - 0.5).slice(0, dummyCount);
  shuffledOthers.forEach(k => {
    const t = groups[k][Math.floor(Math.random() * groups[k].length)];
    if (!dummies.includes(t.term)) dummies.push(t.term);
  });
  let choices = [...groupTerms.map(t => t.term), ...dummies];
  // Fisher-Yates shuffle
  for (let i = choices.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [choices[i], choices[j]] = [choices[j], choices[i]];
  }
  return { def: answer.def, answer: answer.term, choices, group: gKey };
}

function QuizPanel({ glossary, onExit, onNav }) {
  const [seed, setSeed] = React.useState(0);
  const [picked, setPicked] = React.useState(null);
  const [score, setScore] = React.useState({ ok: 0, ng: 0, totalMs: 0 });
  const [stats, setStats] = React.useState(() => loadQuizStats());
  const [showSummary, setShowSummary] = React.useState(false);
  const [questionStartedAt, setQuestionStartedAt] = React.useState(() => Date.now());
  const [responseMs, setResponseMs] = React.useState(null);

  // stats を渡して弱点重み付け抽選
  const quiz = React.useMemo(() => buildQuiz(glossary, stats), [seed, glossary]);

  // 新しい問題が出た瞬間にタイマーをリセット
  React.useEffect(() => {
    setQuestionStartedAt(Date.now());
    setResponseMs(null);
  }, [seed]);

  if (showSummary) {
    const total = score.ok + score.ng;
    const rate = total > 0 ? Math.round((score.ok / total) * 100) : 0;
    const avgMs = total > 0 ? Math.round(score.totalMs / total) : 0;
    const weak = weakGroups(stats).slice(0, 3);
    const groupLabel = (gKey) => {
      // 同グループの最初の用語名を代表とする
      const first = glossary.find(g => g.group === gKey);
      return first ? first.term + ' グループ' : gKey;
    };
    return (
      <div className="sr-quiz-panel">
        <div className="quiz-header">📊 セッションサマリ</div>
        <div className="quiz-summary-stats">
          <div className="quiz-stat-row">
            <span className="quiz-stat-label">出題数</span>
            <span className="quiz-stat-value">{total} 問</span>
          </div>
          <div className="quiz-stat-row">
            <span className="quiz-stat-label">正解 / 不正解</span>
            <span className="quiz-stat-value"><span style={{color:'#1b5e20'}}>{score.ok}</span> / <span style={{color:'#c0392b'}}>{score.ng}</span></span>
          </div>
          <div className="quiz-stat-row">
            <span className="quiz-stat-label">正答率</span>
            <span className="quiz-stat-value" style={{color: rate >= 70 ? '#1b5e20' : '#c0392b'}}>{rate}%</span>
          </div>
          <div className="quiz-stat-row">
            <span className="quiz-stat-label">平均回答時間</span>
            <span className="quiz-stat-value">{(avgMs / 1000).toFixed(1)} 秒</span>
          </div>
        </div>
        {weak.length > 0 ? (
          <div className="quiz-weak">
            <div className="quiz-weak-title">⚠️ 弱点グループ TOP{weak.length}（クリックで該当ページへ）</div>
            {weak.map((w, i) => {
              const pid = groupToPageId(glossary, w.group);
              const clickable = !!pid && !!onNav;
              return (
                <div
                  key={w.group}
                  className="quiz-weak-row"
                  style={clickable ? { cursor: 'pointer' } : undefined}
                  onClick={clickable ? () => { onExit(); onNav(pid); } : undefined}
                  title={clickable ? "クリックで該当ページへ移動（Lv.2は終了）" : undefined}
                >
                  <span className="quiz-weak-rank">#{i + 1}</span>
                  <span className="quiz-weak-name" style={clickable ? { textDecoration: 'underline', textUnderlineOffset: '2px' } : undefined}>{groupLabel(w.group)}</span>
                  <span className="quiz-weak-rate">{Math.round(w.rate * 100)}% ({w.total}問)</span>
                </div>
              );
            })}
            <div className="quiz-weak-hint">→ 次回の Lv.2 では弱点グループが優先出題されます</div>
          </div>
        ) : (
          <div className="quiz-weak-empty">📈 累計データはまだ少ないか、弱点はありません（3問以上挑戦＆正答率&lt;70%で表示）</div>
        )}
        <div className="quiz-actions">
          <button className="quiz-next" onClick={() => { setShowSummary(false); setScore({ ok: 0, ng: 0, totalMs: 0 }); setSeed(s => s + 1); }}>もう1セット</button>
          <button className="quiz-exit" onClick={onExit}>閉じる</button>
        </div>
      </div>
    );
  }

  if (!quiz) {
    return <div className="sr-empty">混同グループが不足しています</div>;
  }

  const isCorrect = picked === quiz.answer;
  const handlePick = (choice) => {
    if (picked) return;
    const elapsed = Date.now() - questionStartedAt;
    setResponseMs(elapsed);
    setPicked(choice);
    const correct = choice === quiz.answer;
    setScore(s => ({
      ok: s.ok + (correct ? 1 : 0),
      ng: s.ng + (correct ? 0 : 1),
      totalMs: s.totalMs + elapsed,
    }));
    // 永続化（弱点重み付けの根拠データ）
    setStats(prev => recordQuizResult(prev, quiz.group, correct, elapsed));
  };
  const next = () => { setPicked(null); setSeed(s => s + 1); };
  const finish = () => { setShowSummary(true); };
  const answerDef = glossary.find(g => g.term === quiz.answer)?.def || '';

  return (
    <div className="sr-quiz-panel">
      <div className="quiz-header">🎓 LV.2 混同ペアブラインドテスト</div>
      <div className="quiz-prompt">この定義はどの用語でしょう？</div>
      <div className="quiz-def">{quiz.def}</div>
      <div className="quiz-choices">
        {quiz.choices.map(c => {
          let cls = 'quiz-choice';
          if (picked) {
            if (c === quiz.answer) cls += ' correct';
            else if (c === picked) cls += ' wrong';
          }
          return (
            <button
              key={c}
              className={cls}
              disabled={!!picked}
              onClick={() => handlePick(c)}
            >{c}</button>
          );
        })}
      </div>
      {picked && (
        <>
          <div className={`quiz-feedback${isCorrect ? ' correct' : ' wrong'}`}>
            {isCorrect ? `✓ 正解！ (${(responseMs / 1000).toFixed(1)}秒)` : `✗ 残念。正解は「${quiz.answer}」 (${(responseMs / 1000).toFixed(1)}秒)`}
            <div className="quiz-feedback-def">{answerDef}</div>
          </div>
          <div className="quiz-actions">
            <button className="quiz-next" onClick={next}>次の問題 →</button>
            <button className="quiz-exit" onClick={finish}>終了してサマリ表示</button>
          </div>
        </>
      )}
      <div className="quiz-meta">
        セッション中：正解 {score.ok} / 不正解 {score.ng}
      </div>
    </div>
  );
}

function TopBar({ page, onNav }) {
  const data = window.WIKI_DATA;
  const glossary = window.WIKI_GLOSSARY || [];
  let pageTitle = page;
  if (data && data.chapters) {
    data.chapters.forEach(ch => {
      (ch.pages || []).forEach(p => {
        if (p.id === page) pageTitle = p.title;
      });
    });
  }

  const [query, setQuery] = React.useState('');
  const [open, setOpen] = React.useState(false);
  const [focusIdx, setFocusIdx] = React.useState(-1);
  const [studyLevel, setStudyLevel] = React.useState(() => {
    try {
      const stored = localStorage.getItem('hoki_studyLevel');
      if (stored !== null) return Math.max(0, Math.min(2, parseInt(stored, 10) || 0));
      // 旧キーマイグレーション
      const legacy = localStorage.getItem('hoki_studyMode');
      if (legacy === '1') return 1;
      return 0;
    } catch (e) { return 0; }
  });
  const [revealed, setRevealed] = React.useState({});
  const wrapRef = React.useRef(null);

  React.useEffect(() => {
    try { localStorage.setItem('hoki_studyLevel', String(studyLevel)); } catch (e) {}
  }, [studyLevel]);

  // クエリが変わったら revealed をリセット（次の用語で再度想起させる）
  React.useEffect(() => { setRevealed({}); }, [query]);

  // 検索インデックス: ページ + 用語
  const allItems = React.useMemo(() => {
    const items = [];
    if (data && data.chapters) {
      data.chapters.forEach(ch => {
        (ch.pages || []).forEach(p => {
          if (p.id === 'top') return;
          items.push({ kind: 'page', id: p.id, label: p.title, sub: `${ch.num} ${ch.title}` });
        });
      });
    }
    // Phase 2: 用語の related → WIKI_DATA から ready/ext を引いて拡張
    const findPage = (pid) => {
      if (!pid || !data || !data.chapters) return null;
      for (const ch of data.chapters) {
        const p = (ch.pages || []).find(pg => pg.id === pid);
        if (p) return p;
      }
      return null;
    };
    glossary.forEach(g => {
      const pageInfo = findPage(g.related);
      items.push({
        kind: 'term',
        id: g.related || 'top',
        label: g.term,
        reading: g.reading || '',
        def: g.def,
        related: g.related,
        group: g.group || null,
        ready: pageInfo ? window.isPageReady(pageInfo.id) : false,
        ext: pageInfo ? pageInfo.ext : null,
      });
    });
    return items;
  }, [data, glossary]);

  // 用語名 → 用語データの逆引き（混同・関連表示用）
  const termByName = React.useMemo(() => {
    const map = {};
    glossary.forEach(g => { map[g.term] = g; });
    return map;
  }, [glossary]);

  // 用語が属する混同グループ・関連グループの他用語を返す
  const peersOf = (term) => {
    const t = termByName[term];
    if (!t) return { confused: [], related: [] };
    const confused = [];
    const related = [];
    glossary.forEach(g => {
      if (g.term === term) return;
      if (t.group && g.group === t.group) {
        confused.push(g.term);
      } else if (t.related && g.related === t.related) {
        related.push(g.term);
      }
    });
    return { confused: confused.slice(0, 6), related: related.slice(0, 5) };
  };

  const results = React.useMemo(() => {
    const q = query.trim().toLowerCase();
    if (!q) return [];
    const scored = [];
    allItems.forEach(it => {
      const label = it.label.toLowerCase();
      const reading = (it.reading || '').toLowerCase();
      const def = (it.def || '').toLowerCase();
      let score = -1;
      if (label.startsWith(q)) score = 100;
      else if (label.includes(q)) score = 80;
      else if (reading.includes(q)) score = 60;
      else if (def.includes(q)) score = 30;
      if (score >= 0) scored.push({ ...it, score });
    });
    scored.sort((a, b) => b.score - a.score);
    return scored.slice(0, 12);
  }, [query, allItems]);

  // 外側クリックで閉じる
  React.useEffect(() => {
    const handler = (e) => {
      if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false);
    };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  // Ctrl+K / Cmd+K でフォーカス
  React.useEffect(() => {
    const handler = (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        const inp = wrapRef.current && wrapRef.current.querySelector('input');
        if (inp) inp.focus();
      }
    };
    document.addEventListener('keydown', handler);
    return () => document.removeEventListener('keydown', handler);
  }, []);

  const selectItem = (it) => {
    if (!it) return;
    setQuery('');
    setOpen(false);
    setFocusIdx(-1);
    if (it.id) onNav(it.id);
  };

  const onKeyDown = (e) => {
    if (!open || results.length === 0) return;
    if (e.key === 'ArrowDown') { e.preventDefault(); setFocusIdx(i => Math.min(i + 1, results.length - 1)); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); setFocusIdx(i => Math.max(i - 1, 0)); }
    else if (e.key === 'Enter') { e.preventDefault(); selectItem(results[focusIdx >= 0 ? focusIdx : 0]); }
    else if (e.key === 'Escape') { setOpen(false); }
  };

  return (
    <div className="topbar" style={{
      display: 'flex',
      alignItems: 'center',
      gap: '10px',
      padding: '10px 20px',
      borderBottom: '1px solid var(--line)',
      fontSize: '13px',
      background: 'var(--bg)',
      position: 'sticky',
      top: 0,
      zIndex: 10,
    }}>
      <span
        onClick={() => onNav && onNav('top')}
        style={{ cursor: 'pointer', color: 'var(--accent)' }}
      >
        ホーム
      </span>
      {page !== 'top' && (
        <>
          <span style={{ color: 'var(--ink-3)' }}>/</span>
          <span className="page-title" style={{ color: 'var(--ink-2)' }}>{pageTitle}</span>
        </>
      )}
      <div className="search" ref={wrapRef}>
        <span className="icn">🔍</span>
        <input
          type="text"
          placeholder={studyLevel === 2 ? "Lv.2 テスト中…" : "用語・ページを検索（Ctrl+K）"}
          value={query}
          disabled={studyLevel === 2}
          onChange={(e) => { setQuery(e.target.value); setOpen(true); setFocusIdx(-1); }}
          onFocus={() => setOpen(true)}
          onKeyDown={onKeyDown}
        />
        <span
          className={`study-toggle${studyLevel === 1 ? ' on' : ''}${studyLevel === 2 ? ' lv2' : ''}`}
          onClick={() => setStudyLevel(l => (l + 1) % 3)}
          title="学習モード切替：OFF → Lv.1想起 → Lv.2テスト → OFF"
        >🎓 {studyLevel === 0 ? '学習OFF' : studyLevel === 1 ? 'Lv.1 想起' : 'Lv.2 テスト'}</span>
        <span className="kbd">Ctrl+K</span>
        <div className={`search-results${(studyLevel === 2 || (open && query.trim())) ? ' open' : ''}`}>
          {studyLevel === 2 ? (
            <QuizPanel glossary={glossary} onExit={() => setStudyLevel(0)} onNav={onNav} />
          ) : results.length === 0 ? (
            <div className="sr-empty">該当なし</div>
          ) : results.map((it, i) => {
            const peers = it.kind === 'term' ? peersOf(it.label) : { confused: [], related: [] };
            const switchQuery = (e, term) => {
              e.preventDefault();
              e.stopPropagation();
              setQuery(term);
              setFocusIdx(0);
              setOpen(true);
            };
            return (
              <div
                key={it.kind + ':' + it.label + i}
                className={`sr-item${focusIdx === i ? ' focused' : ''}`}
                onMouseEnter={() => setFocusIdx(i)}
                onMouseDown={(e) => { e.preventDefault(); selectItem(it); }}
              >
                <div className="sr-label">
                  {it.kind === 'term'
                    ? <><span className="sr-tag-term">用語</span> {it.label}{it.reading ? <span className="sr-reading">（{it.reading}）</span> : null}</>
                    : <><span className="sr-tag-page">ページ</span> {it.label}</>
                  }
                </div>
                {it.kind === 'page' && <div className="sr-sub">{it.sub}</div>}
                {it.kind === 'term' && (
                  studyLevel === 1 && !revealed[i]
                    ? (
                      <div className="sr-quiz">
                        <span>💭 定義を思い出してみて...</span>
                        <button
                          className="sr-quiz-reveal"
                          onMouseDown={(e) => {
                            e.preventDefault();
                            e.stopPropagation();
                            setRevealed(r => ({ ...r, [i]: true }));
                          }}
                        >答えを見る</button>
                      </div>
                    )
                    : <div className="sr-def">{it.def}</div>
                )}
                {it.kind === 'term' && peers.confused.length > 0 && (
                  <div className="sr-meta sr-meta-confused">
                    ⚠️ よく混同：
                    {peers.confused.map(name => (
                      <span
                        key={name}
                        className="sr-chip sr-chip-confused"
                        onMouseDown={(e) => switchQuery(e, name)}
                      >{name}</span>
                    ))}
                  </div>
                )}
                {it.kind === 'term' && peers.related.length > 0 && (
                  <div className="sr-meta sr-meta-related">
                    📎 関連：
                    {peers.related.map(name => (
                      <span
                        key={name}
                        className="sr-chip"
                        onMouseDown={(e) => switchQuery(e, name)}
                      >{name}</span>
                    ))}
                  </div>
                )}
                {it.kind === 'term' && !window.isPageReady(it.id) && it.ext && (
                  <div className="sr-meta" style={{ marginTop: 4, fontSize: 11 }}>
                    <a
                      href={(window.MKDOCS_BASE || 'https://kfurufuru.github.io/denken-wiki/') + it.ext}
                      target="_blank"
                      rel="noopener noreferrer"
                      onMouseDown={(e) => e.stopPropagation()}
                      onClick={(e) => e.stopPropagation()}
                      style={{ color: 'var(--accent)', textDecoration: 'none', fontWeight: 600 }}
                    >📖 本サイトで詳しく読む ↗</a>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// 純関数：グループID → 代表ページID（同グループ最初の用語の related）
function groupToPageId(glossary, gKey) {
  const first = glossary.find(g => g.group === gKey && g.related);
  return first ? first.related : null;
}

// ============================================================
// Lv.2 学習履歴カード（topページに表示・PDCAのCheck/Action導線）
// ============================================================
function Lv2HistoryCard({ onNav }) {
  const stats = React.useMemo(() => loadQuizStats(), []);
  const glossary = window.WIKI_GLOSSARY || [];

  const total = Object.values(stats).reduce((a, v) => a + (v.ok || 0) + (v.ng || 0), 0);
  const totalOk = Object.values(stats).reduce((a, v) => a + (v.ok || 0), 0);
  const rate = total > 0 ? Math.round((totalOk / total) * 100) : 0;
  const totalMs = Object.values(stats).reduce((a, v) => a + (v.totalMs || 0), 0);
  const avgMs = total > 0 ? Math.round(totalMs / total) : 0;
  const weak = weakGroups(stats).slice(0, 3);

  const groupLabel = (gKey) => {
    const first = glossary.find(g => g.group === gKey);
    return first ? first.term + ' グループ' : gKey;
  };
  const goWeakPage = (gKey) => {
    const pid = groupToPageId(glossary, gKey);
    if (pid && onNav) onNav(pid);
  };

  const startLv2 = () => {
    try { localStorage.setItem('hoki_studyLevel', '2'); } catch (e) {}
    location.reload();
  };

  const cardStyle = { marginTop: 14, background: 'var(--bg-elev)', border: '1px solid var(--border)', borderRadius: 'var(--radius)', padding: '14px 18px' };

  if (total === 0) {
    return (
      <div style={cardStyle}>
        <div style={{ fontSize: 11, color: 'var(--ink-3)', marginBottom: 4 }}>🎓 Lv.2 ハードモード（混同ペアブラインドテスト）</div>
        <div style={{ fontSize: 13, color: 'var(--ink-2)', lineHeight: 1.6, marginBottom: 10 }}>
          まだ未挑戦。検索窓のトグル「🎓 学習OFF」を2回押すと起動します。混同しやすい用語ペア（A〜D種接地・専任/兼任・速報/詳報など）を弁別学習で潰せます。
        </div>
        <button className="btn primary" onClick={startLv2}>Lv.2 を始める →</button>
      </div>
    );
  }

  return (
    <div style={cardStyle}>
      <div style={{ fontSize: 11, color: 'var(--ink-3)', marginBottom: 8, fontWeight: 600, letterSpacing: '0.05em' }}>🎓 Lv.2 学習履歴（累計）</div>
      <div style={{ display: 'flex', gap: 20, marginBottom: 12, fontSize: 13, flexWrap: 'wrap' }}>
        <div><span style={{ color: 'var(--ink-3)' }}>累計 </span><strong>{total}問</strong></div>
        <div><span style={{ color: 'var(--ink-3)' }}>正答率 </span><strong style={{ color: rate >= 70 ? '#1b5e20' : '#c0392b' }}>{rate}%</strong></div>
        <div><span style={{ color: 'var(--ink-3)' }}>平均 </span><strong>{(avgMs / 1000).toFixed(1)}秒</strong></div>
      </div>
      {weak.length > 0 ? (
        <div style={{ marginBottom: 10, fontSize: 12 }}>
          <div style={{ color: '#c0392b', fontWeight: 700, marginBottom: 4 }}>⚠️ 弱点グループ TOP{weak.length}（クリックで該当ページへ）</div>
          {weak.map((w, i) => (
            <div
              key={w.group}
              onClick={() => goWeakPage(w.group)}
              style={{
                display: 'flex', gap: 8, padding: '5px 6px',
                color: 'var(--ink-2)', borderRadius: 4,
                cursor: 'pointer',
                transition: 'background 0.1s',
              }}
              onMouseEnter={(e) => e.currentTarget.style.background = 'var(--accent-soft)'}
              onMouseLeave={(e) => e.currentTarget.style.background = 'transparent'}
              title="クリックで該当ページへ"
            >
              <span style={{ minWidth: 22, color: '#c0392b', fontWeight: 700 }}>#{i + 1}</span>
              <span style={{ flex: 1, textDecoration: 'underline', textUnderlineOffset: '2px', textDecorationColor: 'var(--line)' }}>{groupLabel(w.group)}</span>
              <span style={{ color: '#c0392b', fontWeight: 600 }}>{Math.round(w.rate * 100)}% ({w.total}問)</span>
            </div>
          ))}
        </div>
      ) : (
        <div style={{ marginBottom: 10, fontSize: 12, color: 'var(--ink-3)' }}>📈 弱点なし（全グループ70%以上、または3問未満）</div>
      )}
      <button className="btn primary" style={{ width: '100%' }} onClick={startLv2}>Lv.2 で弱点を潰す →</button>
    </div>
  );
}

function ActiveEditsBanner() {
  // inbox/active-edits.md を fetch して BEGIN_ACTIVE 〜 END_ACTIVE の中身をパース・表示
  // 並列セッション衝突防止（2026-05-03 a9675b0 事案を受けて構築）
  const [data, setData] = React.useState(null);
  const [error, setError] = React.useState(false);

  React.useEffect(() => {
    const load = () => {
      fetch('inbox/active-edits.md', { cache: 'no-store' })
        .then(r => r.ok ? r.text() : Promise.reject())
        .then(txt => {
          const m = txt.match(/<!-- BEGIN_ACTIVE -->([\s\S]*?)<!-- END_ACTIVE -->/);
          if (!m || !m[1].trim()) { setData([]); return; }
          const block = m[1].trim();
          const chunks = block.split(/\n(?=### )/).filter(c => c.trim());
          const entries = chunks.map(c => {
            const sm = c.match(/### (.+?) — (.+?) 開始/);
            const tm = c.match(/\*\*対象\*\*:\s*`(.+?)`/);
            const rm = c.match(/\*\*作業内容\*\*:\s*(.+)/);
            const dm = c.match(/\*\*期限\*\*:\s*(.+)/);
            return {
              session: sm && sm[1],
              started: sm && sm[2],
              target: tm && tm[1],
              reason: rm && rm[1],
              deadline: dm && dm[1],
            };
          });
          setData(entries);
        })
        .catch(() => setError(true));
    };
    load();
    const id = setInterval(load, 30000); // 30秒自動更新
    return () => clearInterval(id);
  }, []);

  if (error || data === null) return null;

  const obsidianURL = 'obsidian://open?vault=.secretary&file=inbox%2Factive-edits.md';
  const isEmpty = data.length === 0;
  const bg = isEmpty ? '#e8f5e9' : '#fff3e0';
  const border = isEmpty ? '#2e7d32' : '#ef6c00';
  const tx = isEmpty ? '#1b5e20' : '#e65100';

  return (
    <div style={{
      background: bg,
      border: '1px solid ' + border,
      borderLeft: '4px solid ' + border,
      borderRadius: 'var(--radius)',
      padding: '10px 14px',
      marginBottom: 16,
      fontSize: 12,
      lineHeight: 1.6,
    }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
        <span style={{ fontWeight: 700, color: tx }}>
          {isEmpty
            ? '🔒 編集ロック: ✓ 衝突なし（並列セッション安全）'
            : '🔒 編集ロック: ⚠ ' + data.length + '件 編集中'}
        </span>
        <a href={obsidianURL}
           style={{ marginLeft: 'auto', fontSize: 11, color: tx, textDecoration: 'underline' }}
           title="Obsidian（個人利用無料）で active-edits.md を開く">
          📝 Obsidian で開く
        </a>
        <a href="inbox/active-edits.md" target="_blank"
           style={{ fontSize: 11, color: tx, textDecoration: 'underline' }}
           title="ブラウザで raw markdown を表示">
          🔗 raw を見る
        </a>
      </div>
      {!isEmpty && (
        <ul style={{ margin: '6px 0 0', paddingLeft: 20, color: tx, fontSize: 11 }}>
          {data.map((e, i) => (
            <li key={i}>
              <code style={{ fontSize: 11, background: 'rgba(255,255,255,0.5)', padding: '0 4px', borderRadius: 3 }}>

            </li>
          ))}
        </ul>
      )}
    </div>
  );
}

// 8-D. ChokuzenMachigaiPage（直前チェック: 間違いノート・localStorage連動）
// ─────────────────────────────────────────────
function ChokuzenMachigaiPage({ onNav, data }) {
  const STORAGE_KEY = 'denken-hoki-machigai-notes';
  const [notes, setNotes] = React.useState(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch { return []; }
  });
  const [draft, setDraft] = React.useState({ topic: '', wrong: '', correct: '', source: '' });

  React.useEffect(() => {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(notes)); } catch {}
  }, [notes]);

  const addNote = () => {
    if (!draft.wrong.trim() || !draft.correct.trim()) return;
    const newNote = {
      id: Date.now(),
      date: new Date().toISOString().slice(0, 10),
      topic: draft.topic.trim() || '未分類',
      wrong: draft.wrong.trim(),
      correct: draft.correct.trim(),
      source: draft.source.trim(),
    };
    setNotes([newNote, ...notes]);
    setDraft({ topic: '', wrong: '', correct: '', source: '' });
  };
  const removeNote = (id) => setNotes(notes.filter(n => n.id !== id));
  const exportNotes = () => {
    const md = notes.map(n =>
      `## ${n.date} - ${n.topic}\n\n**誤**: ${n.wrong}\n\n**正**: ${n.correct}\n` +
      (n.source ? `\n**出典**: ${n.source}\n` : '')
    ).join('\n---\n\n');
    const blob = new Blob([md], { type: 'text/markdown' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `machigai-notes-${new Date().toISOString().slice(0,10)}.md`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const inputStyle = {
    width: '100%', padding: '8px 10px', fontSize: '13px',
    border: '1px solid var(--border)', borderRadius: '4px',
    background: 'var(--bg)', color: 'var(--ink)', marginBottom: '8px',
  };

  return (
    <div>
      <div style={{
        background: 'var(--bg-elev)', border: '1px solid var(--border)',
        borderLeft: '3px solid var(--accent)', borderRadius: 'var(--radius)',
        padding: '14px 18px', marginBottom: '24px', fontSize: '13px',
      }}>
        <div style={{ fontWeight: 700, marginBottom: 4 }}>📝 個人用・間違いノート（localStorage保存）</div>
        過去問・模擬で間違えた論点を記録。データはブラウザに永続保存。Markdown出力可。
      </div>

      <h2 id="overview">1. 全体像 — 間違いノートの位置づけ</h2>
      <HoukiOverviewSvg
        center={{ label: '個人間違いノート', sub: 'localStorage連動', theme: 'blue' }}
        top={{ label: '誤答ログ', sub: '過去問・模擬の間違い', theme: 'red', arrowLabel: '入力' }}
        left={{ label: '誤った理解', sub: '何を誤解したか', theme: 'orange', arrowLabel: 'wrong' }}
        right={{ label: '正しい理解', sub: '正解とその根拠', theme: 'cyan', arrowLabel: 'correct' }}
        bottom={{ label: 'Markdown出力', sub: '試験前まとめ', theme: 'green', arrowLabel: '出力' }}
      />
      <MemTable
        headers={["項目", "目的"]}
        rows={[
          ["topic",   "分類タグ（例: B種接地・絶縁試験）"],
          ["wrong",   "自分が選んだ/書いた誤った答え"],
          ["correct", "正解+理由（根拠条文・公式）"],
          ["source",  "出典（過去問年度・模擬試験名等）"],
        ]}
        source="出典：本サイト独自実装（localStorage完結）"
      />

      <h2 id="add-note">📝 ノート追加</h2>
      <div style={{
        background: 'var(--bg-elev)', border: '1px solid var(--border)',
        borderRadius: 'var(--radius)', padding: '16px 18px', marginBottom: '24px',
      }}>
        <input style={inputStyle} placeholder="topic（例: B種接地・電圧降下）"
          value={draft.topic} onChange={e => setDraft({ ...draft, topic: e.target.value })} />
        <textarea style={{ ...inputStyle, minHeight: '60px' }}
          placeholder="wrong: 誤った理解・選んだ選択肢"
          value={draft.wrong} onChange={e => setDraft({ ...draft, wrong: e.target.value })} />
        <textarea style={{ ...inputStyle, minHeight: '60px' }}
          placeholder="correct: 正しい答え+理由（根拠条文・公式）"
          value={draft.correct} onChange={e => setDraft({ ...draft, correct: e.target.value })} />
        <input style={inputStyle} placeholder="source（例: R05下A問題6・電気書院模試3）"
          value={draft.source} onChange={e => setDraft({ ...draft, source: e.target.value })} />
        <div style={{ display: 'flex', gap: '8px' }}>
          <button className="btn primary" onClick={addNote}
            disabled={!draft.wrong.trim() || !draft.correct.trim()}>
            追加する
          </button>
          {notes.length > 0 && (
            <button className="btn secondary" onClick={exportNotes}>
              Markdown出力（{notes.length}件）
            </button>
          )}
        </div>
      </div>

      <h2 id="notes-list">📋 記録済みノート（{notes.length}件）</h2>
      {notes.length === 0 ? (
        <div style={{
          background: 'var(--bg-elev)', border: '1px dashed var(--border)',
          borderRadius: 'var(--radius)', padding: '24px',
          textAlign: 'center', color: 'var(--ink-3)', fontSize: '13px',
        }}>
          まだノートがありません。過去問で間違えた論点を上記フォームから追加してください。
        </div>
      ) : (
        <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
          {notes.map(n => (
            <div key={n.id} style={{
              background: 'var(--bg-elev)', border: '1px solid var(--border)',
              borderRadius: 'var(--radius)', padding: '14px 18px', fontSize: '13px',
            }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '8px' }}>
                <div>
                  <span style={{
                    background: 'var(--accent)', color: '#fff', padding: '2px 8px',
                    borderRadius: '3px', fontSize: '11px', fontWeight: 700,
                  }}>{n.topic}</span>
                  <span style={{ marginLeft: '8px', color: 'var(--ink-3)', fontSize: '11px' }}>
                    {n.date}
                  </span>
                </div>
                <button onClick={() => removeNote(n.id)} style={{
                  background: 'none', border: 'none', color: 'var(--ink-3)',
                  cursor: 'pointer', fontSize: '11px', padding: '0 4px',
                }}>削除</button>
              </div>
              <div style={{ marginBottom: '6px' }}>
                <strong style={{ color: '#d95454' }}>誤</strong>: {n.wrong}
              </div>
              <div style={{ marginBottom: '6px' }}>
                <strong style={{ color: '#2e7d32' }}>正</strong>: {n.correct}
              </div>
              {n.source && (
                <div style={{ fontSize: '11px', color: 'var(--ink-3)' }}>
                  出典: {n.source}
                </div>
              )}
            </div>
          ))}
        </div>
      )}

      <h2 id="terms">4. 法規特有表現（ノート活用）</h2>
      <MemTable
        headers={["日常語", "法規表現", "試験での意味"]}
        rows={[
          ["過去問で間違えた",  "誤答記録",                   "弱点の可視化"],
          ["復習する",          "間違いの再評価",             "正解の根拠を再確認"],
          ["まとめる",          "Markdown出力",               "試験直前確認用"],
          ["分類する",          "topicタグ",                  "分野別集計"],
          ["蓄積する",          "localStorage 永続保存",      "ブラウザ依存（バックアップ推奨）"],
        ]}
        source="出典：本サイト独自実装"
      />

      <h2 id="usage-tables">📋 推奨運用フロー</h2>
      <MemTable
        headers={["タイミング", "アクション", "効果"]}
        rows={[
          ["過去問演習後", "間違えた問題を即記録",         "忘却曲線対策"],
          ["週末",         "週中の間違いを通読",           "短期記憶→長期記憶"],
          ["月末",         "全ノートをMarkdown出力",       "試験前のまとめ素材"],

          ["試験前日",     "出力Markdownを印刷して持参",   "試験会場での最終確認"],
        ]}
        source="出典：本サイト独自実装"
      />

      <h2 id="quick-review">1分復習・運用ルール</h2>
      <QuickReview items={[
        { q: "ノートはどこに保存される？",          a: "ブラウザのlocalStorage（バックアップ推奨）" },
        { q: "Markdownエクスポートの目的は？",       a: "試験前まとめ・印刷持参用" },
        { q: "topicは何のために？",                  a: "分野別集計・弱点の可視化" },
        { q: "推奨記録タイミングは？",               a: "過去問演習直後（忘却曲線対策）" },
        { q: "試験1週間前の使い方は？",              a: "全件を1度通読して弱点最終確認" },

      <UpdateLog entries={[{ date: "2026-05-03", content: "初版作成（localStorage連動間違いノート）", reason: "Phase 1パイロット第8弾・sec08" }]} />

        nextId="top"              nextTitle="トップ"

// 6. RandomModePage（ランダム10問 + 65分タイマー）
// ─────────────────────────────────────────────
function RandomModePage({ onNav }) {
  const [timeLeft, setTimeLeft] = React.useState(65 * 60);
  const [running, setRunning]   = React.useState(false);
  const [phase, setPhase]       = React.useState('ready'); // ready | running | finished

  React.useEffect(() => {
    if (!running || timeLeft <= 0) return;
    const t = setInterval(() => {
      setTimeLeft(s => {
        if (s <= 1) {
          clearInterval(t);
          setRunning(false);
          setPhase('finished');
          return 0;
        }
        return s - 1;
      });
    }, 1000);
    return () => clearInterval(t);
  }, [running, timeLeft]);

  const mm = String(Math.floor(timeLeft / 60)).padStart(2, '0');
  const ss = String(timeLeft % 60).padStart(2, '0');

  const SAMPLE_QUESTIONS = [
    { no: 1, q: "A種接地工事の接地抵抗値として正しいものはどれか",          category: "接地",     rank: "S" },
    { no: 2, q: "低圧電路の絶縁耐力試験における試験電圧の倍率は？",          category: "絶縁",     rank: "S" },
    { no: 3, q: "高圧架空電線が道路を横断する場合の最低地表高さは？",        category: "離隔距離", rank: "A" },
    { no: 4, q: "直流750Vの電路の電圧区分はどれか？",                        category: "電圧区分", rank: "A" },
    { no: 5, q: "電気工事士の免状を交付するのは誰か？",                      category: "法令",     rank: "B" },
    { no: 6, q: "主任技術者の選任が必要な自家用電気工作物の最大電力は？",    category: "主任技術者",rank: "S" },
    { no: 7, q: "B種接地工事の接地抵抗値の計算式はどれか？",                 category: "接地",     rank: "S" },
    { no: 8, q: "保安規程の届出先はどこか？",                                category: "保安規程", rank: "A" },
    { no: 9, q: "電気事故報告の速報の報告期限は事故発生から何時間以内か？",  category: "事故報告", rank: "A" },
    { no:10, q: "特別高圧架空電線と建造物上部との離隔距離は最低何mか？",     category: "離隔距離", rank: "A" },
  ];

  const handleStart = () => {
    setPhase('running');
    setRunning(true);
  };

  const handleStop = () => {
    setRunning(false);
    setPhase('finished');
  };

  const handleReset = () => {
    setTimeLeft(65 * 60);
    setRunning(false);
    setPhase('ready');
  };

  const timerColor = timeLeft < 600 ? '#d95454' : timeLeft < 1800 ? '#e6a817' : 'var(--accent)';

  return (
    <div>
      <div style={{ marginBottom: 24 }}>
        <div style={{ fontSize: 12, color: 'var(--ink-3)', fontWeight: 600, letterSpacing: '0.08em', marginBottom: 4 }}>EXAM MODE</div>
        <h1 style={{ margin: '0 0 8px', fontSize: 22, fontWeight: 700 }}>ランダム10問演習</h1>
        <p style={{ margin: 0, fontSize: 14, color: 'var(--ink-2)' }}>試験本番と同じ65分のタイマーで模擬演習。</p>
      </div>

      {/* 3ステップフロー */}
      <div style={{ background: 'var(--bg-elev)', border: '1px solid var(--border)', borderRadius: 'var(--radius)', padding: '16px 20px', marginBottom: 20 }}>
        <div style={{ fontWeight: 600, marginBottom: 12, fontSize: 14 }}>推奨フロー</div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
          {[
            { step: '1', label: 'テーマ別で1テーマ固める', desc: 'まず接地・絶縁などを1テーマ単位で理解してから演習へ。' },
            { step: '2', label: 'このモードで10問ランダム演習', desc: '65分タイマーをスタートして本番と同じ時間感覚で解く。' },
            { step: '3', label: '苦手テーマに戻る', desc: '間違えた問題のカテゴリを確認して該当ページに戻って復習。' },
          ].map(f => (
            <div key={f.step} style={{ display: 'flex', gap: 12 }}>
              <div style={{
                width: 28, height: 28, borderRadius: '50%', background: 'var(--accent)',
                color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontWeight: 700, fontSize: 13, flexShrink: 0,
              }}>{f.step}</div>
              <div>
                <div style={{ fontWeight: 600, fontSize: 13 }}>{f.label}</div>
                <div style={{ fontSize: 12, color: 'var(--ink-3)', marginTop: 2 }}>{f.desc}</div>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* タイマー */}
      <div style={{
        background: 'var(--bg-elev)',
        border: `2px solid ${phase === 'finished' ? '#d95454' : running ? timerColor : 'var(--border)'}`,
        borderRadius: 'var(--radius)',
        padding: '24px',
        textAlign: 'center',
        marginBottom: 20,
      }}>
        <div style={{ fontSize: 11, color: 'var(--ink-3)', fontWeight: 600, letterSpacing: '0.08em', marginBottom: 8 }}>
          {phase === 'ready' ? '試験時間' : phase === 'running' ? '残り時間' : '終了'}
        </div>
        <div style={{ fontSize: 56, fontWeight: 800, color: timerColor, fontVariantNumeric: 'tabular-nums', lineHeight: 1, marginBottom: 16 }}>
          {mm}:{ss}
        </div>
        <div style={{ display: 'flex', gap: 10, justifyContent: 'center' }}>
          {phase === 'ready' && (
            <button className="btn primary" onClick={handleStart} style={{ fontSize: 16, padding: '12px 32px' }}>
              演習スタート →
            </button>
          )}
          {phase === 'running' && (
            <>
              <button className="btn secondary" onClick={handleStop}>終了する</button>
            </>
          )}
          {phase === 'finished' && (
            <>
              <div style={{ fontWeight: 600, color: '#d95454', marginRight: 8 }}>演習終了！採点してください</div>
              <button className="btn secondary" onClick={handleReset}>もう一度</button>
            </>
          )}
        </div>
      </div>

      {/* 10問カード */}
      <div style={{ marginBottom: 12, fontWeight: 600, fontSize: 15 }}>本日の10問</div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
        {SAMPLE_QUESTIONS.map((q) => (
          <div
            key={q.no}
            style={{
              background: 'var(--bg-elev)',
              border: '1px solid var(--border)',
              borderRadius: 'var(--radius)',
              padding: '12px 16px',
              display: 'flex',
              gap: 14,
              alignItems: 'flex-start',
            }}
          >
            <div style={{ fontWeight: 700, color: 'var(--ink-3)', minWidth: 24, fontSize: 14 }}>Q{q.no}</div>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 14, lineHeight: 1.6, marginBottom: 6 }}>{q.q}</div>
              <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                <span className="tag">{q.category}</span>
                <span className={`rank rank-${q.rank}`}>{q.rank}</span>
              </div>
            </div>
          </div>
        ))}
      </div>

      <div style={{ marginTop: 24 }}>
        <button
          style={{ background: 'none', border: 'none', color: 'var(--accent)', cursor: 'pointer', fontSize: 13, padding: 0 }}
          onClick={() => onNav('top')}
        >
          ← トップに戻る
        </button>
      </div>
    </div>
  );
}

</script>
</body>
</html>
