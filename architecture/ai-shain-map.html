<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>AI社員諮問システム — Architecture Map</title>
<style>
  :root {
    --bg: #0a0e1a;
    --bg-elev: #121829;
    --bg-elev2: #1a2237;
    --fg: #e6ebf5;
    --fg-mute: #8893a8;
    --border: #2a3550;
    --hl: #ffd54f;
    --line: #3a4a6a;
    --line-hl: #ffd54f;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: "SF Mono", "Cascadia Mono", "Consolas", "Menlo", monospace;
    font-size: 13px;
    line-height: 1.45;
  }
  header {
    padding: 18px 24px 12px;
    border-bottom: 1px solid var(--border);
  }
  h1 { margin: 0 0 6px; font-size: 20px; letter-spacing: 0.02em; }
  .subtitle { color: var(--fg-mute); font-size: 12px; margin-bottom: 12px; }
  .legend {
    display: flex; flex-wrap: wrap; gap: 14px;
    font-size: 11px;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .swatch { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }
  main {
    display: grid;
    grid-template-columns: 1fr 340px;
    min-height: calc(100vh - 110px);
  }
  #canvas-wrap {
    position: relative;
    overflow: auto;
    padding: 16px;
  }
  #canvas {
    position: relative;
    width: 1380px;
    height: 880px;
  }
  #wires { position: absolute; inset: 0; pointer-events: none; }
  .lane {
    position: absolute;
    border: 1px dashed var(--border);
    border-radius: 8px;
    background: rgba(255,255,255,0.015);
  }
  .lane-label {
    position: absolute;
    top: 6px; left: 10px;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--fg-mute);
    text-transform: uppercase;
  }
  .node {
    position: absolute;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-left: 3px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    width: 180px;
    transition: opacity 0.2s, border-color 0.2s, background 0.2s, box-shadow 0.2s;
  }
  .node .name {
    font-weight: 600;
    font-size: 12px;
    color: var(--fg);
    margin-bottom: 3px;
  }
  .node .sub {
    font-size: 10.5px;
    color: var(--fg-mute);
    line-height: 1.3;
  }
  .node.dim { opacity: 0.18; }
  .node.hl {
    border-color: var(--hl) !important;
    border-left-color: var(--hl) !important;
    background: #1f2538;
    box-shadow: 0 0 0 1px var(--hl), 0 0 16px rgba(255,213,79,0.25);
  }
  aside {
    border-left: 1px solid var(--border);
    background: var(--bg-elev);
    padding: 16px 18px;
    overflow-y: auto;
  }
  aside h2 {
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--fg-mute);
    margin: 16px 0 8px;
  }
  aside h2:first-child { margin-top: 0; }
  .flow-list { list-style: none; padding: 0; margin: 0; }
  .flow-list li {
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 5px;
    margin-bottom: 6px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.15s;
  }
  .flow-list li:hover { border-color: var(--hl); color: var(--hl); }
  .flow-list li.active {
    border-color: var(--hl);
    background: rgba(255,213,79,0.08);
    color: var(--hl);
  }
  .clear-btn {
    display: inline-block;
    margin-top: 6px;
    padding: 4px 10px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--fg-mute);
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 11px;
  }
  .clear-btn:hover { color: var(--hl); border-color: var(--hl); }
  .step {
    border-left: 2px solid var(--hl);
    padding: 6px 10px 6px 10px;
    margin-bottom: 8px;
    background: var(--bg-elev2);
    border-radius: 0 4px 4px 0;
    font-size: 11.5px;
  }
  .step-n {
    color: var(--hl);
    font-weight: 700;
    margin-right: 6px;
  }
  .step-route {
    color: var(--fg-mute);
    font-size: 10.5px;
    margin-top: 3px;
  }
  .step-data {
    color: var(--fg-mute);
    font-size: 10.5px;
    margin-top: 2px;
    font-style: italic;
  }
  .empty {
    color: var(--fg-mute);
    font-size: 11.5px;
    font-style: italic;
  }
  .notes {
    margin-top: 18px;
    padding: 10px;
    background: var(--bg-elev2);
    border-radius: 4px;
    font-size: 10.5px;
    color: var(--fg-mute);
    line-height: 1.5;
  }
  .notes b { color: var(--fg); }
</style>
</head>

// =====================================================================
// Render
// =====================================================================
const NODE_W = 180;
const NODE_H = 56;

function catColor(id) {
  const c = DATA.categories.find(c => c.id === id);
  return c ? c.color : "#888";
}

function renderLegend() {
  const el = document.getElementById("legend");
  DATA.categories.forEach(c => {
    const span = document.createElement("span");
    span.className = "legend-item";
    span.innerHTML = `<span class="swatch" style="background:${c.color}"></span>${c.label}`;
    el.appendChild(span);
  });
}

function renderLanes() {
  const canvas = document.getElementById("canvas");
  DATA.categories.forEach(c => {
    const g = DATA.lanes[c.id];
    if (!g) return;
    const lane = document.createElement("div");
    lane.className = "lane";
    lane.style.left = g.x + "px";
    lane.style.top = g.y + "px";
    lane.style.width = g.w + "px";
    lane.style.height = g.h + "px";
    const lbl = document.createElement("div");
    lbl.className = "lane-label";
    lbl.textContent = c.label;
    lane.appendChild(lbl);
    canvas.appendChild(lane);
  });
}

function nodeRect(comp) {
  const lane = DATA.lanes[comp.category];
  const x = lane.x + comp.x;
  // center vertically in lane (leave room for label)
  const y = lane.y + Math.round((lane.h - NODE_H) / 2) + 6;
  return { x, y, w: NODE_W, h: NODE_H };
}

function renderNodes() {
  const canvas = document.getElementById("canvas");
  DATA.components.forEach(c => {
    const r = nodeRect(c);
    const div = document.createElement("div");
    div.className = "node";
    div.id = "node-" + c.id;
    div.style.left = r.x + "px";
    div.style.top = r.y + "px";
    div.style.borderLeftColor = catColor(c.category);
    div.innerHTML = `<div class="name">${c.label}</div><div class="sub">${c.sub}</div>`;
    canvas.appendChild(div);
  });
}

function edgePath(a, b) {
  // Draw an orthogonal-ish path between bottom/top centers or sides.
  const ar = nodeRect(a);
  const br = nodeRect(b);
  const ax = ar.x + ar.w / 2;
  const ay = ar.y + ar.h / 2;
  const bx = br.x + br.w / 2;
  const by = br.y + br.h / 2;
  // Use cubic curve for nicer look
  const dy = by - ay;
  const c1x = ax;
  const c1y = ay + dy * 0.4;
  const c2x = bx;
  const c2y = by - dy * 0.4;
  return `M ${ax} ${ay} C ${c1x} ${c1y}, ${c2x} ${c2y}, ${bx} ${by}`;
}

function renderWires() {
  const svg = document.getElementById("wires");
  DATA.connections.forEach((conn, i) => {
    const a = DATA.components.find(c => c.id === conn.from);
    const b = DATA.components.find(c => c.id === conn.to);
    if (!a || !b) return;
    const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
    p.setAttribute("d", edgePath(a, b));
    p.setAttribute("stroke", "var(--line)");
    p.setAttribute("stroke-width", "1.2");
    p.setAttribute("fill", "none");
    p.setAttribute("opacity", "0.55");
    p.dataset.from = conn.from;
    p.dataset.to = conn.to;
    p.id = "edge-" + i;
    svg.appendChild(p);
  });
}

function renderFlowList() {
  const ul = document.getElementById("flow-list");
  DATA.flows.forEach(f => {
    const li = document.createElement("li");
    li.textContent = f.label;
    li.dataset.flow = f.id;
    li.onclick = () => selectFlow(f.id);
    ul.appendChild(li);
  });
}

function renderNotes() {
  const box = document.getElementById("notes-box");
  box.innerHTML = "<b>Notes</b><br>" + DATA.notes.map(n => "• " + n).join("<br>");
}

function selectFlow(flowId) {
  const flow = DATA.flows.find(f => f.id === flowId);
  if (!flow) return;
  // Sidebar active state
  document.querySelectorAll("#flow-list li").forEach(li => {
    li.classList.toggle("active", li.dataset.flow === flowId);
  });
  // Highlight nodes
  const nodeSet = new Set(flow.nodes);
  DATA.components.forEach(c => {
    const el = document.getElementById("node-" + c.id);
    if (!el) return;
    if (nodeSet.has(c.id)) {
      el.classList.add("hl");
      el.classList.remove("dim");
    } else {
      el.classList.remove("hl");
      el.classList.add("dim");
    }
  });
  // Highlight edges
  const edgeKey = (e) => e[0] + "→" + e[1];
  const edgeSet = new Set(flow.edges.map(edgeKey));
  document.querySelectorAll("#wires path").forEach(p => {
    const key = p.dataset.from + "→" + p.dataset.to;
    const keyRev = p.dataset.to + "→" + p.dataset.from;
    if (edgeSet.has(key) || edgeSet.has(keyRev)) {
      p.setAttribute("stroke", "var(--line-hl)");
      p.setAttribute("stroke-width", "2.2");
      p.setAttribute("opacity", "0.95");
    } else {
      p.setAttribute("stroke", "var(--line)");
      p.setAttribute("stroke-width", "1.2");
      p.setAttribute("opacity", "0.12");
    }
  });
  // Steps
  const stepsEl = document.getElementById("steps");
  stepsEl.innerHTML = flow.steps.map(s => `
    <div class="step">
      <span class="step-n">${s.n}.</span>${s.what}
      <div class="step-route">↳ ${s.route}</div>
      <div class="step-data">data: ${s.data}</div>
    </div>
  `).join("");
}

function clearSelection() {
  document.querySelectorAll("#flow-list li").forEach(li => li.classList.remove("active"));
  document.querySelectorAll(".node").forEach(el => { el.classList.remove("hl"); el.classList.remove("dim"); });
  document.querySelectorAll("#wires path").forEach(p => {
    p.setAttribute("stroke", "var(--line)");
    p.setAttribute("stroke-width", "1.2");
    p.setAttribute("opacity", "0.55");
  });
  document.getElementById("steps").innerHTML = '<div class="empty">フローを選んでください</div>';
}

// Init
renderLegend();
renderLanes();
renderWires();
renderNodes();
renderFlowList();
renderNotes();
</script>
</body>
</html>
