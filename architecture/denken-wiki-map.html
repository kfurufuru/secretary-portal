// === Layout: swimlanes by category ===

// Layout tweaks for any out-of-canvas
const CANVAS_W = 1400;
const NODE_W = 168;
const NODE_H = 50;

// === Build DOM ===
const canvas = document.getElementById("canvas");
const svg = document.getElementById("svg");
const legend = document.getElementById("legend");
const flowsEl = document.getElementById("flows");
const stepsEl = document.getElementById("steps");

const catMap = Object.fromEntries(DATA.categories.map(c => [c.id, c]));

// Legend
DATA.categories.forEach(c => {
  const el = document.createElement("span");
  el.className = "item";
  el.innerHTML = `<span class="sw" style="background:${c.color}"></span>${c.label}`;
  legend.appendChild(el);
});

// Swimlane backgrounds
LANES.forEach(lane => {
  const div = document.createElement("div");
  div.className = "lane";
  div.style.left = "8px";
  div.style.right = "8px";
  div.style.top  = lane.y + "px";
  div.style.height = lane.h + "px";
  const cat = catMap[lane.id];
  if (cat) {
    div.style.borderColor = `${cat.color}33`;
    div.style.background  = `${cat.color}07`;
  }
  const lbl = document.createElement("div");
  lbl.className = "lane-label";
  lbl.textContent = lane.label;
  if (cat) lbl.style.color = cat.color + "AA";
  div.appendChild(lbl);
  canvas.appendChild(div);
});

// Nodes
const nodeEls = {};
DATA.components.forEach(c => {
  const p = POS[c.id];
  if (!p) { console.warn("no pos for", c.id); return; }
  const [x, y] = p;
  const cat = catMap[c.category];
  const el = document.createElement("div");
  el.className = "node";
  if (c.verified === false) el.classList.add("unverified");
  el.style.left = x + "px";
  el.style.top  = y + "px";
  el.style.width = NODE_W + "px";
  el.innerHTML = `
    <span class="stripe" style="background:${cat.color}"></span>
    <div class="lbl">${escapeHtml(c.label)}</div>
    <div class="sub">${escapeHtml(c.subtitle || "")}</div>
  `;
  el.dataset.id = c.id;
  el.title = c.label + (c.verified === false ? " (unverified)" : "");
  canvas.appendChild(el);
  nodeEls[c.id] = el;
});

// Center anchor helper for SVG lines
function anchor(id) {
  const p = POS[id];
  if (!p) return null;
  return { x: p[0] + NODE_W / 2, y: p[1] + NODE_H / 2 };
}

// Edges
const edgeEls = [];
DATA.connections.forEach(([from, to, label]) => {
  const a = anchor(from), b = anchor(to);
  if (!a || !b) return;
  // gentle bezier curve
  const dx = b.x - a.x, dy = b.y - a.y;
  const mx = (a.x + b.x) / 2;
  const my = (a.y + b.y) / 2;
  // curvature based on vertical distance
  const curve = Math.min(60, Math.abs(dy) * 0.25 + 12);
  const cx1 = a.x, cy1 = a.y + (dy > 0 ? curve : -curve);
  const cx2 = b.x, cy2 = b.y - (dy > 0 ? curve : -curve);
  const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
  path.setAttribute("d", `M ${a.x} ${a.y} C ${cx1} ${cy1}, ${cx2} ${cy2}, ${b.x} ${b.y}`);
  path.setAttribute("class", "conn-line");
  path.setAttribute("marker-end", "url(#arrow)");
  path.dataset.from = from;
  path.dataset.to = to;
  svg.appendChild(path);
  edgeEls.push(path);
});

// Resize SVG viewBox to actual content bounds
svg.setAttribute("viewBox", `0 0 ${CANVAS_W} 900`);

// Flow buttons
DATA.flows.forEach(f => {
  const btn = document.createElement("button");
  btn.className = "flow-btn";
  btn.dataset.id = f.id;
  btn.innerHTML = `<span class="dot" style="background:${f.color}"></span>${escapeHtml(f.label)}`;
  btn.addEventListener("click", () => activateFlow(f.id));
  flowsEl.appendChild(btn);
});

// Reset
document.getElementById("reset").addEventListener("click", () => activateFlow(null));

let activeFlow = null;
function activateFlow(id) {
  activeFlow = id;
  // buttons
  flowsEl.querySelectorAll(".flow-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.id === id);
  });
  const flow = id ? DATA.flows.find(f => f.id === id) : null;

  // nodes
  Object.entries(nodeEls).forEach(([nodeId, el]) => {
    el.classList.remove("dim", "hi");
    if (flow) {
      if (flow.highlight.includes(nodeId)) el.classList.add("hi");
      else el.classList.add("dim");
    }
  });

  // edges
  edgeEls.forEach(p => {
    p.classList.remove("dim", "hi");
    p.removeAttribute("marker-end");
    if (flow) {
      const f = p.dataset.from, t = p.dataset.to;
      if (flow.highlight.includes(f) && flow.highlight.includes(t)) {
        p.classList.add("hi");
        p.setAttribute("marker-end", "url(#arrow-hi)");
      } else {
        p.classList.add("dim");
        p.setAttribute("marker-end", "url(#arrow)");
      }
    } else {
      p.setAttribute("marker-end", "url(#arrow)");
    }
  });

  // steps panel
  stepsEl.innerHTML = "";
  if (flow) {
    flow.steps.forEach(([n, l, d]) => {
      const div = document.createElement("div");
      div.className = "step";
      div.style.borderLeftColor = flow.color;
      div.innerHTML = `<div><span class="n">${escapeHtml(n)}.</span><span class="l">${escapeHtml(l)}</span></div><div class="d">${escapeHtml(d)}</div>`;
      stepsEl.appendChild(div);
    });
  }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

// Show first flow by default for orientation
activateFlow("write-new-article");
