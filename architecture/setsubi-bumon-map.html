  }

  }

  .layout {
    display: grid;
    grid-template-columns: 1fr 360px;

  }
  .canvas-wrap {

    padding: 16px;
    overflow: auto;
  }
  .canvas {
    position: relative;
    width: 1440px;

  }
  svg.lines {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }
  .lane {
    position: absolute;
    border: 1px dashed rgba(255,255,255,0.06);
    border-radius: 8px;
    padding: 6px 8px;
  }
  .lane-label {
    position: absolute;
    top: 6px; left: 8px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.35);
  }
  .node {
    position: absolute;
    width: 170px;
    padding: 8px 10px;
    border-radius: 8px;
    background: #131a2e;
    border: 1.5px solid #2a3556;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    transition: opacity 0.25s, transform 0.15s, box-shadow 0.2s, border-color 0.2s;
    cursor: default;
  }
  .node .lbl {
    font-size: 12px;
    font-weight: 600;
    color: #fff;
    line-height: 1.25;
  }
  .node .sub {
    font-size: 10.5px;
    color: #8a94b0;
    margin-top: 3px;
    line-height: 1.35;
  }
  .node.dim { opacity: 0.18; }

  .node .stripe {
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 4px; border-radius: 8px 0 0 8px;
  }
  .node.unverified::after {
    content: "?";
    position: absolute; top: 4px; right: 6px;
    font-size: 10px; color: #ff8a65;
    opacity: 0.8;
  }

  aside.sidebar {
    border-left: 1px solid #1c2540;
    background: #0c1122;
    padding: 16px 14px;
    overflow-y: auto;
    max-height: calc(100vh - 130px);

    margin: 0 0 8px;
    font-size: 11px;
    letter-spacing: 1.6px;
    text-transform: uppercase;

    background: #131a2e;
    border: 1px solid #2a3556;
    color: #d9e1f2;
    padding: 8px 10px;
    border-radius: 6px;

    font-size: 12px;

    background: #2a2818;
    color: #ffd54f;
  }

  }

    border-left: 3px solid #2a3556;
    padding: 6px 9px 7px;
    border-radius: 0 5px 5px 0;
  }

    color: #ffd54f;
    font-weight: 700;
    margin-right: 6px;
  }
  .step .l {
    color: #fff; font-weight: 600; font-size: 12px;
  }
  .step .d {
    margin-top: 3px;
    color: #8a94b0;
    font-size: 11px;
    line-height: 1.45;
  }

  .hint {
    margin-top: 12px;
    padding: 8px 10px;
    background: rgba(255,213,79,0.06);
    border: 1px dashed rgba(255,213,79,0.3);
    border-radius: 6px;
    color: #c9b46a;
    font-size: 11px;

    margin-top: 8px;
    background: transparent;
    border: 1px solid #2a3556;
    color: #8a94b0;
    padding: 5px 9px;
    border-radius: 5px;

    font-family: inherit;
    font-size: 11px;

  .conn-line.hi    { stroke: #ffd54f; stroke-width: 2; opacity: 0.95; }
</style>

// Nodes
const nodeEls = {};
DATA.components.forEach(c => {
  const p = POS[c.id];
  if (!p) { console.warn("no pos for", c.id); return; }
  const [x, y] = p;
  const cat = catMap[c.category];
  const el = document.createElement("div");
  el.className = "node";
  if (c.verified === false) el.classList.add("unverified");
  el.style.left = x + "px";
  el.style.top  = y + "px";
  el.style.width = NODE_W + "px";
  el.innerHTML = `
    <span class="stripe" style="background:${cat.color}"></span>
    <div class="lbl">${escapeHtml(c.label)}</div>
    <div class="sub">${escapeHtml(c.subtitle || "")}</div>
  `;
  el.dataset.id = c.id;
  el.title = c.label + (c.verified === false ? " (unverified — 古舘さん要確認)" : "");
  canvas.appendChild(el);
  nodeEls[c.id] = el;
});

function anchor(id) {
  const p = POS[id];
  if (!p) return null;
  return { x: p[0] + NODE_W / 2, y: p[1] + NODE_H / 2 };
}

// Edges
const edgeEls = [];
DATA.connections.forEach(([from, to, label]) => {
  const a = anchor(from), b = anchor(to);
  if (!a || !b) return;
  const dx = b.x - a.x, dy = b.y - a.y;
  const curve = Math.min(60, Math.abs(dy) * 0.25 + 12);
  const cx1 = a.x, cy1 = a.y + (dy > 0 ? curve : -curve);
  const cx2 = b.x, cy2 = b.y - (dy > 0 ? curve : -curve);
  const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
  path.setAttribute("d", `M ${a.x} ${a.y} C ${cx1} ${cy1}, ${cx2} ${cy2}, ${b.x} ${b.y}`);
  path.setAttribute("class", "conn-line");
  path.setAttribute("marker-end", "url(#arrow)");
  path.dataset.from = from;
  path.dataset.to = to;
  svg.appendChild(path);
  edgeEls.push(path);
});

svg.setAttribute("viewBox", `0 0 ${CANVAS_W} ${CANVAS_H}`);

// Flow buttons
DATA.flows.forEach(f => {
  const btn = document.createElement("button");
  btn.className = "flow-btn";
  btn.dataset.id = f.id;
  btn.innerHTML = `<span class="dot" style="background:${f.color}"></span>${escapeHtml(f.label)}`;
  btn.addEventListener("click", () => activateFlow(f.id));
  flowsEl.appendChild(btn);
});

document.getElementById("reset").addEventListener("click", () => activateFlow(null));

let activeFlow = null;
function activateFlow(id) {
  activeFlow = id;
  flowsEl.querySelectorAll(".flow-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.id === id);
  });
  const flow = id ? DATA.flows.find(f => f.id === id) : null;

  Object.entries(nodeEls).forEach(([nodeId, el]) => {
    el.classList.remove("dim", "hi");
    if (flow) {
      if (flow.highlight.includes(nodeId)) el.classList.add("hi");
      else el.classList.add("dim");
    }
  });

  edgeEls.forEach(p => {
    p.classList.remove("dim", "hi");
    p.removeAttribute("marker-end");
    if (flow) {
      const f = p.dataset.from, t = p.dataset.to;
      if (flow.highlight.includes(f) && flow.highlight.includes(t)) {
        p.classList.add("hi");
        p.setAttribute("marker-end", "url(#arrow-hi)");
      } else {
        p.classList.add("dim");
        p.setAttribute("marker-end", "url(#arrow)");
      }
    } else {
      p.setAttribute("marker-end", "url(#arrow)");
    }
  });

  stepsEl.innerHTML = "";
  if (flow) {
    flow.steps.forEach(([n, l, d]) => {
      const div = document.createElement("div");
      div.className = "step";
      div.style.borderLeftColor = flow.color;
      div.innerHTML = `<div><span class="n">${escapeHtml(n)}.</span><span class="l">${escapeHtml(l)}</span></div><div class="d">${escapeHtml(d)}</div>`;
      stepsEl.appendChild(div);
    });
  }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

activateFlow("new-project");
</script>
